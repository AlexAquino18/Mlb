<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <meta name="theme-color" content="#0a0e1a" />

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0e1a; }
    ::-webkit-scrollbar-thumb { background: #1e2d45; border-radius: 3px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    #header { background: #0d1525; border-bottom: 1px solid #1e2d45; padding: 20px 24px; padding-top: max(20px, env(safe-area-inset-top)); position: sticky; top: 0; z-index: 100; }
    #header-inner { max-width: 960px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }

    #subtitle { color: #64748b; font-size: 11px; margin-top: 3px; }
    #header-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    input[type=date] { background: #111827; border: 1px solid #1e2d45; border-radius: 6px; padding: 6px 10px; color: #e2e8f0; font-size: 11px; font-family: inherit; cursor: pointer; }

    #updated { color: #64748b; font-size: 11px; }
    .btn { border-radius: 8px; cursor: pointer; font-size: 12px; font-family: inherit; font-weight: 700; padding: 8px 16px; }
    .btn-accent { background: rgba(0,212,255,.12); border: 1px solid rgba(0,212,255,.4); color: #00d4ff; }

    #main { max-width: 960px; margin: 0 auto; padding: 24px 16px; padding-bottom: max(24px, env(safe-area-inset-bottom)); }
    #tabs { display: flex; gap: 4px; background: #111827; padding: 4px; border-radius: 10px; border: 1px solid #1e2d45; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; background: transparent; color: #64748b; font-family: inherit; font-weight: 700; font-size: 13px; transition: all .2s; }
    .tab-btn.active { background: #00d4ff; color: #0a0e1a; }

    #filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .filter-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid #1e2d45; background: transparent; color: #64748b; cursor: pointer; font-size: 11px; font-family: inherit; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
    .filter-btn.active { border-color: #00d4ff; background: rgba(0,212,255,.12); color: #00d4ff; }
    #game-count { margin-left: auto; color: #64748b; font-size: 11px; }

    #loader { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 50px 0; }
    .spinner { width: 44px; height: 44px; border: 3px solid #1e2d45; border-top-color: #00d4ff; border-radius: 50%; animation: spin .8s linear infinite; }
    #load-status { color: #64748b; font-size: 12px; font-family: monospace; }

    #error-box { background: rgba(255,77,109,.07); border: 1px solid rgba(255,77,109,.3); border-radius: 10px; padding: 16px; color: #ff4d6d; font-size: 13px; display: flex; align-items: center; gap: 12px; }

    .pitcher-line { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .pitcher-name { color: #e2e8f0; font-size: 12px; font-weight: 700; }
    .stat-chip { background: rgba(100,116,139,.15); border: 1px solid rgba(100,116,139,.25); border-radius: 4px; padding: 1px 6px; font-size: 10px; color: #94a3b8; white-space: nowrap; }

    .card-right { text-align: right; flex-shrink: 0; }
    .conf-num { font-weight: 800; font-size: 22px; margin-bottom: 4px; }
    .badge { border-radius: 6px; padding: 2px 9px; font-size: 11px; font-weight: 700; font-family: monospace; letter-spacing: .05em; }
    .src-confirmed { background: rgba(0,255,136,.15); border: 1px solid rgba(0,255,136,.4); color: #00ff88; border-radius: 4px; padding: 1px 6px; font-size: 10px; font-weight: 700; }
    .src-probable  { background: rgba(0,212,255,.12); border: 1px solid rgba(0,212,255,.35); color: #00d4ff; border-radius: 4px; padding: 1px 6px; font-size: 10px; font-weight: 700; }
    .src-announced { background: rgba(255,214,10,.1); border: 1px solid rgba(255,214,10,.35); color: #ffd60a; border-radius: 4px; padding: 1px 6px; font-size: 10px; font-weight: 700; }

    .info-lbl { color: #64748b; font-size: 11px; margin-bottom: 4px; }

    .h2h-cold { color: #ff4d6d; }

    .batter-row:hover { background: rgba(0,212,255,.03); border-radius: 6px; }

    /* ── GAME LOG TABLE ──────────────────────────────────────────────────── */
    .game-log-table { width:100%; border-collapse:collapse; font-size:11px; margin-top:8px; }

    .k-low  { color:#ff4d6d !important; }

    .zone-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; width:108px; }
    .zone-cell { width:34px; height:28px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; border:1px solid rgba(255,255,255,.08); }

    /* ── SAFARI / OLDER iOS: flex gap fallback (gap in flex requires Safari 14.1+) ── */
    @supports not (gap: 1px) {
      #header-inner > * + * { margin-left: 12px; }
      #header-right > * + * { margin-left: 8px; }
      #tabs > * + * { margin-left: 4px; }
      #filters > * + * { margin-left: 8px; }
      #loader > * + * { margin-top: 12px; }
      .pitcher-line > * + * { margin-left: 6px; }
      .lineup-list > * + * { margin-top: 3px; }
      .pitcher-row > * + * { margin-top: 3px; }
    }
    /* ── MOBILE ──────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      #header { padding: 12px 14px; }
      h1 { font-size: 24px; }
      #subtitle { font-size: 10px; }
      #header-right { gap: 6px; }
      #header-right input[type=date] { font-size: 10px; padding: 5px 7px; }
      .btn { font-size: 11px; padding: 6px 10px; }
      #pp-debug-btn { display: none !important; }
      #main { padding: 14px 10px; }
      .tab-btn { font-size: 11px; padding: 8px 6px; }
      #summary-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .sum-val { font-size: 24px; }
      .sum-lbl { font-size: 10px; }
      .game-card { margin-bottom: 8px; }
      .card-hd { padding: 12px 14px; gap: 8px; }
      .card-teams { font-size: 13px; }
      .conf-num { font-size: 20px; }
      .pitcher-name { font-size: 11px; }
      .stat-chip { font-size: 9px; padding: 1px 4px; }
      .hand-tag { font-size: 9px; }
      .card-bd { padding: 0 14px 14px; }
      /* Stack pitcher stats grid to single column on phone */
      .pitcher-grid { grid-template-columns: 1fr; gap: 10px; }
      .take-value { font-size: 20px; }
      .analysis-txt { font-size: 12px; }
      .bar-lbl, .bar-val { font-size: 10px; }
      .lineup-batter { font-size: 11px; }
      #filters { gap: 5px; }
      .filter-btn { font-size: 10px; padding: 3px 9px; }
    }
  </style>
</head>

// ── LINE MOVEMENT TRACKING ─────────────────────────────────────────────────
let ppLinesSnapshot = {};
let lineMovements   = {};

function captureLineSnapshot() {
  if (!Object.keys(ppLines).length) return;
  if (Object.keys(ppLinesSnapshot).length > 0) return; // already loaded
  const snapKey = `ppSnap_${today()}`;
  try {
    const saved = localStorage.getItem(snapKey);
    if (saved) {
      // Returning visitor today: compare current lines against the first-load snapshot
      ppLinesSnapshot = JSON.parse(saved);
      return;
    }
  } catch {}
  // First load of the day: save current lines as the baseline snapshot
  ppLinesSnapshot = JSON.parse(JSON.stringify(ppLines));
  try { localStorage.setItem(snapKey, JSON.stringify(ppLinesSnapshot)); } catch {}
  // Clean up snapshots older than 2 days
  try {
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    const twoDaysAgo = new Date(Date.now() - 172800000).toISOString().slice(0, 10);
    [`ppSnap_${yesterday}`, `ppSnap_${twoDaysAgo}`].forEach(k => {
      if (localStorage.getItem(k)) localStorage.removeItem(k);
    });
  } catch {}
}
function detectLineMovements() {
  lineMovements = {};
  if (!Object.keys(ppLinesSnapshot).length) return;
  for (const [key, cur] of Object.entries(ppLines)) {
    const snap = ppLinesSnapshot[key];
    if (!snap || cur.line === snap.line) continue;
    lineMovements[key] = { from: snap.line, to: cur.line,
      dir: cur.line > snap.line ? "up" : "down", name: cur.rawName,
      ts: Date.now() };
  }
}
function getLineMovement(pitcherName) {
  const key = normName(pitcherName);
  return lineMovements[key] || null;
}

// ─── MOBILE DETECTION ─────────────────────────────────────────────────────────
const IS_MOBILE = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

// Run async tasks with a concurrency limit — prevents iOS from killing the tab
// with too many simultaneous requests (use Promise.all on desktop, batched on mobile)
async function mapConcurrent(items, fn, limit = IS_MOBILE ? 4 : 30) {
  const results = new Array(items.length);
  let idx = 0;
  async function worker() {
    while (idx < items.length) {
      const i = idx++;
      results[i] = await fn(items[i], i);
    }
  }
  const workers = Array.from({ length: Math.min(limit, items.length) }, worker);
  await Promise.all(workers);
  return results;
}

// ─── HTTP ─────────────────────────────────────────────────────────────────────
// Fetch with a hard timeout (ms). Throws on timeout or network error.
async function fetchTimeout(url, ms = 10000, opts = {}) {
  const ctrl  = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, { ...opts, signal: ctrl.signal });
    clearTimeout(timer);
    return r;
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}

async function mlbGet(path) {
  const url   = MLB + path;
  const bases = [
    url,                                      // direct (works when CORS headers present)
    PROXY  + encodeURIComponent(url),         // corsproxy.io
    PROXY2 + encodeURIComponent(url),         // allorigins fallback
  ];
  for (const base of bases) {
    try {
      const r = await fetchTimeout(base, 10000);
      if (r.ok) return r.json();
    } catch (_) {}
  }
  throw new Error("Network error: " + url);
}

// ── PrizePicks response cache (localStorage, TTL = 60 min) ───────────────────
const PP_CACHE_TTL = 60 * 60 * 1000;
function ppCacheKey(path) { return "mlb_pp_v1:" + path; }
function ppCacheGet(path) {
  try {
    const raw = localStorage.getItem(ppCacheKey(path));
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > PP_CACHE_TTL) return null;
    return data;
  } catch (_) { return null; }
}
function ppCacheSet(path, data) {
  try { localStorage.setItem(ppCacheKey(path), JSON.stringify({ ts: Date.now(), data })); } catch (_) {}
}
function ppCacheGetStale(path) {
  try {
    const raw = localStorage.getItem(ppCacheKey(path));
    if (!raw) return null;
    const { data } = JSON.parse(raw);
    return data || null;
  } catch (_) { return null; }
}

async function ppGet(path) {
  // ── 1. Fresh cache hit ────────────────────────────────────────────────────
  const cached = ppCacheGet(path);
  if (cached) return cached;

  const fullUrl = PP + path;

  const safeParseResponse = async (r) => {
    if (!r) return null;
    // Accept 200 or 304; anything else (403, 429, 502) skip to next proxy
    if (!r.ok && r.status !== 304) return null;
    let text;
    try { text = await r.text(); } catch (_) { return null; }
    if (!text || !String(text).trim()) return null;
    let j;
    try { j = JSON.parse(text); } catch (_) { return null; }
    if (j && j.error && j.data === undefined && j.included === undefined) return null;
    if (j && j.errors) return null;
    return j;
  };

  const netlifyQs = "/.netlify/functions/pp?path=" + encodeURIComponent(path);

  // Build ordered proxy list — own edge function is far most reliable
  const urls = [];

  // 1a. All Deno proxies — tried in order, rotates automatically when one is blocked
  for (const p of DENO_PROXIES) {
    if (p) urls.push(p.replace(/\/$/, "") + "?path=" + encodeURIComponent(path));
  }

  // 1b. Runtime override — window variable OR localStorage (survives refresh)
  const _proxyOverride = (typeof window !== "undefined" && window.MLB_EDGE_PP_PROXY)
    ? String(window.MLB_EDGE_PP_PROXY)
    : (() => { try { return localStorage.getItem("mlb_pp_proxy_override") || ""; } catch (_) { return ""; } })();
  if (_proxyOverride && _proxyOverride !== CF_WORKER) {
    urls.push(_proxyOverride.replace(/\/$/, "") + "?path=" + encodeURIComponent(path));
  }

  // 2. Own edge function — only try the one that matches the current host
  if (typeof location !== "undefined" && location.protocol !== "file:") {
    const host = location.hostname;
    const isNetlify = host.includes("netlify.app") || host.includes("netlify.com");
    const isVercel  = host.includes("vercel.app");
    const isLocal   = host === "localhost" || host === "127.0.0.1";
    if (isNetlify || isLocal) urls.push(location.origin + netlifyQs);
    if (isVercel  || isLocal) urls.push(location.origin + "/api/pp?path=" + encodeURIComponent(path));
  }

  // 3. Local dev server (npm start → port 8080) or netlify dev (port 8888)
  if (typeof location !== "undefined" &&
      (location.hostname === "localhost" || location.hostname === "127.0.0.1")) {
    if (location.port !== "8080") urls.push("http://127.0.0.1:8080" + netlifyQs);
    if (location.port !== "8888") urls.push("http://127.0.0.1:8888" + netlifyQs);
  }

  // 4. corsproxy.io
  urls.push(PROXY + encodeURIComponent(fullUrl));
  // 5. codetabs — different IP pool
  urls.push(PROXY3 + encodeURIComponent(fullUrl));
  for (const u of urls) {
    try {
      const r = await fetchTimeout(u, 18000, { headers: { Accept: "application/json" } });
      const j = await safeParseResponse(r);
      if (j && (j.data !== undefined || j.included !== undefined || j.meta !== undefined)) {
        ppCacheSet(path, j);
        return j;
      }
    } catch (_) {}
  }

  // ── All proxies failed — return stale cache if available ──────────────────
  const stale = ppCacheGetStale(path);
  if (stale) {
    console.warn("[PP] All proxies failed; using stale cache for", path);
    return stale;
  }
  return null;
}

    const extractPlayer = (a) => ({
      name: a.name || a.display_name
        || ((a.first_name || a.last_name) ? `${a.first_name||""} ${a.last_name||""}`.trim() : ""),
      team: a.team || a.team_name || a.team_abbreviation || a.sport_team || "",
    });
    for (const item of allIncluded) {
      const t = item.type || "";
      if (t === "new_player" || t === "player") {
        const p = extractPlayer(item.attributes || {});
        if (p.name && item.id) playerMap[item.id] = p;
      }
    }
    debugLines.push(`Players in included: ${Object.keys(playerMap).length}`);

    // ── Step 4b: batch-fetch missing players via /new_players ─────────────────
    if (Object.keys(playerMap).length === 0) {
      debugLines.push("Included empty — fetching /new_players in batch…");
      const allIds = [...new Set(allProj.map(p =>
        p.relationships?.new_player?.data?.id || p.relationships?.player?.data?.id
      ).filter(Boolean))];
      const chunks = [];
      for (let i = 0; i < allIds.length; i += 50) chunks.push(allIds.slice(i, i+50));
      for (const chunk of chunks) {
        const resp = await ppGet(`/new_players?filter[id]=${chunk.join(",")}`);
        for (const item of resp?.data || []) {
          const p = extractPlayer(item.attributes || {});
          if (p.name && item.id) playerMap[item.id] = p;
        }
      }
      debugLines.push(`Players after batch fetch: ${Object.keys(playerMap).length}`);
    }

    // Log all stat types so we can see what PP calls pitcher Ks
    const statTypes = [...new Set(allProj.map(p => p.attributes?.stat_type).filter(Boolean))];
    debugLines.push(`Stat types in this league: ${statTypes.join(", ") || "none"}`);

    // ── Step 5: extract strikeout + pitcher outs + NRFI/YRFI lines ────────────
    const kByPitcher   = {};  // pid → [{ line, ... }]
    const outsByPitcher= {};  // pid → [{ line, ... }]
    const nrfiByGame   = {};  // gameId/teamKey → { line, statType, pick }

    // Track all non-K, non-out stat types that we see on pitcher-related projections
    const unknownPitcherStats = new Set();

    for (const proj of allProj) {
      const attr = proj.attributes || {};
      const st   = (attr.stat_type || attr.description || "").toLowerCase();

      // ── NRFI / YRFI lines ────────────────────────────────────────────────────
      const isNRFI = st.includes("nrfi") || st.includes("no run") || st.includes("yrfi")
                  || st.includes("first inning") || st.includes("1st inning")
                  || st.includes("runs scored in the 1st") || st.includes("run in the first");
      if (isNRFI) {
        const pid  = proj.relationships?.new_player?.data?.id
                  || proj.relationships?.player?.data?.id;
        const key  = pid || `game_${proj.id}`;
        const line = parseFloat(attr.line_score);
        const player = pid ? playerMap[pid] : null;
        nrfiByGame[key] = {
          line:     isNaN(line) ? 0.5 : line,
          statType: attr.stat_type,
          rawName:  player?.name || attr.description || st,
          team:     player?.team || "",
          pick:     st.includes("nrfi") ? "NRFI" : st.includes("yrfi") ? "YRFI" : "NRFI/YRFI",
        };
        continue;
      }

      // ── Pitcher strikeout detection — pitcher only, exclude hitter/batter Ks ──
      const isBatterK =
        st.includes("hitter strikeout") ||
        st.includes("batter strikeout") ||
        st.includes("hitter k") ||
        st.includes("batter k") ||
        st === "hitter strikeouts" ||
        st === "batter strikeouts";

      const isK = !isBatterK && (
        st === "pitcher strikeouts" ||
        st.includes("pitcher k") ||
        st.includes("pitching k") ||
        st.includes("pitcher strikeout") ||
        (st.includes("k") && st.includes("pitcher")) ||
        st.includes("whiff")
      );

      const isOuts = !isK && (
        (/\bout\b/.test(st) && !st.includes("strike"))
        || st.includes("pitcher out")
        || (st.includes("outs") && !st.includes("strike"))
        || st === "pitching outs"
      );

      const pid  = proj.relationships?.new_player?.data?.id
                || proj.relationships?.player?.data?.id;
      if (!pid) continue;
      const line = parseFloat(attr.line_score);
      if (isNaN(line)) continue;

      if (isK) {
        if (!kByPitcher[pid]) kByPitcher[pid] = [];
        kByPitcher[pid].push({
          line,
          oddsType:  attr.odds_type || attr.type || "standard",
          statType:  attr.stat_type,
          active:    attr.is_active !== false,
        });
      } else if (isOuts) {
        if (!outsByPitcher[pid]) outsByPitcher[pid] = [];
        outsByPitcher[pid].push({
          line,
          oddsType:  attr.odds_type || attr.type || "standard",
          statType:  attr.stat_type,
          active:    attr.is_active !== false,
        });
      } else if (playerMap[pid]) {
        // Log unknown stat types on known players to help diagnose
        unknownPitcherStats.add(attr.stat_type || "?");
      }
    }

    if (unknownPitcherStats.size > 0) {
      debugLines.push(`  Other stat types on known players: ${[...unknownPitcherStats].join(", ")}`);
    }
    debugLines.push(`  NRFI/YRFI lines found: ${Object.keys(nrfiByGame).length}`);

    let totalFound = 0;
    const allSoLines = [];
    for (const [pid, entries] of Object.entries(kByPitcher)) {
      const player = playerMap[pid];
      if (!player || !player.name) {
        debugLines.push(`  SKIP: pid=${pid} — no name found. Lines: ${entries.map(e=>e.line).join(", ")}`);
        continue;
      }
      const { name, team } = player;

      const active = entries.filter(e => e.active);
      const src    = (active.length ? active : entries).sort((a,b) => a.line - b.line);

      // Use the MIDDLE line (median) as the reference line
      const midIdx = Math.floor(src.length / 2);
      const line = src[midIdx].line;

      const oE = outsByPitcher[pid];
      let outsLine = null, outsStatType = null, outsAllLines = null;
      if (oE && oE.length) {
        const oAct = oE.filter(e => e.active);
        const oSrc = (oAct.length ? oAct : oE).sort((a,b) => a.line - b.line);
        outsLine     = oSrc[0].line;
        outsStatType = oSrc[0].statType;
        outsAllLines = [...new Set(oSrc.map(e => e.line))];
      }

      const key = normName(name);
      ppLines[key] = {
        line,
        statType: src[0].statType,
        rawName:  name,
        team:     team,
        allLines: [...new Set(src.map(e => e.line))],
        outsLine,
        outsStatType,
        outsAllLines,
      };

      // Also index by "team + last name" for fallback matching
      if (team) {
        const lastName = name.trim().split(" ").pop().toLowerCase();
        const teamKey  = `${team.toLowerCase()}:${lastName}`;
        ppLines[teamKey] = ppLines[key];
      }

      const outsBit = outsLine != null ? ` · ${outsLine} outs (~${(outsLine/3).toFixed(1)} IP)` : "";
      allSoLines.push(`  • ${name}${team ? ` (${team})` : ""}: ${line} K${outsBit} (K all: ${src.map(e=>e.line).join(", ")})`);
      totalFound++;
    }

    if (totalFound > 0) {
      debugLines.push(`\n✓ Strikeout lines (${totalFound}):`);
      debugLines.push(...allSoLines);
    } else {
      debugLines.push("⚠ No strikeout lines found — check stat type names above");
    }

    setStatus(`PrizePicks: ${totalFound} MLB strikeout lines loaded`);
    captureLineSnapshot();
    detectLineMovements();
    buildPPTeamMap();
    extractPPHitterLines(allProj, playerMap);
    debugLines.push(`\nPP team map keys: ${Object.keys(ppTeamMap).join(", ")}`);
    debugLines.push(`Hitter PP lines: ${Object.keys(ppHitterLines).length} players`);

    // Store NRFI lines globally, indexed by rawName/team for lookup in NRFI tab
    ppNRFI = nrfiByGame;
    if (Object.keys(nrfiByGame).length > 0) {
      debugLines.push(`\n✓ NRFI/YRFI lines (${Object.keys(nrfiByGame).length}):`);
      for (const [k, v] of Object.entries(nrfiByGame)) {
        debugLines.push(`  • ${v.rawName}${v.team ? ` (${v.team})` : ""}: ${v.statType} line=${v.line} pick=${v.pick}`);
      }
    }
  } catch(e) {
    debugLines.push(`Error: ${e.message}`);
    setStatus("PrizePicks load failed — using calculated lines");
  }

  showPPDebug(debugLines);
}

function showPPDebug(lines) {
  const el = document.getElementById("pp-debug");
  const body = document.getElementById("pp-debug-body");
  if (!el || !body) return;
  body.innerHTML = lines.map(l =>
    `<div style="color:${l.startsWith("✓")?"#00ff88":l.startsWith("❌")||l.startsWith("⚠")?"#ff4d6d":"#94a3b8"}">${l}</div>`
  ).join("");
  el.style.display = "block";
}

// Strip accents, suffixes, punctuation for matching
function cleanName(s) {
  return (s||"")
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // remove accents
    .toLowerCase()
    .replace(/\s+(jr|sr|ii|iii|iv)\.?$/i, "")         // remove suffixes
    .replace(/[^a-z\s]/g, "")                          // letters + spaces only
    .trim();
}

// Fuzzy lookup: multiple strategies in decreasing confidence
function lookupPP(fullName) {
  if (!fullName || fullName === "TBD" || Object.keys(ppLines).length === 0) return null;

  const clean = cleanName(fullName);
  const parts  = clean.split(/\s+/);
  const first  = parts[0] || "";
  const last   = parts[parts.length - 1] || "";
  const init   = first[0] || "";

  // 1. Exact normalized match  (e.g. "cole gerrit" === "cole gerrit")
  const normKey = clean.split(/\s+/).sort().join(" ");
  if (ppLines[normKey]) return ppLines[normKey];

  // 2. Try with original normName (same logic as storage)
  const origKey = normName(fullName);
  if (ppLines[origKey]) return ppLines[origKey];

  // 3. "Last, First" stored as "first last" on PP side → sorted key matches
  for (const [k, v] of Object.entries(ppLines)) {
    const kClean = cleanName(v.rawName);
    const kSort  = kClean.split(/\s+/).sort().join(" ");
    if (kSort === normKey) return v;
  }

  // 4. First-initial + last name match  (e.g. "G. Cole" vs "Gerrit Cole")
  for (const [k, v] of Object.entries(ppLines)) {
    const kClean  = cleanName(v.rawName);
    const kParts  = kClean.split(/\s+/);
    const kLast   = kParts[kParts.length - 1];
    const kInit   = kParts[0]?.[0] || "";
    if (kLast === last && kInit === init) return v;
  }

  // 5. Last name only (only if unique in PP lines)
  const sameLastName = Object.entries(ppLines).filter(([k, v]) => {
    if (!v.rawName) return false;
    const kParts = cleanName(v.rawName).split(/\s+/);
    return kParts[kParts.length - 1] === last;
  });
  if (sameLastName.length === 1) return sameLastName[0][1];

  return null;
}

// Look up PP line using team abbreviation + last name (e.g. "PIT:skenes")
function lookupPPByTeam(fullName, teamAbbr) {
  if (!fullName || !teamAbbr) return null;
  const lastName = cleanName(fullName).split(/\s+/).pop();
  const teamKey  = `${teamAbbr.toLowerCase()}:${lastName}`;
  return ppLines[teamKey] || null;
}

// ─── PP TEAM MAP ──────────────────────────────────────────────────────────────
// PP abbreviation → keyword(s) that appear in the MLB team name
// MLB Stats API team IDs are always present in schedule responses (abbreviation is NOT).
// Use this map to reliably derive an abbreviation from a team id.
const MLB_ID_TO_ABBR = {
  133:"ATH", 134:"PIT", 135:"SD",  136:"SEA", 137:"SF",  138:"STL",
  139:"TB",  140:"TEX", 141:"TOR", 142:"MIN", 143:"PHI", 144:"ATL",
  145:"CWS", 146:"MIA", 147:"NYY", 158:"MIL", 108:"LAA", 109:"AZ",
  110:"BAL", 111:"BOS", 112:"CHC", 113:"CIN", 114:"CLE", 115:"COL",
  116:"DET", 117:"HOU", 118:"KC",  119:"LAD", 120:"WSH", 121:"NYM",
};
function teamAbbr(teamObj) {
  return MLB_ID_TO_ABBR[teamObj?.id] || teamObj?.abbreviation?.toUpperCase() || "";
}

const PP_TEAM_KW = {
  AZ:  ["Diamondbacks","Arizona"],  SF:  ["Giants","San Francisco"],
  TB:  ["Rays","Tampa"],            KC:  ["Royals","Kansas City"],
  CWS: ["White Sox"],               WSH: ["Nationals","Washington"],
  LAA: ["Angels","Anaheim"],        MIA: ["Marlins","Miami"],
  OAK: ["Athletics","Oakland"],     STL: ["Cardinals","Louis"],
  PHI: ["Phillies","Philadelphia"],  SEA: ["Mariners","Seattle"],
  MIL: ["Brewers","Milwaukee"],     MIN: ["Twins","Minnesota"],
};

// Build ppTeamMap: team keyword (lowercase) → array of ppEntry
function buildPPTeamMap() {
  ppTeamMap = {};
  for (const [, entry] of Object.entries(ppLines)) {
    if (!entry.team || !entry.rawName) continue;
    const abbr = entry.team.toUpperCase();
    // keywords for this PP abbreviation (use abbr as keyword too)
    const kws  = PP_TEAM_KW[abbr] || [abbr];
    for (const kw of kws) {
      const k = kw.toLowerCase();
      if (!ppTeamMap[k]) ppTeamMap[k] = [];
      ppTeamMap[k].push(entry);
    }
  }
}

// Given an MLB team object, return the PP entry for that team (if any)
function getPPForTeam(mlbTeam) {
  const name  = (mlbTeam?.teamName || mlbTeam?.name || "").toLowerCase();
  // Use MLB_ID_TO_ABBR to get the real abbreviation (mlbTeam.abbreviation is absent in schedule data)
  const abbr  = teamAbbr(mlbTeam).toLowerCase();
  for (const [kw, entries] of Object.entries(ppTeamMap)) {
    if (name.includes(kw) || abbr === kw) return entries;
  }
  return null;
}

// Look up a pitcher's MLB person ID by name using the sports people-search API
async function findMLBId(fullName) {
  const key = normName(fullName);
  if (_mlbSearch[key] !== undefined) return _mlbSearch[key];
  try {
    const d = await mlbGet(`/people/search?names=${encodeURIComponent(fullName)}&sportId=1`);
    const id = d.people?.[0]?.id || null;
    _mlbSearch[key] = id;
    return id;
  } catch(_) {
    _mlbSearch[key] = null;
    return null;
  }
}

// Cache for umpire and weather data
let _umpData   = {};   // gamePk → { name, kAdj, runsAdj, note, src }
let _weather   = {};   // teamAbbr → { windSpeed, windDir, windLabel, tempF, isOutdoor, precip, weatherScore }
let _umpLoaded = false;

// Normalize ump name for lookup
function normUmpName(s) {
  return (s||"").toLowerCase().trim().replace(/[^a-z\s]/g,"").replace(/\s+/g," ");
}

// ─── WEATHER FETCH (Open-Meteo, free, no API key) ────────────────────────────
// gameDateIso: optional MLB schedule `gameDate` — picks the forecast hour nearest first pitch
async function getWeather(homeTeamAbbr, dateStr, gameDateIso) {
  const t = normTeam(homeTeamAbbr);
  const coords = PARK_COORDS[t];
  const isRoof = coords?.roof === true;
  const cacheKey = isRoof || !coords ? t : (gameDateIso ? `${t}|${String(gameDateIso).slice(0, 13)}` : t);
  if (_weather[cacheKey]) return _weather[cacheKey];

  // Retractable/domed parks → weather irrelevant
  if (isRoof) {
    _weather[cacheKey] = { windSpeed:0, windDir:0, windLabel:"Dome/Roof", tempF:72, precip:0, weatherScore:0, isRoof:true };
    return _weather[cacheKey];
  }
  if (!coords) {
    _weather[cacheKey] = { windSpeed:0, windDir:0, windLabel:"N/A", tempF:70, precip:0, weatherScore:0, isRoof:false };
    return _weather[cacheKey];
  }

  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&hourly=temperature_2m,wind_speed_10m,wind_direction_10m,precipitation_probability&wind_speed_unit=mph&temperature_unit=fahrenheit&timezone=auto&forecast_days=2`;
    const r = await fetchTimeout(url, 8000);
    if (!r.ok) throw new Error("weather API error");
    const d = await r.json();

    const hours = d.hourly?.time || [];
    const datePrefix = dateStr;
    let idx = 0;
    if (gameDateIso && hours.length) {
      const target = new Date(gameDateIso).getTime();
      let best = Infinity;
      hours.forEach((h, i) => {
        const dt = Math.abs(new Date(h).getTime() - target);
        if (dt < best) { best = dt; idx = i; }
      });
    } else {
      idx = hours.findIndex(h => h.startsWith(datePrefix + "T17:") || h.startsWith(datePrefix + "T18:"));
      if (idx < 0) idx = hours.findIndex(h => h.startsWith(datePrefix));
      if (idx < 0) idx = 0;
    }

    const windMph  = d.hourly.wind_speed_10m?.[idx] || 0;
    const windDeg  = d.hourly.wind_direction_10m?.[idx] || 0;
    const tempF    = d.hourly.temperature_2m?.[idx] || 70;
    const precip   = d.hourly.precipitation_probability?.[idx] || 0;

    // Wind direction label
    const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
    const windLabel = dirs[Math.round(windDeg/22.5) % 16] || "—";

    // ── Weather score (affects NRFI and SO) ──────────────────────────────────
    // Blowing OUT = more offense = YRFI lean (negative for NRFI, slight negative for SO)
    // Blowing IN  = less offense = NRFI lean (positive for NRFI)
    // Based on wind relative to home plate direction per ballpark orientation
    const PARK_HP_DIR = {
      // Home plate direction (wind blowing FROM this direction blows OUT to CF)
      CHC:230, COL:195, BOS:215, NYY:240, NYM:220,
      SF:290,  OAK:270, DET:210, CLE:200, MIN:220,
      ATL:205, PHI:220, WSH:200, BAL:210, CIN:180,
      PIT:195, STL:215, KC:195,  LAA:225, LAD:205,
      SD:200,  CWS:215, MIA:200, BOS:230,
    };
    const hpDir = PARK_HP_DIR[t] || 200;
    // Angle between wind direction and "blowing out" direction
    let diff = Math.abs((windDeg - hpDir + 360) % 360);
    if (diff > 180) diff = 360 - diff;
    // diff=0 → wind blowing straight out (most offense), diff=180 → blowing in (least offense)
    const windOutFactor = Math.cos(diff * Math.PI / 180); // +1=out, -1=in

    let weatherScore = 0;
    if (windMph >= 5) {
      // Wind: strong out = YRFI lean (up to -8 pts on NRFI), strong in = NRFI lean (up to +6)
      weatherScore -= windOutFactor * Math.min(windMph / 3, 8);
    }
    // Cold weather (<45°F) → less offense → slight NRFI lean
    if (tempF < 45) weatherScore += (45 - tempF) * 0.15;
    // Rain >50% precip probability → less scoring, slight NRFI lean
    if (precip > 50) weatherScore += (precip - 50) * 0.04;

    // SO adjustment: strong out wind hurts batted-ball outs → fewer Ks slightly; cold = slightly fewer Ks
    const soKAdj = 1.0 - (windOutFactor * Math.min(windMph,20) * 0.002) - (tempF < 50 ? (50-tempF)*0.003 : 0);

    _weather[cacheKey] = { windSpeed:Math.round(windMph), windDir:windDeg, windLabel, tempF:Math.round(tempF), precip:Math.round(precip), weatherScore:parseFloat(weatherScore.toFixed(2)), soKAdj:parseFloat(soKAdj.toFixed(3)), windOutFactor:parseFloat(windOutFactor.toFixed(2)), isRoof:false, parkName:coords.name };
    return _weather[cacheKey];
  } catch(_) {
    _weather[cacheKey] = { windSpeed:0, windDir:0, windLabel:"N/A", tempF:70, precip:0, weatherScore:0, soKAdj:1.0, isRoof:false };
    return _weather[cacheKey];
  }
}

// ─── UMPIRE FETCH ─────────────────────────────────────────────────────────────
// Tries MLB Stats API for umpire assignment; falls back to schedule officials data.
async function getUmpireForGame(gamePk) {
  if (_umpData[gamePk]) return _umpData[gamePk];

  const fallback = { name: "Unknown", kAdj: 1.0, runsAdj: 0, note: "", src: "avg" };

  try {
    // MLB boxscore officials endpoint
    const d = await mlbGet(`/game/${gamePk}/boxscore`);
    const officials = d.officials || [];
    const hp = officials.find(o =>
      (o.officialType || "").toLowerCase().includes("home plate") ||
      (o.officialType || "").toLowerCase() === "hp"
    );
    if (!hp || !hp.official) { _umpData[gamePk] = fallback; return fallback; }

    const fullName = hp.official.fullName || hp.official.name || "";
    const normFull = normUmpName(fullName); // "bill miller" (first last)

    // UMP_DATA keys are stored as "last first" — try reversed order first
    let entry = UMP_DATA[normFull];
    if (!entry) {
      const parts = normFull.split(" ");
      if (parts.length >= 2) {
        // "bill miller" → "miller bill"
        const reversed = parts.slice(1).join(" ") + " " + parts[0];
        entry = UMP_DATA[reversed];
      }
    }

    // Last-name only fallback: first word of UMP_DATA key = last name (e.g. "miller bill" → "miller")
    if (!entry) {
      const lastName = normFull.split(" ").slice(-1)[0]; // last word of "first last" = last name
      for (const [k, v] of Object.entries(UMP_DATA)) {
        if (k.split(" ")[0] === lastName) { entry = v; break; } // first word of "last first" = last name
      }
    }

    const result = entry
      ? { name: fullName, kAdj: entry.kAdj, runsAdj: entry.runsAdj, note: entry.note, src: "known" }
      : { name: fullName, kAdj: 1.0, runsAdj: 0, note: "No data — using average", src: "unknown" };

    _umpData[gamePk] = result;
    return result;
  } catch(_) {
    _umpData[gamePk] = fallback;
    return fallback;
  }
}

// Normalize team abbreviation for lookups
function normTeam(abbr) {
  const MAP = { AZ:'ARI', 'SF':'SF', KC:'KC', CWS:'CWS', WSH:'WSH', TB:'TB' };
  return MAP[(abbr||"").toUpperCase()] || (abbr||"").toUpperCase();
}

// Harmonic mean of two % values (0–100): emphasizes the weaker number — fits “both halves” NRFI logic
function harmonicMeanPct(a, b) {
  if (a <= 0 || b <= 0) return (a + b) / 2;
  return 2 * a * b / (a + b);
}

// Park factor: delta from league average NRFI%
function getParkFactor(homeTeamAbbr) {
  const t = normTeam(homeTeamAbbr);
  const p = PARK_NRFI[t];
  if (!p) return 0;
  return (p.n - PARK_NRFI_AVG) / 100; // e.g. MIL = +0.131
}

// Team offensive first-inning tendency: how often they score in the 1st
function getTeamOffFactor(teamAbbr) {
  const t = normTeam(teamAbbr);
  const d = TEAM_1ST[t];
  return d ? d.rs : TEAM_1ST_AVG.rs;
}

}
function pad(n) { return String(n).padStart(2,"0"); }

async function getSchedule(date) {
  const mon = parseInt(date.split("-")[1], 10);
  // Try regular season first (covers Mar onward), then spring training
  const gameTypes = mon <= 2 ? ["S", "R"] : ["R", "S"];
  for (const gt of gameTypes) {
    try {
      const d = await mlbGet(`/schedule?sportId=1&date=${date}&hydrate=probablePitchers,lineups&gameType=${gt}`);
      const games = (d.dates && d.dates[0] && d.dates[0].games) || [];
      if (games.length > 0) return games;
    } catch(_) {}
  }
  return [];
}

async function getPitcherData(id, season) {
  const key = `${id}-${season}`;
  if (_pitcher[key]) return _pitcher[key];

  const isSpring = false;

  // Parallel: person (hand), season stats, last-6 game log, spring training stats if applicable
  const fetches = [
    mlbGet(`/people/${id}`),
    mlbGet(`/people/${id}/stats?stats=season&group=pitching&gameType=R&season=${season}`),
    mlbGet(`/people/${id}/stats?stats=gameLog&group=pitching&season=${season}&limit=6`),
  ];
  if (isSpring) {
    fetches.push(mlbGet(`/people/${id}/stats?stats=season&group=pitching&gameType=S&season=${season + 1}`));
    fetches.push(mlbGet(`/people/${id}/stats?stats=gameLog&group=pitching&gameType=S&season=${season + 1}&limit=5`));
  }

  const settled = await Promise.allSettled(fetches);
  const [personData, statsData, logData, springStatsData, springLogData] = settled;

  // Hand + current team
  let hand = "R";
  let currentTeamAbbr = null;
  let currentTeamId   = null;
  if (personData.status === "fulfilled") {
    const person = personData.value?.people?.[0];
    hand = person?.pitchHand?.code || "R";
    currentTeamAbbr = person?.currentTeam?.abbreviation?.toUpperCase() || null;
    currentTeamId   = person?.currentTeam?.id || null;
  }

  // Season stats (prior regular season)
  const s = statsData.status === "fulfilled"
    ? statsData.value?.stats?.[0]?.splits?.[0]?.stat
    : null;
  const ip  = s ? parseIP(s.inningsPitched) : 0;
  const era = s ? parseFloat(s.era)  || 4.20 : 4.20;
  const k9  = s ? parseFloat(s.strikeoutsPer9Inn) || (ip ? (s.strikeOuts||0)*9/ip : 8.8) : 8.8;
  const kPct= s ? ((s.strikeOuts||0)/(s.battersFaced||1)*100) : 22;
  const gs  = s ? (s.gamesStarted||20) : 20;
  const whip= s ? parseFloat(s.whip)||1.30 : 1.30;
  const bb9 = s && ip ? ((s.baseOnBalls||0)*9/ip) : 3.2;

  // Recent form – last 5 regular-season starts
  let recentERA = null, recentK9 = null, recentStarts = 0;
  if (logData.status === "fulfilled") {
    const splits = logData.value?.stats?.[0]?.splits || [];
    const starts = splits.filter(sp => sp.stat?.gamesStarted > 0).slice(0,5);
    if (starts.length) {
      recentStarts = starts.length;
      const totalER = starts.reduce((a,sp)=>a+(sp.stat.earnedRuns||0),0);
      const totalIP = starts.reduce((a,sp)=>a+parseIP(sp.stat.inningsPitched),0);
      const totalK  = starts.reduce((a,sp)=>a+(sp.stat.strikeOuts||0),0);
      recentERA = totalIP ? parseFloat((totalER*9/totalIP).toFixed(2)) : null;
      recentK9  = totalIP ? parseFloat((totalK*9/totalIP).toFixed(1))  : null;
    }
  }

  // Spring training stats — used for current accuracy during ST
  let springERA = null, springK9 = null, springKPct = null, springIP = null, springStarts = 0;
  if (isSpring && springStatsData && springStatsData.status === "fulfilled") {
    const ss = springStatsData.value?.stats?.[0]?.splits?.[0]?.stat;
    if (ss && parseIP(ss.inningsPitched) > 0) {
      springIP     = parseIP(ss.inningsPitched);
      springERA    = parseFloat(ss.era) || null;
      springK9     = springIP ? parseFloat(((ss.strikeOuts||0)*9/springIP).toFixed(1)) : null;
      springKPct   = ss.battersFaced > 0 ? parseFloat(((ss.strikeOuts||0)/(ss.battersFaced)*100).toFixed(1)) : null;
      springStarts = ss.gamesStarted || 0;
    }
  }
  // Spring game log — last 3 ST starts
  let stRecentERA = null, stRecentK9 = null;
  if (isSpring && springLogData && springLogData.status === "fulfilled") {
    const splits = springLogData.value?.stats?.[0]?.splits || [];
    const starts = splits.filter(sp => sp.stat?.gamesStarted > 0).slice(0,3);
    if (starts.length >= 1) {
      const totalER = starts.reduce((a,sp)=>a+(sp.stat.earnedRuns||0),0);
      const totalIP = starts.reduce((a,sp)=>a+parseIP(sp.stat.inningsPitched),0);
      const totalK  = starts.reduce((a,sp)=>a+(sp.stat.strikeOuts||0),0);
      stRecentERA = totalIP ? parseFloat((totalER*9/totalIP).toFixed(2)) : null;
      stRecentK9  = totalIP ? parseFloat((totalK*9/totalIP).toFixed(1))  : null;
    }
  }

  // Individual start records for game log display (last 5 starts)
  let gameLog = [];
  if (logData.status === "fulfilled") {
    const splits = logData.value?.stats?.[0]?.splits || [];
    gameLog = splits.filter(sp => sp.stat?.gamesStarted > 0).slice(0,5).map(sp => ({
      date:    (sp.date || "").slice(5),   // MM-DD
      opp:     sp.opponent?.abbreviation || sp.opponent?.name || "?",
      ip:      sp.stat.inningsPitched || "0",
      k:       sp.stat.strikeOuts || 0,
      er:      sp.stat.earnedRuns || 0,
      h:       sp.stat.hits || 0,
      bb:      sp.stat.baseOnBalls || 0,
      result:  sp.stat.wins > 0 ? "W" : sp.stat.losses > 0 ? "L" : "ND",
    }));
  }

  const result = {
    hand, era, k9, kPct, ip, gs, whip, bb9,
    recentERA, recentK9, recentStarts, gameLog,
    springERA, springK9, springKPct, springIP, springStarts,
    stRecentERA, stRecentK9,
    currentTeamAbbr, currentTeamId,
  };
  _pitcher[key] = result;
  return result;
}

const _catcherCache = {};
async function getCatcherForTeam(gamePk, side) {
  const key = `${gamePk}-${side}`;
  if (_catcherCache[key] !== undefined) return _catcherCache[key];
  try {
    const d = await mlbGet(`/game/${gamePk}/boxscore`);
    const teamData = side === "home" ? d.teams?.home : d.teams?.away;
    const players = teamData?.players || {};
    // Find catcher in batting order
    const order = teamData?.battingOrder || [];
    for (const id of order) {
      const p = players[`ID${id}`];
      if (p?.position?.abbreviation === "C") {
        const name = p.person?.fullName || "";
        const framing = getCatcherFraming(name);  // returns entry object or null
        _catcherCache[key] = { name, framing };
        return _catcherCache[key];
      }
    }
    // Fallback: scan all players for catchers (no gameStatus filter — works pre-game too)
    for (const [, p] of Object.entries(players)) {
      if (p?.position?.abbreviation === "C") {
        const name = p.person?.fullName || "";
        if (!name) continue;
        const framing = getCatcherFraming(name);
        _catcherCache[key] = { name, framing };
        return _catcherCache[key];
      }
    }
  } catch(_) {}
  _catcherCache[key] = null;
  return null;
}

const _h2hCache = {};
async function getPitcherVsLineup(pitcherId, batters, season) {
  if (!pitcherId || !batters || batters.length === 0) return [];
  const results = [];
  await Promise.all(batters.slice(0,9).map(async (batter) => {
    const key = `${pitcherId}-${batter.id}-${season}`;
    if (_h2hCache[key] !== undefined) {
      results.push(_h2hCache[key]);
      return;
    }
    try {
      const d = await mlbGet(`/people/${pitcherId}/stats?stats=vsPlayer&group=pitching&opposingPlayerId=${batter.id}&season=${season}`);
      const s = d.stats?.[0]?.splits?.[0]?.stat;
      if (s && (s.atBats || 0) >= 3) {
        const r = {
          name: batter.name,
          ab:   s.atBats || 0,
          k:    s.strikeOuts || 0,
          hits: s.hits || 0,
          avg:  s.avg ? parseFloat(s.avg) : null,
          ops:  s.ops ? parseFloat(s.ops) : null,
          hr:   s.homeRuns || 0,
        };
        _h2hCache[key] = r;
        results.push(r);
      } else {
        _h2hCache[key] = null;
      }
    } catch(_) { _h2hCache[key] = null; }
  }));
  return results.filter(Boolean).sort((a,b) => b.ab - a.ab);
}

// Individual batter K% vs a specific pitcher hand (R or L)
// Switch hitters face the OPPOSITE side: vs RHP → bats Left → uses vl split
async function getBatterKPct(batterId, batterHand, pitcherHand, season) {
  // Determine which side the batter actually hits from against this pitcher
  let hitSide = batterHand;
  if (batterHand === "S") hitSide = pitcherHand === "R" ? "L" : "R"; // switch hits opposite

  const sitCode = pitcherHand === "R" ? "vr" : "vl";
  const key = `${batterId}-${season}-${sitCode}`;
  if (_batterKPct[key] !== undefined) return _batterKPct[key];

  // Try platoon split first
  try {
    const d = await mlbGet(`/people/${batterId}/stats?stats=statSplits&group=hitting&season=${season}&sitCodes=${sitCode}`);
    const splits = d.stats?.[0]?.splits || [];
    const s = splits.find(sp => sp.split?.code === sitCode)?.stat || splits[0]?.stat;
    if (s && (s.plateAppearances || 0) >= 20) {
      const kPct = (s.strikeOuts || 0) / (s.plateAppearances || 1) * 100;
      _batterKPct[key] = { kPct: parseFloat(kPct.toFixed(1)), obp: parseFloat(s.obp)||0.320, hitSide };
      return _batterKPct[key];
    }
  } catch(_) {}

  // Fall back to full-season hitting stats
  try {
    const d2 = await mlbGet(`/people/${batterId}/stats?stats=season&group=hitting&season=${season}`);
    const s = d2.stats?.[0]?.splits?.[0]?.stat;
    const kPct = s ? (s.strikeOuts || 0) / (s.plateAppearances || 1) * 100 : 22;
    _batterKPct[key] = { kPct: parseFloat(kPct.toFixed(1)), obp: parseFloat(s?.obp)||0.320, hitSide };
    return _batterKPct[key];
  } catch(_) {
    const fallback = { kPct: 22.0, obp: 0.320, hitSide };
    _batterKPct[key] = fallback;
    return fallback;
  }
}

// Compute lineup K% vs a pitcher, weighted by batting order (top batters get more PA)
// Returns { kPct, batters: [{...batter, kPct, hitSide}] }
async function getLineupKPct(batters, pitcherHand, season) {
  if (!batters || batters.length === 0) return null;

  const results = await Promise.all(
    batters.map(b => getBatterKPct(b.id, b.bats, pitcherHand, season))
  );

  // Batting order weights: 1–3 see the most PA, 7–9 fewest
  const weights = [1.25, 1.20, 1.15, 1.05, 1.00, 0.95, 0.85, 0.80, 0.80];
  let totalW = 0, totalKW = 0;
  results.forEach((r, i) => {
    const w = weights[i] || 0.85;
    totalW  += w;
    totalKW += r.kPct * w;
  });

  // Attach computed stats back to batter objects for display
  const enriched = batters.map((b, i) => ({
    ...b,
    kPctVsPitcher: results[i].kPct,
    obpVsPitcher:  results[i].obp,
    hitSide:       results[i].hitSide,
  }));

  return {
    kPct:    parseFloat((totalKW / totalW).toFixed(1)),
    batters: enriched,
  };
}

// Fetch boxscore once → extract lineup + confirmed starting pitchers
async function getGameInfo(gamePk) {
  if (_lineup[gamePk] !== undefined) return _lineup[gamePk];

  const empty = { away: [], home: [], awayStarter: null, homeStarter: null };
  try {
    const d = await mlbGet(`/game/${gamePk}/boxscore`);

    const extractLineup = (teamData) => {
      const order   = teamData?.battingOrder || [];
      const players = teamData?.players || {};
      return order.slice(0,9).map(id => {
        const p = players[`ID${id}`];
        return {
          id:   id,
          name: p?.person?.fullName || "Unknown",
          pos:  p?.position?.abbreviation || "?",
          bats: p?.person?.batSide?.code || "?",
          obp:  parseFloat(p?.seasonStats?.batting?.obp) || 0.320,
          avg:  parseFloat(p?.seasonStats?.batting?.avg) || 0.250,
        };
      });
    };

    const extractStarter = (teamData) => {
      const pitchers = teamData?.pitchers || [];
      const players  = teamData?.players || {};
      for (const pid of pitchers) {
        const pl = players[`ID${pid}`];
        if (pl?.person?.id) {
          return { id: pl.person.id, fullName: pl.person.fullName || "Unknown" };
        }
      }
      return null;
    };

    const result = {
      away:         extractLineup(d.teams?.away),
      home:         extractLineup(d.teams?.home),
      awayStarter:  extractStarter(d.teams?.away),
      homeStarter:  extractStarter(d.teams?.home),
    };
    _lineup[gamePk] = result;
    return result;
  } catch(_) {
    _lineup[gamePk] = empty;
    return empty;
  }
}

// Fetch yesterday's lineup for a team as a fallback when today's lineup isn't posted yet
const _prevLineup = {};
async function getPreviousLineup(teamId, dateStr) {
  const key = `${teamId}-${dateStr}`;
  if (_prevLineup[key] !== undefined) return _prevLineup[key];

  // Try the 3 days before the given date to find the most recent game
  const base = new Date(`${dateStr}T12:00:00`);
  for (let daysBack = 1; daysBack <= 3; daysBack++) {
    const prev = new Date(base);
    prev.setDate(prev.getDate() - daysBack);
    const prevStr = `${prev.getFullYear()}-${pad(prev.getMonth()+1)}-${pad(prev.getDate())}`;
    try {
      const d = await mlbGet(`/schedule?sportId=1&date=${prevStr}&teamId=${teamId}&hydrate=lineups&gameType=R`);
      const prevGames = (d.dates && d.dates[0] && d.dates[0].games) || [];
      if (!prevGames.length) continue;

      const g = prevGames[0];
      const gamePk = g.gamePk;
      const bx = await mlbGet(`/game/${gamePk}/boxscore`);
      const isHome = (bx.teams?.home?.team?.id === teamId);
      const teamData = isHome ? bx.teams?.home : bx.teams?.away;
      const order = teamData?.battingOrder || [];
      const players = teamData?.players || {};
      if (!order.length) continue;

      const lineup = order.slice(0, 9).map(id => {
        const p = players[`ID${id}`];
        return {
          id:   id,
          name: p?.person?.fullName || "Unknown",
          pos:  p?.position?.abbreviation || "?",
          bats: p?.person?.batSide?.code || "?",
          obp:  parseFloat(p?.seasonStats?.batting?.obp) || 0.320,
          avg:  parseFloat(p?.seasonStats?.batting?.avg) || 0.250,
          fromPrevGame: true,
        };
      });
      _prevLineup[key] = lineup;
      return lineup;
    } catch(_) {}
  }
  _prevLineup[key] = [];
  return [];
}

// Resolve the starting pitcher for a game/side using a 2-tier fallback:
//   1. probablePitcher from schedule hydration
//   2. Actual starter pulled from boxscore (for started/finished games)
async function resolvePitcher(probFromSchedule, gamePk, side, gameInfo) {
  // Tier 1 – schedule probable pitcher (most common for pre-game)
  if (probFromSchedule && probFromSchedule.id) return probFromSchedule;

  // Tier 2 – boxscore confirmed starter (game already underway or finished)
  const starter = side === "away" ? gameInfo.awayStarter : gameInfo.homeStarter;
  if (starter && starter.id) return starter;

  return null; // genuinely TBD — will use league-average stats
}

  hand:"R", era:4.20, k9:8.8, kPct:22, ip:160, gs:28, whip:1.30, bb9:3.2,
  recentERA:null, recentK9:null, recentStarts:0,
