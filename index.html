}

// ── PARK DIMENSIONS PANEL RENDER ──────────────────────────────────────────────
function renderParkRankVenueTable(highlightAbbr) {
  const hi = normTeam(highlightAbbr || "");
  const rows = PARK_RANK_VENUE.map((r) => {
    const on = hi === r.key ? "background:rgba(0,212,255,.1);border-left:3px solid #00d4ff" : "";
    const fc = r.factor >= 100 ? "#ff8fa3" : "#7dd3fc";
    return `<tr style="${on}">
      <td style="color:#64748b">${r.rank}</td>
      <td style="font-weight:700;color:#e2e8f0">${r.abbr}</td>
      <td style="color:#94a3b8;max-width:200px">${r.venue}</td>
      <td style="font-weight:800;color:${fc}">${r.factor}</td>
    </tr>`;
  }).join("");
  return `
  <div style="margin-top:14px;padding-top:12px;border-top:1px solid #1e2d45">
    <div style="font-size:10px;font-weight:800;color:#00d4ff;letter-spacing:.06em;margin-bottom:6px">RANK &amp; VENUE</div>
    <div style="font-size:10px;color:#94a3b8;line-height:1.5;margin-bottom:10px">
      Park factor = run environment vs league (100 ≈ neutral).
      <span style="display:block;margin-top:4px;color:#cbd5e1">
        <strong style="color:#ff8fa3">Higher</strong> scores favor <strong style="color:#ff4d6d">batters</strong>
        · <strong style="color:#7dd3fc">Lower</strong> scores favor <strong style="color:#00d4ff">pitchers</strong>.
      </span>
    </div>
    <div style="max-height:260px;overflow-y:auto;border:1px solid #1e2d45;border-radius:8px">
      <table class="game-log-table" style="font-size:10px;margin:0;width:100%">
        <thead><tr><th>Rk</th><th>Tm</th><th>Venue</th><th>PF</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function renderParkPanel(homeAbbr, parkDims) {
  const dims = parkDims || PARK_DIMS[normTeam(homeAbbr)];
  if (!dims) return "";
  const hrColor = dims.hrFactor >= 1.10 ? "#ff4d6d" : dims.hrFactor >= 1.04 ? "#ffd60a" : dims.hrFactor <= 0.92 ? "#00ff88" : "#94a3b8";
  const hrLabel = dims.hrFactor >= 1.10 ? "🔴 Very hitter-friendly" : dims.hrFactor >= 1.04 ? "🟡 Hitter-friendly" : dims.hrFactor <= 0.92 ? "🟢 Pitcher-friendly" : "⚪ Near-average";
  const pct = (f) => Math.min(100, Math.max(0, (f - 280) / (420 - 280) * 100));
  return `
  <div class="park-panel">
    <div style="font-size:10px;font-weight:700;color:#00d4ff;letter-spacing:.08em;margin-bottom:10px">🏟 ${dims.name} — BALLPARK PROFILE</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px">
      <div>
        <div style="font-size:11px;font-weight:700;color:${hrColor};margin-bottom:6px">HR Factor: ${dims.hrFactor.toFixed(2)} — ${hrLabel}</div>
        <div style="font-size:10px;color:#64748b;margin-bottom:8px">${dims.note}</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <span style="font-size:10px;background:rgba(100,116,139,.15);border:1px solid rgba(100,116,139,.25);border-radius:4px;padding:2px 7px;color:#94a3b8">Surface: ${dims.surface}</span>
          ${dims.roof ? `<span style="font-size:10px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.25);border-radius:4px;padding:2px 7px;color:#00d4ff">🏟 Roof/Dome</span>` : ""}
        </div>
      </div>
      <div>
        <div style="font-size:10px;color:#64748b;font-weight:700;margin-bottom:8px">DIMENSIONS</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${[["LF",dims.lf,"#ffd60a"],["CF",dims.cf,"#00d4ff"],["RF",dims.rf,"#00ff88"]].map(([label,ft,color])=>`
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:2px">
              <span style="font-size:10px;color:#64748b">${label}</span>
              <span style="font-size:10px;font-weight:700;color:${color}">${ft} ft</span>
            </div>
            <div style="background:#1e2d45;border-radius:3px;height:4px">
              <div style="width:${pct(ft)}%;height:4px;border-radius:3px;background:${color}"></div>
            </div>
          </div>`).join("")}
          ${dims.wallHt ? `<div style="font-size:10px;color:#64748b;margin-top:2px">Wall height: ${dims.wallHt} ft</div>` : ""}
        </div>
      </div>
    </div>
    ${renderParkRankVenueTable(homeAbbr)}
  </div>`;
}

// ── CATCHER FRAMING PANEL RENDER ──────────────────────────────────────────────
function renderCatcherPanel(catcherInfo, label) {
  if (!catcherInfo || !catcherInfo.name) return "";
  // catcherInfo = { name, framing: <framingEntry object or null> }
  const framingEntry = catcherInfo.framing || getCatcherFraming(catcherInfo.name);
  if (!framingEntry) return "";
  const framingRuns = framingEntry.framing ?? 0;
  const note = framingEntry.note || "";
  const color = framingRuns >= 2 ? "#00ff88" : framingRuns >= 0.5 ? "#ffd60a" : framingRuns <= -1.5 ? "#ff4d6d" : "#94a3b8";
  const sign = framingRuns >= 0 ? "+" : "";
  const barW = Math.min(100, Math.max(0, (framingRuns + 3) / 6 * 100));
  return `
  <div style="background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.2);border-radius:8px;padding:10px 14px;margin-top:6px">
    <div style="font-size:10px;color:#a78bfa;font-weight:700;letter-spacing:.06em;margin-bottom:6px">🧤 ${label} CATCHER FRAMING</div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div>
        <div style="font-size:13px;font-weight:700;color:#e2e8f0">${catcherInfo.name}</div>
        <div style="font-size:11px;color:${color};font-weight:700;margin-top:2px">${sign}${framingRuns.toFixed(1)} framing runs/162 <span style="font-size:9px;opacity:.7">(vs avg)</span></div>
        ${note ? `<div style="font-size:10px;color:#64748b;margin-top:2px">${note}</div>` : ""}
      </div>
      <div style="flex:1;min-width:100px">
        <div style="background:#1e2d45;border-radius:4px;height:6px;position:relative">
          <div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:#475569"></div>
          <div style="
            position:absolute;
            left:${framingRuns>=0?50:Math.max(0,(framingRuns+3)/6*100)}%;
            width:${Math.min(50,Math.abs(framingRuns)/3*50)}%;
            height:6px;border-radius:4px;background:${color}">
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:9px;color:#475569;margin-top:2px">
          <span>−3 (poor)</span><span>avg</span><span>+3 (elite)</span>
        </div>
      </div>
    </div>
  </div>`;
}

// ── H2H TABLE RENDER ──────────────────────────────────────────────────────────
function renderH2H(h2hData, pitcherName) {
  if (!h2hData || h2hData.length === 0) return "";
  return `
  <div style="background:#0a0e1a;border-radius:8px;padding:11px 14px;margin-top:10px">
    <div style="font-size:10px;font-weight:700;color:#64748b;letter-spacing:.06em;margin-bottom:8px">
      ⚔️ HEAD-TO-HEAD — ${pitcherName} vs Opp Lineup (last 2 seasons)
    </div>
    <table class="game-log-table">
      <thead><tr>
        <th>BATTER</th><th>AB</th><th>H</th><th>AVG</th><th>K</th><th>HR</th><th>OPS</th>
      </tr></thead>
      <tbody>
        ${h2hData.map(h => {
          const kDenom = h.pa > 0 ? h.pa : h.ab;
          const kPct = kDenom > 0 ? (h.k / kDenom * 100).toFixed(0) : "—";
          const avgDisp = h.avg !== null ? h.avg.toFixed(3) : "—";
          const opsDisp = h.ops !== null ? h.ops.toFixed(3) : "—";
          const avgColor = h.avg !== null ? (h.avg < .200 ? "#00ff88" : h.avg > .300 ? "#ff4d6d" : "#94a3b8") : "#94a3b8";
          const kColor   = parseInt(kPct) >= 30 ? "#00ff88" : parseInt(kPct) <= 10 ? "#ff4d6d" : "#94a3b8";
          return `<tr>
            <td style="color:#e2e8f0;font-weight:700">${h.name}</td>
            <td>${h.ab}</td>
            <td>${h.hits}</td>
            <td style="color:${avgColor};font-weight:700">${avgDisp}</td>
            <td style="color:${kColor};font-weight:700">${h.k} <span style="font-size:9px;opacity:.6">(${kPct}%)</span></td>
            <td style="color:${h.hr>0?"#ff4d6d":"#94a3b8"}">${h.hr}</td>
            <td style="color:${opsDisp!=="—"&&parseFloat(opsDisp)>0.800?"#ff4d6d":opsDisp!=="—"&&parseFloat(opsDisp)<0.600?"#00ff88":"#94a3b8"}">${opsDisp}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  </div>`;
}

// ── LINE MOVEMENT BADGE RENDER ────────────────────────────────────────────────
function renderLineMovement(lineMov) {
  if (!lineMov) return "";
  const isUp  = lineMov.dir === "up";
  const color = isUp ? "#ff4d6d" : "#00ff88";
  const arrow = isUp ? "▲" : "▼";
  const tip   = isUp ? "Line moved UP since first load today" : "Line moved DOWN since first load today";
  return `<div class="line-moved" style="display:inline-flex;align-items:center;gap:6px;background:${color}18;border:1px solid ${color}55;border-radius:6px;padding:5px 11px;font-size:13px;font-weight:800;color:${color};cursor:default;font-variant-numeric:tabular-nums" title="${tip}">
    ${arrow} ${lineMov.from} → ${lineMov.to}K
    <span style="font-size:10px;opacity:.8;font-weight:700">${isUp ? "STEAMED UP" : "STEAMED DOWN"}</span>
  </div>`;
}

// ─── HITTER PROPS ─────────────────────────────────────────────────────────────
function extractPPHitterLines(allProj, playerMap) {
  ppHitterLines = {};
  const STAT_MAP = {
    hits: ["hits"],
    tb:   ["total bases"],
    hr:   ["home runs", "home run"],
    bb:   ["walks", "base on balls"],
    runs: ["runs scored", "runs"],
    rbi:  ["rbis", "rbi", "runs batted in"],
    hrr:  ["hits+runs+rbis", "h+r+rbi", "hits + runs + rbis"],
    sb:   ["stolen bases", "stolen base"],
  };
  // First pass: collect ALL lines per player per stat
  const allLines = {}; // normName → { statKey → [{ line, statType }] }
  for (const proj of allProj) {
    const attr = proj.attributes || {};
    const st   = (attr.stat_type || "").toLowerCase().trim();
    const pid  = proj.relationships?.new_player?.data?.id
               || proj.relationships?.player?.data?.id;
    if (!pid) continue;
    const player = playerMap[pid];
    if (!player?.name) continue;
    const line = parseFloat(attr.line_score);
    if (isNaN(line)) continue;
    let statKey = null;
    for (const [k, patterns] of Object.entries(STAT_MAP)) {
      if (patterns.some(p => st === p || st.startsWith(p))) { statKey = k; break; }
    }
    if (!statKey) continue;
    const nk = normName(player.name);
    if (!allLines[nk]) allLines[nk] = { rawName: player.name, team: player.team };
    if (!allLines[nk][statKey]) allLines[nk][statKey] = [];
    allLines[nk][statKey].push({ line, statType: attr.stat_type });
  }
  // Second pass: pick the standard line — lowest non-trivial line (> 0.25)
  // This avoids the "demon" (highest) line and picks the goblin/standard line
  for (const [nk, data] of Object.entries(allLines)) {
    ppHitterLines[nk] = { rawName: data.rawName, team: data.team };
    for (const [statKey, entries] of Object.entries(data)) {
      if (statKey === "rawName" || statKey === "team") continue;
      const sorted = entries.filter(e => e.line > 0.25).sort((a, b) => a.line - b.line);
      if (sorted.length) {
        ppHitterLines[nk][statKey] = sorted[0]; // lowest standard line
      }
    }
  }
}

async function getHitterStats(playerId, season) {
  const key = `h_${playerId}_${season}`;
  if (_hitterStats[key]) return _hitterStats[key];
  const sc0 = {
    scXwoba: null, scWoba: null, scXba: null, scBa: null, scXslg: null, scSlg: null,
    scBrlPct: null, scSeason: null, scOk: false,
  };
  const DEF = { bats:"R", avg:0.255, obp:0.320, slg:0.415, ops:0.735, pa:450, ab:400, hits:102, hr:12, bb:38, tb:167, rbi:52, runs:65, sb:5, ...sc0 };
  try {
    const [cur, prev, person] = await Promise.allSettled([
      mlbGet(`/people/${playerId}/stats?stats=season&group=hitting&gameType=R&season=${season}`),
      mlbGet(`/people/${playerId}/stats?stats=season&group=hitting&gameType=R&season=${season-1}`),
      mlbGet(`/people/${playerId}`),
    ]);
    const bats = person.status==="fulfilled" ? (person.value?.people?.[0]?.batSide?.code||"R") : "R";
    const parse = (res) => {
      const s = res.status==="fulfilled" ? res.value?.stats?.[0]?.splits?.[0]?.stat : null;
      if (!s || (s.plateAppearances||0) < 10) return null;
      return { bats, avg:parseFloat(s.avg)||0.255, obp:parseFloat(s.obp)||0.320,
        slg:parseFloat(s.slg)||0.415, ops:parseFloat(s.ops)||0.735,
        pa:s.plateAppearances||0, ab:s.atBats||0, hits:s.hits||0, hr:s.homeRuns||0,
        bb:s.baseOnBalls||0, tb:s.totalBases||0, rbi:s.rbi||0, runs:s.runs||0, sb:s.stolenBases||0, ...sc0 };
    };
    const c = parse(cur), p = parse(prev);
    let result;
    if (c && c.pa >= 60) {
      result = c;
    } else if (c && p) {
      const w = Math.min(1, c.pa / 60);
      const runsBlend = Math.round(w * (c.runs ?? 0) + (1 - w) * (p.runs ?? 0));
      result = { bats, avg:w*c.avg+(1-w)*p.avg, obp:w*c.obp+(1-w)*p.obp,
        slg:w*c.slg+(1-w)*p.slg, ops:w*c.ops+(1-w)*p.ops,
        pa:c.pa, ab:c.ab, hits:c.hits, hr:c.hr, bb:c.bb, tb:c.tb, rbi:c.rbi, runs: runsBlend, sb:c.sb, ...sc0 };
    } else {
      result = p || { ...DEF, bats };
    }
    try {
      const fr = await fetchTimeout(`/api/batter_advanced?mlbam=${playerId}&season=${season}`, 22000);
      if (fr) {
        const j = await fr.json().catch(() => null);
        if (j && j.ok) {
          result.scXwoba = j.xwoba != null ? Number(j.xwoba) : null;
          result.scWoba = j.woba != null ? Number(j.woba) : null;
          result.scXba = j.xba != null ? Number(j.xba) : null;
          result.scBa = j.ba != null ? Number(j.ba) : null;
          result.scXslg = j.xslg != null ? Number(j.xslg) : null;
          result.scSlg = j.slg != null ? Number(j.slg) : null;
          result.scBrlPct = j.brl_percent != null ? Number(j.brl_percent) : null;
          result.scSeason = j.season != null ? Number(j.season) : null;
          result.scOk = true;
        }
      }
    } catch (_) {}
    _hitterStats[key] = result;
    return result;
  } catch(_) { _hitterStats[key] = { ...DEF }; return _hitterStats[key]; }
}

async function getH2H(batterId, pitcherId) {
  if (!batterId || !pitcherId) return null;
  const key = `h2h_${batterId}_${pitcherId}`;
  if (_h2hCache[key] !== undefined) return _h2hCache[key];
  try {
    const d = await mlbGet(`/people/${batterId}/stats?stats=vsPlayer&group=hitting&opposingPlayerId=${pitcherId}`);
    const splits = d?.stats?.[0]?.splits || [];
    if (!splits.length) { _h2hCache[key] = null; return null; }
    const s = splits[0].stat;
    const r = { ab:s.atBats||0, hits:s.hits||0, hr:s.homeRuns||0,
                bb:s.baseOnBalls||0, avg:parseFloat(s.avg)||0, ops:parseFloat(s.ops)||0 };
    _h2hCache[key] = r;
    return r;
  } catch(_) { _h2hCache[key] = null; return null; }
}

// Fetch batter stats vs left or right-handed pitchers (platoon split)
async function getHitterVsSplit(playerId, season, pitcherHand) {
  const sitCode = pitcherHand === "L" ? "vl" : "vr";
  const key = `split_${playerId}_${season}_${sitCode}`;
  if (_hitterStats[key] !== undefined) return _hitterStats[key];
  try {
    const d = await mlbGet(`/people/${playerId}/stats?stats=statSplits&group=hitting&gameType=R&season=${season}&sitCodes=${sitCode}`);
    const s = d?.stats?.[0]?.splits?.[0]?.stat;
    if (!s || (s.plateAppearances || 0) < 20) { _hitterStats[key] = null; return null; }
    _hitterStats[key] = {
      avg: parseFloat(s.avg) || null,
      slg: parseFloat(s.slg) || null,
      obp: parseFloat(s.obp) || null,
      pa:  s.plateAppearances || 0,
      hits: s.hits || 0, hr: s.homeRuns || 0, bb: s.baseOnBalls || 0,
    };
    return _hitterStats[key];
  } catch(_) { _hitterStats[key] = null; return null; }
}

// Fetch last 5 regular-season games for a batter (tries current year first, then falls back)
async function getHitterGameLog(playerId, season) {
  const key = `hgl_${playerId}_${season}`;
  if (_hitterStats[key] !== undefined) return _hitterStats[key];
  try {
    const d = await mlbGet(`/people/${playerId}/stats?stats=gameLog&group=hitting&gameType=R&season=${season}&limit=5`);
    const splits = d?.stats?.[0]?.splits || [];
    const result = splits.slice(0, 5).map(sp => ({
      date: (sp.date || sp.game?.officialDate || "").slice(5),
      opp:  sp.opponent?.abbreviation || sp.opponent?.name?.slice(0,3).toUpperCase() || "?",
      ab:   sp.stat?.atBats          || 0,
      h:    sp.stat?.hits            || 0,
      hr:   sp.stat?.homeRuns        || 0,
      rbi:  sp.stat?.rbi             || 0,
      bb:   sp.stat?.baseOnBalls     || 0,
      sb:   sp.stat?.stolenBases     || 0,
      tb:   sp.stat?.totalBases      || 0,
    }));
    _hitterStats[key] = result;
    return result;
  } catch(_) { _hitterStats[key] = []; return []; }
}

// Fetch active roster for a team — used as fallback when lineup isn't posted
const _rosterCache = {};
async function getTeamRoster(teamId, season) {
  // Always use current calendar year for active roster — season var may lag behind
  const rosterYear = Math.max(season, new Date().getFullYear());
  const key = `roster_${teamId}_${rosterYear}`;
  if (_rosterCache[key]) return _rosterCache[key];
  try {
    const d = await mlbGet(`/teams/${teamId}/roster?rosterType=active&season=${rosterYear}`);
    const players = (d?.roster || [])
      .map(p => ({
        id:   p.person?.id,
        name: p.person?.fullName || "",
        pos:  p.position?.abbreviation || "?",
      }))
      .filter(p => p.id && p.name && !["P","SP","RP","TWP"].includes(p.pos));
    _rosterCache[key] = players;
    return players;
  } catch(_) { _rosterCache[key] = []; return []; }
}

async function buildHitters(games, season) {
  setStatus(`Building hitter matchups for ${games.length} games…`);
  const results = [];
  await mapConcurrent(games, async g => {
    const aw = g.teams.away, hm = g.teams.home;
    const gameInfo = await getGameInfo(g.gamePk);
    const [awRes, hmRes] = await Promise.all([
      resolvePitcherWithPP(aw.probablePitcher, g.gamePk, "away", gameInfo, aw.team, g.status),
      resolvePitcherWithPP(hm.probablePitcher, g.gamePk, "home", gameInfo, hm.team, g.status),
    ]);
    let awProb = awRes.prob, hmProb = hmRes.prob;
    const homeAbbr = teamAbbr(hm.team);

    // Validate pitchers: PP K-line team check using MLB_ID_TO_ABBR (abbreviation absent in schedule)
    const ppDataLoaded = Object.keys(ppLines).length > 0;
    const checkPitcherTeam = (prob, expAbbr) => {
      if (!prob) return prob;
      const ppE = lookupPP(prob.fullName);
      if (ppDataLoaded && ppE?.team && expAbbr && ppE.team.toUpperCase() !== expAbbr) {
        console.warn(`[MLB] Hitters: ${prob.fullName} PP team=${ppE.team} ≠ ${expAbbr} — resetting to TBD`);
        return null;
      }
      return prob;
    };
    awProb = checkPitcherTeam(awProb, teamAbbr(aw.team));
    hmProb = checkPitcherTeam(hmProb, teamAbbr(hm.team));

    const parkInfo = PARK_DIMS[homeAbbr] || {};
    const parkHit  = PARK_HIT_FACTOR[homeAbbr] || { hit:1.0, tb:1.0 };
    const hrFactor = parkInfo.hrFactor || 1.0;
    const pfRunEnv = getParkRunEnvPF(homeAbbr);
    const runEnvOffMult = parkRunEnvOffenseMult(pfRunEnv);
    // Fetch umpire for park-adjusted walk and hit edge
    const ump = await getUmpireForGame(g.gamePk).catch(() => null);
    const umpRunsAdj = ump?.runsAdj || 0; // negative = pitcher-friendly

    const buildSide = async (batters, oppPitcher, oppName, oppHand, teamId) => {
      // If lineup not posted, fall back to active roster filtered to players with PP lines
      let effectiveBatters = batters;
      let fromRoster = false;
      if (!effectiveBatters || !effectiveBatters.length) {
        const roster = await getTeamRoster(teamId, season);
        const ppRoster = roster.filter(p => lookupPPHitter(p.name, teamAbbr({ id: teamId })));
        if (!ppRoster.length) return [];
        effectiveBatters = ppRoster;
        fromRoster = true;
      }
      if (!effectiveBatters.length) return [];
      return await Promise.all(effectiveBatters.slice(0,9).map(async (b, idx) => {
        const stats = await getHitterStats(b.id, season);
        const h2h   = oppPitcher ? await getH2H(b.id, oppPitcher.id) : null;
        const ppE   = lookupPPHitter(b.name, teamAbbr({ id: teamId })) || null;

        // Platoon split: fetch batter vs pitcher hand if we know the pitcher hand
        const platoon = oppHand ? await getHitterVsSplit(b.id, season, oppHand) : null;
        const platoonLabel = platoon ? `vs${oppHand}HP` : null;

        const PA   = 4.1;
        const bbR  = stats.pa > 0 ? Math.min(0.18, stats.bb / stats.pa) : 0.085;
        const abPG = PA * (1 - bbR);
        const hrR  = stats.ab > 0 ? Math.min(0.09, stats.hr / stats.ab) : 0.022;

        // Blend season avg with platoon split (60/40 if enough PAs)
        let useAvg = stats.avg, useSlg = stats.slg;
        if (platoon && platoon.pa >= 30) {
          const w = Math.min(0.45, platoon.pa / 200);
          useAvg = useAvg * (1-w) + (platoon.avg || useAvg) * w;
          useSlg = useSlg * (1-w) + (platoon.slg || useSlg) * w;
        }

        // H2H adjustment on top of platoon-blended avg
        let pAvg = useAvg;
        if (h2h && h2h.ab >= 10) pAvg = 0.55*pAvg + 0.45*h2h.avg;
        else if (h2h && h2h.ab >= 5) pAvg = 0.80*pAvg + 0.20*h2h.avg;

        // Park hit/TB/HR factors
        let pHits = pAvg * abPG * parkHit.hit;
        let pTB   = (useAvg > 0 ? pHits * (useSlg / useAvg) : pHits * 1.55) * parkHit.tb;
        let pHR   = hrR * abPG * hrFactor;
        // Savant Statcast: xwOBA vs wOBA (positive regression), barrel% (HR power)
        const pyLuck = (stats.scXwoba != null && stats.scWoba != null && stats.scWoba > 0.2)
          ? (1 + Math.max(-0.085, Math.min(0.085, (stats.scXwoba - stats.scWoba) * 0.52)))
          : 1;
        const pyBarrel = (stats.scBrlPct != null)
          ? (1 + Math.max(-0.055, Math.min(0.075, (stats.scBrlPct - 8.5) * 0.009)))
          : 1;
        const pyBlend = pyLuck * pyBarrel;
        pHits *= pyBlend;
        pTB *= pyBlend;
        pHR *= pyBlend * (stats.scBrlPct != null ? (1 + Math.max(-0.04, Math.min(0.1, (stats.scBrlPct - 8.5) * 0.011))) : 1);
        pHits *= runEnvOffMult;
        pTB *= runEnvOffMult;
        pHR *= runEnvOffMult;
        // Umpire: tight zone (negative runsAdj) slightly reduces hits/BB
        const umpMult = 1 + umpRunsAdj * 0.04;
        const pBB   = bbR * PA * Math.max(0.80, umpMult);
        // Runs and RBIs: per-PA rates from season stats scaled to today's PAs
        const runsR = stats.pa > 0 && Number.isFinite(stats.runs) ? stats.runs / stats.pa : 0.14;
        const rbiR  = stats.pa > 0 && Number.isFinite(stats.rbi) ? stats.rbi / stats.pa : 0.12;
        const pRuns = runsR * PA * Math.max(0.80, umpMult) * pyBlend * runEnvOffMult;
        const pRBI  = rbiR  * PA * hrFactor * pyBlend * runEnvOffMult;
        // Hits+Runs+RBIs combo
        const pHRR  = pHits + pRuns + pRBI;

        const edgeOf = (proj, entry) => {
          if (!entry) return null;
          const pr = Number(proj);
          if (!Number.isFinite(pr)) return null;
          return parseFloat((pr - entry.line).toFixed(2));
        };
        const propList = [
          ppE?.hits && { stat:"Hits",  line:ppE.hits.line, proj:pHits, edge:edgeOf(pHits, ppE.hits) },
          ppE?.tb   && { stat:"TB",    line:ppE.tb.line,   proj:pTB,   edge:edgeOf(pTB,   ppE.tb)   },
          ppE?.hr   && { stat:"HR",    line:ppE.hr.line,   proj:pHR,   edge:edgeOf(pHR,   ppE.hr)   },
          ppE?.bb   && { stat:"Walks", line:ppE.bb.line,   proj:pBB,   edge:edgeOf(pBB,   ppE.bb)   },
          ppE?.runs && { stat:"Runs",  line:ppE.runs.line, proj:pRuns, edge:edgeOf(pRuns, ppE.runs) },
          ppE?.rbi  && { stat:"RBI",   line:ppE.rbi.line,  proj:pRBI,  edge:edgeOf(pRBI,  ppE.rbi)  },
          ppE?.hrr  && { stat:"H+R+RBI", line:ppE.hrr.line, proj:pHRR, edge:edgeOf(pHRR, ppE.hrr)  },
          ppE?.sb   && { stat:"SB",    line:ppE.sb.line,   proj:stats.pa>0?stats.sb/stats.pa*PA:0.12, edge:edgeOf(stats.pa>0?stats.sb/stats.pa*PA:0.12, ppE.sb) },
        ].filter(Boolean);

        const bestProp = propList.length
          ? propList.reduce((a,b) => Math.abs(b.edge) > Math.abs(a.edge) ? b : a)
          : null;

        let conf = 50;
        if (bestProp) {
          conf += Math.min(20, Math.abs(bestProp.edge) * 12);
          if (h2h && h2h.ab >= 10) conf += 8;
          else if (h2h && h2h.ab >= 5) conf += 4;
          if (platoon && platoon.pa >= 30) conf += 4;
          if (bestProp.edge < 0) conf -= 3;
        } else { conf = 44; }
        if (stats.scOk) conf += 3;
        conf = Math.max(10, Math.min(92, Math.round(conf)));

        let matchupScore = 0;
        if (bestProp) matchupScore += Math.abs(bestProp.edge) * 11 + (conf - 50) * 0.12;
        if (stats.scOk && stats.scXwoba != null && stats.scWoba != null) {
          matchupScore += Math.max(0, stats.scXwoba - stats.scWoba) * 95;
        }
        if (stats.scBrlPct != null) matchupScore += Math.max(0, stats.scBrlPct - 7) * 0.55;
        if (h2h && h2h.ab >= 8 && h2h.avg >= stats.avg + 0.025) matchupScore += 6;
        else if (h2h && h2h.ab >= 15 && h2h.avg >= 0.28) matchupScore += 4;

        const h2hVsSp = computeH2hVsSpScore(h2h, stats.avg);
        const top10Rank = h2hVsSp.score * 0.62 + Math.min(85, matchupScore) * 0.38;

        return { id:b.id, name:b.name, pos:b.pos, order:fromRoster ? null : idx+1,
          bats:stats.bats, stats, h2h, ppEntry:ppE, platoon, platoonLabel,
          proj:{hits:pHits, tb:pTB, hr:pHR, bb:pBB, runs:pRuns, rbi:pRBI, hrr:pHRR},
          propList, bestProp, conf, matchupScore, h2hVsSp, top10Rank, oppPitcherName:oppName, oppHand, fromRoster };
      }));
    };

    const [awayData, homeData] = await Promise.all([
      buildSide(gameInfo.away, hmProb, hmProb?.fullName||"TBD", hmProb?.hand||null, aw.team.id),
      buildSide(gameInfo.home, awProb, awProb?.fullName||"TBD", awProb?.hand||null, hm.team.id),
    ]);

    const allB = [...awayData, ...homeData];
    const ppLineCount = allB.filter(b => b.propList.length > 0).length;
    const topProps = allB.filter(b => b.bestProp)
      .sort((a,b) => Math.abs(b.bestProp.edge) - Math.abs(a.bestProp.edge)).slice(0,3);

    results.push({
      gamePk:g.gamePk, gameTime:g.gameDate, status:g.status?.detailedState||"",
      awayTeam:aw.team.abbreviation||aw.team.name,
      homeTeam:hm.team.abbreviation||hm.team.name,
      awayPitcher:awProb?.fullName||"TBD", awayPitcherHand:awProb?.hand||"R",
      homePitcher:hmProb?.fullName||"TBD", homePitcherHand:hmProb?.hand||"R",
      parkName:parkInfo.name||"", hrFactor,
      hitFactor:parkHit.hit, tbFactor:parkHit.tb,
      parkRunEnvPF: pfRunEnv,
      parkRunEnvOffMult: runEnvOffMult,
      ump: ump && ump.src === "known" ? ump : null,
      awayBatters:awayData, homeBatters:homeData,
      ppLineCount, topProps,
      hasLineup: gameInfo.away?.length > 0 || gameInfo.home?.length > 0,
      rosterFallback: (!gameInfo.away?.length && awayData.length > 0) || (!gameInfo.home?.length && homeData.length > 0),
      season,
    });
  });
  results.sort((a,b) => new Date(a.gameTime) - new Date(b.gameTime));
  return results;
}

function renderTop10Hitters(games) {
  const rows = [];
  for (const g of games) {
    for (const b of g.awayBatters || []) rows.push({ b, g, side: "away" });
    for (const b of g.homeBatters || []) rows.push({ b, g, side: "home" });
  }
  const coldBadH2h = (b) => {
    const h = b.h2h;
    if (!h || !h.ab || h.ab < 10) return false;
    return b.h2hVsSp && b.h2hVsSp.tier === "cold";
  };
  /** OVER TB at min line (0.5) — skip Top 10 unless career vs-SP H2H is good or hot */
  const cheapTbOverWithoutStrongH2h = (b) => {
    const bp = b.bestProp;
    if (!bp || bp.stat !== "TB") return false;
    const line = Number(bp.line);
    if (Number.isNaN(line) || line > 0.5) return false;
    if (bp.edge < 0) return false;
    const t = b.h2hVsSp && b.h2hVsSp.tier;
    return t !== "good" && t !== "hot";
  };
  const pool = rows
    .filter((x) => x.b.bestProp && x.b.top10Rank != null)
    .sort((a, b) => b.b.top10Rank - a.b.top10Rank);
  const ranked = [];
  for (const x of pool) {
    if (ranked.length >= 10) break;
    if (coldBadH2h(x.b)) continue;
    if (cheapTbOverWithoutStrongH2h(x.b)) continue;
    ranked.push(x);
  }
  for (const x of pool) {
    if (ranked.length >= 10) break;
    if (ranked.includes(x)) continue;
    if (cheapTbOverWithoutStrongH2h(x.b)) continue;
    ranked.push(x);
  }
  if (!ranked.length) return "";
  const pit = (x) => (x.side === "away" ? x.g.homePitcher : x.g.awayPitcher);
  const team = (x) => (x.side === "away" ? x.g.awayTeam : x.g.homeTeam);
  const h2hLine = (b) => {
    const t = b.h2hVsSp && b.h2hVsSp.tier;
    const icon = t === "hot" || t === "good" ? "🔥" : t === "cold" || t === "weak" ? "🥶" : "";
    const h = b.h2hVsSp && b.h2hVsSp.short ? `H2H vs SP: ${b.h2hVsSp.short} ${icon}`.trim() : "H2H vs SP: —";
    return h;
  };
  const html = ranked.map((x, i) => {
    const { b, g } = x;
    const cc = confColor(b.conf);
    const edge = b.bestProp.edge;
    return `
      <div onclick="event.stopPropagation();focusBatter(${g.gamePk}, ${b.id})" style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #1e2d45;cursor:pointer;transition:background .15s" onmouseover="this.style.background='rgba(0,212,255,.07)'" onmouseout="this.style.background=''">
        <div style="min-width:0">
          <span style="color:#475569;font-size:11px;font-weight:800;margin-right:8px">#${i + 1}</span>
          <span style="font-weight:800;font-size:13px;color:#e2e8f0">${b.name}</span>
          <span class="stat-chip" style="font-size:9px;margin-left:4px">${team(x)}</span>
          <div style="font-size:10px;color:#64748b;margin-top:3px">vs ${pit(x) || "TBD"} · ${edge >= 0 ? "OVER" : "UNDER"} ${b.bestProp.stat} ${b.bestProp.line}</div>
          <div style="font-size:9px;color:#475569;margin-top:2px">${h2hLine(b)}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <span style="background:${cc}22;border:1px solid ${cc}44;color:${cc};border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700">${b.conf}%</span>
          <div style="font-size:10px;color:#64748b;margin-top:2px">rank ${b.top10Rank.toFixed(1)} · edge ${b.matchupScore.toFixed(1)}</div>
        </div>
      </div>`;
  }).join("");
  return `
    <div class="game-card" style="margin-bottom:14px;border-color:rgba(0,212,255,.35)" id="hitters-top10-panel">
      <div class="card-hd" style="cursor:default;padding:14px 18px">
        <div>
          <div style="font-size:11px;font-weight:800;color:#00d4ff;letter-spacing:.08em">TOP 10 MATCHUPS</div>
          <div style="font-size:10px;color:#64748b;margin-top:4px">Savant edge + prop line · career H2H vs SP weighted · click to jump</div>
        </div>
      </div>
      <div style="padding:0">${html}</div>
    </div>`;
}

function renderHitterCard(g) {
  const time = g.gameTime
    ? new Date(g.gameTime).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZoneName:"short"})
    : "";
  const avg3 = v => Math.round(v*1000).toString().padStart(3,"0");

  const renderSide = (batters, sideLabel, pitcherName, pitcherHand, gamePk) => {
    if (!batters.length) return `
      <div class="info-row" style="text-align:center;padding:16px">
        <div style="color:#64748b;font-size:12px">📋 ${sideLabel} lineup not yet posted — no PP lines found</div>
      </div>`;
    const fromRoster = batters.some(b => b.fromRoster);
    const rosterNote = fromRoster
      ? `<div style="font-size:10px;color:#ffd60a;font-weight:700;margin-bottom:8px">⚠ Lineup not posted — showing players with PP lines (no batting order)</div>`
      : "";
    return rosterNote + batters.map(b => {
      const { stats, h2h, propList, bestProp, conf, platoon, platoonLabel } = b;
      const cc = confColor(conf);
      const pitLast = (pitcherName||"TBD").split(" ").pop();

      let h2hHtml = `<span style="color:#334155;font-size:11px">vs ${pitcherName||"TBD"}: no H2H data</span>`;
      if (h2h && h2h.ab >= 3) {
        const hot  = h2h.avg >= stats.avg + 0.050;
        const cold = h2h.avg <= stats.avg - 0.050;
        const h2hColor = hot ? "#00ff88" : cold ? "#ff4d6d" : "#e2e8f0";
        const trend = hot ? "🔥 HOT" : cold ? "🥶 COLD" : "";
        h2hHtml = `<span style="color:#64748b;font-size:11px">vs ${pitcherName||"TBD"}:</span> `
          + `<span style="font-weight:700;color:${h2hColor};font-size:12px">${h2h.hits}-${h2h.ab} (.${avg3(h2h.avg)})</span>`
          + (trend ? ` <span style="font-size:10px;font-weight:700;color:${h2hColor}">${trend}</span>` : "")
          + (h2h.hr > 0 ? ` <span class="stat-chip good">${h2h.hr}HR</span>` : "")
          + (h2h.bb > 0 ? ` <span class="stat-chip">${h2h.bb}BB</span>` : "")
          + ` <span style="color:#475569;font-size:10px">(career)</span>`;
      } else if (h2h && h2h.ab > 0) {
        h2hHtml = `<span style="color:#475569;font-size:11px">vs ${pitcherName||"TBD"}: ${h2h.hits}-${h2h.ab} (small sample)</span>`;
      }

      const chips = propList.map(p => {
        const up = p.edge != null && Number.isFinite(p.edge) ? p.edge >= 0 : true;
        const eStr = p.edge != null && Number.isFinite(p.edge) ? Math.abs(p.edge).toFixed(1) : "—";
        return `<span class="stat-chip ${up?"good":"bad"}">${p.stat} ${p.line} ${up?"↑":"↓"}${eStr}</span>`;
      }).join(" ");

      const bestStr = bestProp
        ? `<span style="font-weight:700;font-size:11px;color:${cc}">`
          + `${bestProp.edge>=0?"OVER":"UNDER"} ${bestProp.stat} ${bestProp.line} `
          + `<span style="color:#64748b">· proj ${bestProp.proj.toFixed(1)}</span> `
          + `<span style="background:${cc}22;border:1px solid ${cc}55;border-radius:4px;padding:1px 6px;font-size:10px">${conf}%</span>`
          + `</span>`
        : `<span style="color:#4a5568;font-size:11px">proj ${b.proj.hits.toFixed(1)}H / ${b.proj.runs.toFixed(1)}R / ${b.proj.rbi.toFixed(1)}RBI</span>`;

      // Platoon split chip
      let platoonHtml = "";
      if (platoon && platoon.pa >= 20) {
        const pitHand = pitcherHand || "?";
        const advantage = (b.bats==="L"&&pitHand==="R")||(b.bats==="R"&&pitHand==="L");
        const disadvantage = (b.bats==="L"&&pitHand==="L")||(b.bats==="R"&&pitHand==="R");
        const splitColor = advantage?"#00ff88":disadvantage?"#ff4d6d":"#94a3b8";
        const platoonAvg = platoon.avg ? `.${avg3(platoon.avg)}` : "—";
        platoonHtml = `<span class="stat-chip" style="color:${splitColor};border-color:${splitColor}55;background:${splitColor}11">`
          + `vs${pitHand}HP: ${platoonAvg} AVG (${platoon.pa} PA)</span>`;
      }

      return `
        <div class="batter-row" id="batter-${gamePk}-${b.id}" onclick="toggleBatterLog(${b.id}, ${g.season})">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:4px;margin-bottom:3px">
            <div>
              <span class="pitcher-name">${b.order ? `#${b.order} ` : ""}${b.name}</span>
              <span class="stat-chip" style="margin-left:5px">${b.pos}</span>
              <span class="stat-chip" style="margin-left:3px">B:${b.bats}</span>
              <span style="font-size:9px;color:#334155;margin-left:6px">▾ L5</span>
            </div>
            <div>${bestStr}</div>
          </div>
          <div style="margin-bottom:4px;font-size:12px">${h2hHtml}</div>
          <div class="batter-stats-line">
            .${avg3(stats.avg)} AVG · .${avg3(stats.slg)} SLG · ${stats.hr} HR · ${Number.isFinite(stats.runs) ? stats.runs : "—"} R · ${Number.isFinite(stats.rbi) ? stats.rbi : "—"} RBI · ${stats.bb} BB (${stats.pa} PA)
            ${stats.scOk && stats.scXwoba != null ? `<span style="color:#a78bfa;font-size:10px;margin-left:6px">· Savant xwOBA ${stats.scXwoba.toFixed(3)}${stats.scSeason ? ` (${stats.scSeason})` : ""}</span>` : ""}
          </div>
          ${platoonHtml ? `<div style="margin-top:4px">${platoonHtml}</div>` : ""}
          ${chips ? `<div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:4px">${chips}</div>` : ""}
          <div class="batter-gl" id="bgl-${b.id}"></div>
        </div>`;
    }).join("");
  };

  const topPreview = g.topProps.map(b =>
    `<span class="stat-chip ${b.bestProp.edge>=0?"good":"bad"}">`
    + `${b.name.split(" ").pop()} ${b.bestProp.edge>=0?"OVR":"UND"} ${b.bestProp.stat} ${b.bestProp.line}`
    + `</span>`
  ).join(" ");

  // Top projections with good H2H matchups
  const topH2H = [
    ...g.awayBatters.map(b => ({...b, _side:"away"})),
    ...g.homeBatters.map(b => ({...b, _side:"home"})),
  ].filter(b => {
    if (!b.bestProp) return false;
    if (!b.h2h || b.h2h.ab < 3) return false;
    // Include any batter hitting .250+ vs this pitcher with a meaningful sample
    const hot    = b.h2h.avg >= b.stats.avg + 0.050;
    const solid  = b.h2h.ab >= 10 && b.h2h.avg >= b.stats.avg - 0.010;
    const decent = b.h2h.avg >= 0.250;
    return hot || solid || decent;
  }).sort((a, b) => {
    // HOT batters first, then by h2h avg, then by conf
    const aHot = a.h2h.avg >= a.stats.avg + 0.050 ? 1 : 0;
    const bHot = b.h2h.avg >= b.stats.avg + 0.050 ? 1 : 0;
    if (bHot !== aHot) return bHot - aHot;
    if (b.h2h.avg !== a.h2h.avg) return b.h2h.avg - a.h2h.avg;
    return b.conf - a.conf;
  }).slice(0, 6);

  const topH2HSection = topH2H.length ? (() => {
    const rows = topH2H.map(b => {
      const teamAbbr    = b._side === "away" ? g.awayTeam : g.homeTeam;
      const pitcherName = b._side === "away" ? g.homePitcher : g.awayPitcher;
      const hot         = b.h2h.avg >= b.stats.avg + 0.050;
      const h2hColor    = hot ? "#00ff88" : "#94a3b8";
      const cc          = confColor(b.conf);
      const ab3         = v => Math.round(v*1000).toString().padStart(3,"0");
      return `
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;padding:7px 0;border-bottom:1px solid #0d2318">
          <div>
            <span style="font-weight:700;font-size:13px;color:#e2e8f0">${b.name}</span>
            <span class="stat-chip" style="margin-left:4px;font-size:10px">${teamAbbr}</span>
            <span class="stat-chip" style="margin-left:2px;font-size:10px">${b.pos}</span>
            <div style="margin-top:3px;font-size:11px;display:flex;align-items:center;gap:5px;flex-wrap:wrap">
              <span style="color:#64748b">vs ${pitcherName}:</span>
              <span style="font-weight:700;color:${h2hColor}">${b.h2h.hits}-${b.h2h.ab} (.${ab3(b.h2h.avg)})</span>
              ${hot ? `<span style="color:#00ff88;font-size:10px;font-weight:700">🔥 HOT</span>` : `<span style="color:#94a3b8;font-size:10px">✓ SOLID</span>`}
              ${b.h2h.hr > 0 ? `<span class="stat-chip good" style="font-size:10px">${b.h2h.hr}HR</span>` : ""}
              ${b.h2h.bb > 0 ? `<span class="stat-chip" style="font-size:10px">${b.h2h.bb}BB</span>` : ""}
              <span style="color:#334155;font-size:10px">(career)</span>
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-weight:700;font-size:12px;color:${cc}">
              ${b.bestProp.edge >= 0 ? "OVER" : "UNDER"} ${b.bestProp.stat} ${b.bestProp.line}
              <span style="color:#64748b;font-weight:400;font-size:11px"> · proj ${b.bestProp.proj.toFixed(1)}</span>
            </div>
            <div style="margin-top:3px">
              <span style="background:${cc}22;border:1px solid ${cc}55;border-radius:4px;padding:2px 8px;font-size:11px;color:${cc};font-weight:700">${b.conf}%</span>
            </div>
          </div>
        </div>`;
    }).join("");
    return `
          <div style="margin-bottom:14px;border:1px solid #14532d55;border-radius:8px;overflow:hidden;background:#050f09">
        <div style="background:#0a1f13;padding:8px 12px;border-bottom:1px solid #14532d55;display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;font-weight:700;color:#00ff88;letter-spacing:.07em">🔥 TOP PICKS — Strong H2H Matchups</span>
          <span style="font-size:10px;color:#334155">(best career splits vs today's pitcher)</span>
        </div>
        <div style="padding:0 12px 4px">${rows}</div>
      </div>`;
  })() : "";

  return `
    <div class="game-card" id="hg-${g.gamePk}">
      <div class="card-hd" onclick="toggle('hg-${g.gamePk}')">
        <div>
          <div class="card-teams">${g.awayTeam} @ ${g.homeTeam}</div>
          <div style="font-size:11px;color:#64748b;margin-top:3px;display:flex;flex-wrap:wrap;align-items:center;gap:5px">
            <span>${time}${time?" · ":""}${g.awayPitcher} vs ${g.homePitcher}</span>
            ${g.hrFactor !== 1.0 ? `<span class="stat-chip">Park HR ×${g.hrFactor.toFixed(2)}</span>` : ""}
            ${g.hitFactor && g.hitFactor !== 1.0 ? `<span class="stat-chip ${g.hitFactor>1?"warn":""}">Hit ×${g.hitFactor.toFixed(2)}</span>` : ""}
            ${g.parkRunEnvPF != null ? `<span class="stat-chip" title="Run-environment park factor in model (×${g.parkRunEnvOffMult != null ? g.parkRunEnvOffMult.toFixed(3) : "?"} offense)">🏟 PF ${g.parkRunEnvPF}</span>` : ""}
            ${g.ump ? `<span class="stat-chip">⚖️ ${g.ump.name.split(" ").pop()}</span>` : ""}
          </div>
          <div style="margin-top:7px;display:flex;gap:5px;flex-wrap:wrap">
            ${topPreview
              ? topPreview
              : g.rosterFallback
                ? `<span style="color:#ffd60a;font-size:11px">⚠ No lineup yet — showing PP-lined players</span>`
                : `<span style="color:#64748b;font-size:11px">Lineups pending — no PP lines yet</span>`}
          </div>
        </div>
        <div class="card-right">
          <div class="conf-num" style="color:#00d4ff">${g.ppLineCount}</div>
          <div style="font-size:10px;color:#64748b">PP props</div>
        </div>
      </div>
      <div class="card-bd" id="hg-${g.gamePk}-bd">
        <div style="margin-top:14px">
          ${topH2HSection}
          <div class="hitter-section-title">${g.awayTeam} BATTERS vs <span style="color:#00d4ff">${g.homePitcher}</span> <span class="hand-tag">${g.homePitcherHand||"R"}HP</span></div>
          ${renderSide(g.awayBatters, g.awayTeam, g.homePitcher, g.homePitcherHand, g.gamePk)}
          <div class="hitter-section-title" style="margin-top:18px">${g.homeTeam} BATTERS vs <span style="color:#00d4ff">${g.awayPitcher}</span> <span class="hand-tag">${g.awayPitcherHand||"R"}HP</span></div>
          ${renderSide(g.homeBatters, g.homeTeam, g.awayPitcher, g.awayPitcherHand, g.gamePk)}
        </div>
      </div>
    </div>`;
}


async function toggleBatterLog(playerId, season) {
  const el = document.getElementById(`bgl-${playerId}`);
  if (!el) return;
  el.classList.toggle("open");
  if (!el.classList.contains("open")) return;
  if (el.innerHTML.trim()) return; // already rendered
  el.innerHTML = `<div style="color:#475569;font-size:11px;padding:4px 0">Loading…</div>`;
  // Always try the current calendar year first so we get 2026 games as soon as they start
  const currentYear = new Date().getFullYear();
  let log = [];
  if (currentYear !== season) log = await getHitterGameLog(playerId, currentYear);
  if (!log.length) log = await getHitterGameLog(playerId, season);
  if (!log.length) {
    el.innerHTML = `<div style="color:#475569;font-size:11px;padding:4px 0">No recent game data</div>`;
    return;
  }
  el.innerHTML = `
    <table class="game-log-table" style="margin-top:4px">
      <thead><tr>
        <th>DATE</th><th>OPP</th><th>AB</th>
        <th>H</th><th>HR</th><th>RBI</th><th>BB</th><th>TB</th>
      </tr></thead>
      <tbody>
        ${log.map(g => {
          const hColor = g.h >= 3 ? "#00ff88" : g.h === 0 ? "#ff4d6d" : "#e2e8f0";
          return `<tr>
            <td>${g.date}</td>
            <td style="color:#e2e8f0;font-weight:700">${g.opp}</td>
            <td>${g.ab}</td>
            <td style="color:${hColor};font-weight:700">${g.h}</td>
            <td style="color:${g.hr>0?"#ff4d6d":"#64748b"}">${g.hr}</td>
            <td>${g.rbi}</td>
            <td>${g.bb}</td>
            <td>${g.tb}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>`;
}

            ${bar("Opp OBP", g.oppOBP, 0.42, "#ff4d6d")}

              ${g.ppOutsLine!=null?`<p style="font-size:11px;color:#ffd60a;margin-top:3px">📊 Book ${g.ppOutsLine} outs (~${(g.ppOutsLine/3).toFixed(1)} IP) blended to ~${g.expectedIP ?? g.projInnings} IP for projection</p>`:""}

        </div>
        ${renderLineup(g.oppLineup, g.oppTeam + " (Opp)", g.hand)}
        ${renderGameLog(g.gameLog, g.hand)}
        ${g.h2hData && g.h2hData.length ? renderH2H(g.h2hData, g.pitcher) : ""}
        ${g.catcherInfo ? renderCatcherPanel(g.catcherInfo, g.oppTeam + " (Batting)") : ""}
        ${g.ump && g.ump.src === "known" ? renderUmpZoneChart(g.ump.name) : ""}
        <div class="analysis-box" style="border:1px solid ${color}33;margin-top:8px">
          <div class="analysis-lbl">MODEL ANALYSIS</div>
          <div class="analysis-txt">${g.analysis}</div>
        </div>
      </div>
    </div>`;
}

function toggle(id) {
  const card = document.getElementById(id);
  const bd   = document.getElementById(id + "-bd");
  const open = bd.classList.toggle("open");
  card.classList.toggle("open", open);
}

function focusBatter(gamePk, playerId) {
  const cid = `hg-${gamePk}`;
  const card = document.getElementById(cid);
  if (!card) return;
  const bd = document.getElementById(`${cid}-bd`);
  if (bd && !bd.classList.contains("open")) {
    bd.classList.add("open");
    card.classList.add("open");
  }
  setTimeout(() => {
    const row = document.getElementById(`batter-${gamePk}-${playerId}`);
    if (row) {
      row.scrollIntoView({ behavior: "smooth", block: "center" });
      row.style.boxShadow = "0 0 0 2px #00d4ff";
      row.style.borderRadius = "6px";
      setTimeout(() => {
        row.style.boxShadow = "";
        row.style.borderRadius = "";
      }, 2200);
    }
  }, 100);
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────────
function setStatus(msg) { document.getElementById("load-status").textContent = msg; }
function setLoading(on) {
  document.getElementById("loader").style.display = on ? "flex" : "none";
  document.getElementById("refresh-btn").disabled = on;
}
function setError(msg) {
  const b = document.getElementById("error-box");
  b.style.display = msg ? "flex" : "none";
  document.getElementById("error-msg").textContent = msg ? "⚠ " + msg : "";
}

function renderFilters(tab) {
  const opts = tab === "nrfi"
    ? ["all","strong","nrfi","yrfi"]
    : tab === "hitters"
    ? ["all","pp","over","under"]
    : ["all","strong","over","under"];
  const f = document.getElementById("filters");
  f.innerHTML = opts.map(o => `
    <button class="filter-btn${o===activeFilter?" active":""}" onclick="setFilter('${o}')">${o==="strong"?"70%+":o==="pp"?"Has book line":o.toUpperCase()}</button>
  `).join("") + `<span id="game-count"></span>`;
  f.style.display = "flex";
}

function filterData(data) {
  return data.filter(g => {
    if (activeFilter==="all")    return true;
    if (activeFilter==="strong") return g.confidence>=70;
    if (activeFilter==="nrfi")   return g.confidence>=50;
    if (activeFilter==="yrfi")   return g.confidence<50;
    if (activeFilter==="over")   return (g.edge != null ? g.edge>0 : g.ppLineCount>0);
    if (activeFilter==="under")  return (g.edge != null ? g.edge<=0 : false);
    if (activeFilter==="pp")     return g.ppLineCount > 0;
    return true;
  });
}

function renderSummary(data, tab) {
  const ppCount = tab === "strikeouts" ? data.filter(g=>g.lineSrc==="sportsbook").length : 0;
  const stats = tab === "nrfi"
    ? [
        { l:"NRFI Plays",    v:data.filter(g=>g.confidence>=50).length, c:"#00ff88" },
        { l:"Strong (70%+)", v:data.filter(g=>g.confidence>=70).length, c:"#00d4ff" },
        { l:"📊 Book lines",   v:data.filter(g=>g.ppNRFILine!=null).length, c:"#a78bfa" },
      ]
    : tab === "hitters"
    ? [
        { l:"📊 Book props",   v:data.reduce((s,g)=>s+g.ppLineCount,0),  c:"#00d4ff" },
        { l:"Overs",         v:data.reduce((s,g)=>s+[...g.awayBatters,...g.homeBatters].filter(b=>b.bestProp&&b.bestProp.edge>0).length,0), c:"#00ff88" },
        { l:"Unders",        v:data.reduce((s,g)=>s+[...g.awayBatters,...g.homeBatters].filter(b=>b.bestProp&&b.bestProp.edge<0).length,0), c:"#ff4d6d" },
      ]
    : [
        { l:"📊 Book lines",  v:ppCount,                         c:"#00d4ff" },
        { l:"Over Plays",   v:data.filter(g=>g.edge>0).length, c:"#00ff88" },
        { l:"Under Plays",  v:data.filter(g=>g.edge<=0).length,c:"#ff4d6d" },
      ];
  const grid = document.getElementById("summary-grid");
  grid.innerHTML = stats.map(s => `
    <div class="sum-card">
      <div class="sum-val" style="color:${s.c}">${s.v}</div>
      <div class="sum-lbl">${s.l}</div>
    </div>`).join("");
  grid.style.display = "grid";
}

function renderCards(data, tab) {
  const filtered = filterData(data);
  const top10 = tab === "hitters" ? renderTop10Hitters(filtered) : "";
  document.getElementById("cards").innerHTML = top10 + filtered.map(g =>
    tab === "nrfi" ? renderNRFICard(g) : tab === "hitters" ? renderHitterCard(g) : renderSOCard(g)
  ).join("");
  const cnt = document.getElementById("game-count");
  if (cnt) {
    if (tab === "strikeouts") {
      const nGames = new Set(filtered.map(g => g.gamePk)).size;
      cnt.textContent =
        nGames === filtered.length
          ? `${filtered.length} games`
          : `${nGames} games · ${filtered.length} pitchers`;
    } else {
      cnt.textContent = filtered.length + " games";
    }
  }
  document.getElementById("disclaimer").style.display = "block";
}

function setFilter(f) {
  activeFilter = f;
  renderFilters(activeTab);
  const d = cache[activeTab];
  if (d) { renderSummary(d, activeTab); renderCards(d, activeTab); }
}

// ─── MAIN LOAD ────────────────────────────────────────────────────────────────
async function loadTab(tab) {
  setLoading(true);
  setError("");
  document.getElementById("cards").innerHTML = "";
  document.getElementById("summary-grid").style.display = "none";
  document.getElementById("disclaimer").style.display = "none";
  document.getElementById("filters").style.display = "none";

  const date    = selectedDate || today();
  const dateYear= parseInt(date.split("-")[0], 10);
  const dateMon = parseInt(date.split("-")[1], 10);
  const season  = dateMon < 4 ? dateYear - 1 : dateYear;
  const isSpring = dateMon <= 2;

  const label = new Date(`${date}T12:00:00`).toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"});
  document.getElementById("subtitle").textContent =
    `${label} · ${isSpring ? "Spring Training · " : ""}Stats from ${season} season`;

  try {
    setStatus("Fetching schedule…");
    const games = await getSchedule(date);

    if (!games.length) {
      setLoading(false);
      document.getElementById("cards").innerHTML = `
        <div style="text-align:center;padding:50px 0">
          <div style="font-size:44px;margin-bottom:14px">⚾</div>
          <p style="color:#e2e8f0;font-size:15px;font-weight:700;margin-bottom:8px">No games found for ${date}</p>
          <p style="color:#64748b;font-size:12px;margin-bottom:22px">Try a date during the MLB season (Apr–Oct):</p>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
            ${["2025-09-25","2025-08-15","2025-07-04","2025-06-01","2025-05-01"].map(d =>
              `<button onclick="jumpTo('${d}')" class="btn btn-accent">${d}</button>`
            ).join("")}
          </div>
        </div>`;
      return;
    }

    // Load sportsbook lines (Odds-API) — used for pitcher resolution on BOTH tabs
    await loadPPLines(games, date);
    if (tab === "strikeouts") {
      document.getElementById("pp-debug-btn").style.display = "inline-block";
    }

    setStatus(`Resolving pitchers, weather & umpires for ${games.length} games…`);
    const data = tab === "nrfi"
      ? await buildNRFI(games, season)
      : tab === "hitters"
      ? await buildHitters(games, season)
      : await buildSO(games, season);

    cache[tab] = data;
    if (tab === "strikeouts") recordStrikeoutOddsHistory(data, date);
    activeFilter = "all";
    renderFilters(tab);
    renderSummary(data, tab);
    renderCards(data, tab);
    document.getElementById("updated").textContent = "Updated " + new Date().toLocaleTimeString();
  } catch(e) {
    setError(e.message || "Failed to load. Check internet connection.");
  }
  setLoading(false);
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeTab = btn.dataset.tab;
    // Filters are tab-specific (over/under vs nrfi/yrfi). Stale activeFilter hides all rows
    // or applies the wrong slice after switching tabs.
    activeFilter = "all";
    if (cache[activeTab]) {
      renderFilters(activeTab);
      renderSummary(cache[activeTab], activeTab);
      renderCards(cache[activeTab], activeTab);
    } else {
      loadTab(activeTab);
    }
  });
});

document.getElementById("refresh-btn").addEventListener("click", () => {
  cache = { nrfi: null, strikeouts: null, hitters: null };
  ppLoaded = false; ppLines = {}; ppHitterLines = {}; ppTeamMap = {}; ppNRFI = {}; clData = {}; clSeedLoaded = false;
  ppLinesSnapshot = {}; lineMovements = {}; oddsMovements = {};
  _umpData = {}; _weather = {};
  [_lineup, _batterKPct, _pitcher, _teamSplit, _personBats].forEach(c => Object.keys(c).forEach(k => delete c[k]));
  loadTab(activeTab);
});
document.getElementById("retry-btn").addEventListener("click", () => loadTab(activeTab));
document.getElementById("date-picker").addEventListener("change", e => {
  selectedDate = e.target.value;
  cache = { nrfi: null, strikeouts: null, hitters: null };
  ppLoaded = false; ppLines = {}; ppHitterLines = {}; ppTeamMap = {}; ppNRFI = {}; clData = {}; clSeedLoaded = false;
  ppLinesSnapshot = {}; lineMovements = {}; oddsMovements = {};
  _umpData = {}; _weather = {};
  [_lineup, _batterKPct, _pitcher, _teamSplit, _personBats].forEach(c => Object.keys(c).forEach(k => delete c[k]));
  loadTab(activeTab);
});

async function reloadStrikeoutsQuiet() {
  if (activeTab !== "strikeouts") return;
  const date = selectedDate || today();
  try {
    const games = await getSchedule(date);
    if (!games.length) return;
    ppLoaded = false;
    await loadPPLines(games, date);
    const dateYear = parseInt(date.split("-")[0], 10);
    const dateMon = parseInt(date.split("-")[1], 10);
    const season = dateMon < 4 ? dateYear - 1 : dateYear;
    const data = await buildSO(games, season);
    cache.strikeouts = data;
    recordStrikeoutOddsHistory(data, date);
    renderSummary(data, "strikeouts");
    renderCards(data, "strikeouts");
    const el = document.getElementById("updated");
    if (el) el.textContent = "Updated " + new Date().toLocaleTimeString() + " (hourly)";
  } catch (e) {
    console.warn("[strikeouts hourly]", e);
  }
}
setInterval(() => {
  if (document.hidden && activeTab === "strikeouts") reloadStrikeoutsQuiet();
}, 3600000);

function jumpTo(date) {
  selectedDate = date;
  document.getElementById("date-picker").value = date;
  cache = { nrfi: null, strikeouts: null, hitters: null };
  ppLoaded = false; ppLines = {}; ppHitterLines = {}; ppTeamMap = {}; ppNRFI = {}; clData = {}; clSeedLoaded = false;
  ppLinesSnapshot = {}; lineMovements = {}; oddsMovements = {};
  _umpData = {}; _weather = {};
  [_lineup, _batterKPct, _pitcher, _teamSplit, _personBats].forEach(c => Object.keys(c).forEach(k => delete c[k]));
  loadTab(activeTab);
}

// Start
selectedDate = today();
document.getElementById("date-picker").value = selectedDate;
loadTab("nrfi");
</script>
</body>
