// ─── DATA FETCH ───────────────────────────────────────────────────────────────
async function getSchedule(date) {
  const mon = parseInt(date.split("-")[1], 10);
  // Try regular season first (covers Mar onward), then spring training
  const gameTypes = mon <= 2 ? ["S", "R"] : ["R", "S"];
  for (const gt of gameTypes) {
    try {
      const d = await mlbGet(`/schedule?sportId=1&date=${date}&hydrate=probablePitchers,lineups&gameType=${gt}`);
      const games = (d.dates && d.dates[0] && d.dates[0].games) || [];
      if (games.length > 0) return games;
    } catch(_) {}
  }
  return [];
}

async function getPitcherData(id, season) {
  const key = `${id}-${season}`;
  if (_pitcher[key]) return _pitcher[key];

  const isSpring = false;

  // Parallel: person (hand), season stats, game log (enough rows for last-5 + last-3 splits)
  const fetches = [
    mlbGet(`/people/${id}`),
    mlbGet(`/people/${id}/stats?stats=season&group=pitching&gameType=R&season=${season}`),
    mlbGet(`/people/${id}/stats?stats=gameLog&group=pitching&season=${season}&limit=12`),
  ];
  if (isSpring) {
    fetches.push(mlbGet(`/people/${id}/stats?stats=season&group=pitching&gameType=S&season=${season + 1}`));
    fetches.push(mlbGet(`/people/${id}/stats?stats=gameLog&group=pitching&gameType=S&season=${season + 1}&limit=5`));
  }

  const settled = await Promise.allSettled(fetches);
  const [personData, statsData, logData, springStatsData, springLogData] = settled;

  // Hand + current team
  let hand = "R";
  let currentTeamAbbr = null;
  let currentTeamId   = null;
  if (personData.status === "fulfilled") {
    const person = personData.value?.people?.[0];
    hand = person?.pitchHand?.code || "R";
    currentTeamAbbr = person?.currentTeam?.abbreviation?.toUpperCase() || null;
    currentTeamId   = person?.currentTeam?.id || null;
  }

  // Season stats (prior regular season)
  const s = statsData.status === "fulfilled"
    ? statsData.value?.stats?.[0]?.splits?.[0]?.stat
    : null;
  const ip  = s ? parseIP(s.inningsPitched) : 0;
  const era = s ? parseFloat(s.era)  || 4.20 : 4.20;
  const k9  = s ? parseFloat(s.strikeoutsPer9Inn) || (ip ? (s.strikeOuts||0)*9/ip : 8.8) : 8.8;
  const kPct= s ? ((s.strikeOuts||0)/(s.battersFaced||1)*100) : 22;
  const gs  = s ? (s.gamesStarted||20) : 20;
  const whip= s ? parseFloat(s.whip)||1.30 : 1.30;
  const bb9 = s && ip ? ((s.baseOnBalls||0)*9/ip) : 3.2;
  const bbPct = s ? ((s.baseOnBalls||0)/(s.battersFaced||1)*100) : 8.0;
  const kMinusBbPct = kPct - bbPct;
  const bfPerIp = s && ip > 0 ? (s.battersFaced||0) / ip : 4.35;
  const strikePct = s
    ? (parseFloat(s.strikePercentage) || ((s.strikes||0) / Math.max(1, s.numberOfPitches||0)))
    : 0.645;

  // Recent form – last 5 regular-season starts; last-3 K% for short-term trend
  let recentERA = null, recentK9 = null, recentKPct = null, recentKPct3 = null, recentStarts = 0;
  if (logData.status === "fulfilled") {
    const splits = logData.value?.stats?.[0]?.splits || [];
    const starts = splits.filter(sp => sp.stat?.gamesStarted > 0).slice(0,5);
    if (starts.length) {
      recentStarts = starts.length;
      const totalER = starts.reduce((a,sp)=>a+(sp.stat.earnedRuns||0),0);
      const totalIP = starts.reduce((a,sp)=>a+parseIP(sp.stat.inningsPitched),0);
      const totalK  = starts.reduce((a,sp)=>a+(sp.stat.strikeOuts||0),0);
      const totalBF = starts.reduce((a,sp)=>a+(sp.stat.battersFaced||0),0);
      recentERA = totalIP ? parseFloat((totalER*9/totalIP).toFixed(2)) : null;
      recentK9  = totalIP ? parseFloat((totalK*9/totalIP).toFixed(1))  : null;
      if (totalBF >= 20) recentKPct = parseFloat(((totalK/totalBF)*100).toFixed(2));
      if (starts.length >= 3) {
        const s3 = starts.slice(0, 3);
        const bf3 = s3.reduce((a,sp)=>a+(sp.stat.battersFaced||0),0);
        const k3  = s3.reduce((a,sp)=>a+(sp.stat.strikeOuts||0),0);
        if (bf3 >= 12) recentKPct3 = parseFloat(((k3/bf3)*100).toFixed(2));
      }
    }
  }

  // Spring training stats — used for current accuracy during ST
  let springERA = null, springK9 = null, springKPct = null, springIP = null, springStarts = 0;
  if (isSpring && springStatsData && springStatsData.status === "fulfilled") {
    const ss = springStatsData.value?.stats?.[0]?.splits?.[0]?.stat;
    if (ss && parseIP(ss.inningsPitched) > 0) {
      springIP     = parseIP(ss.inningsPitched);
      springERA    = parseFloat(ss.era) || null;
      springK9     = springIP ? parseFloat(((ss.strikeOuts||0)*9/springIP).toFixed(1)) : null;
      springKPct   = ss.battersFaced > 0 ? parseFloat(((ss.strikeOuts||0)/(ss.battersFaced)*100).toFixed(1)) : null;
      springStarts = ss.gamesStarted || 0;
    }
  }
  // Spring game log — last 3 ST starts
  let stRecentERA = null, stRecentK9 = null;
  if (isSpring && springLogData && springLogData.status === "fulfilled") {
    const splits = springLogData.value?.stats?.[0]?.splits || [];
    const starts = splits.filter(sp => sp.stat?.gamesStarted > 0).slice(0,3);
    if (starts.length >= 1) {
      const totalER = starts.reduce((a,sp)=>a+(sp.stat.earnedRuns||0),0);
      const totalIP = starts.reduce((a,sp)=>a+parseIP(sp.stat.inningsPitched),0);
      const totalK  = starts.reduce((a,sp)=>a+(sp.stat.strikeOuts||0),0);
      stRecentERA = totalIP ? parseFloat((totalER*9/totalIP).toFixed(2)) : null;
      stRecentK9  = totalIP ? parseFloat((totalK*9/totalIP).toFixed(1))  : null;
    }
  }

  // Individual start records for game log display (last 5 starts)
  let gameLog = [];
  if (logData.status === "fulfilled") {
    const splits = logData.value?.stats?.[0]?.splits || [];
    gameLog = splits.filter(sp => sp.stat?.gamesStarted > 0).slice(0,5).map(sp => ({
      date:    (sp.date || "").slice(5),   // MM-DD
      opp:     sp.opponent?.abbreviation || sp.opponent?.name || "?",
      ip:      sp.stat.inningsPitched || "0",
      k:       sp.stat.strikeOuts || 0,
      er:      sp.stat.earnedRuns || 0,
      h:       sp.stat.hits || 0,
      bb:      sp.stat.baseOnBalls || 0,
      result:  sp.stat.wins > 0 ? "W" : sp.stat.losses > 0 ? "L" : "ND",
    }));
  }

  const result = {
    hand, era, k9, kPct, ip, gs, whip, bb9,
    bfPerIp, recentKPct, recentKPct3, kMinusBbPct, strikePct,
    fgSwStr: null, fgCSW: null, fgKPct: null, fgBBPct: null, fgSeason: null, fgSource: null,
    recentERA, recentK9, recentStarts, gameLog,
    springERA, springK9, springKPct, springIP, springStarts,
    stRecentERA, stRecentK9,
    currentTeamAbbr, currentTeamId,
  };

  // Pitcher advanced: FanGraphs and/or Savant Statcast CSV — /api/fangraphs_pitcher
  try {
    const fr = await fetchTimeout(`/api/fangraphs_pitcher?mlbam=${id}&season=${season}`, 28000);
    if (fr) {
      const j = await fr.json().catch(() => null);
      if (j && j.ok) {
        result.fgSwStr = j.swStr != null ? Number(j.swStr) : null;
        result.fgCSW = j.csw != null ? Number(j.csw) : null;
        result.fgKPct = j.kPct != null ? Number(j.kPct) : null;
        result.fgBBPct = j.bbPct != null ? Number(j.bbPct) : null;
        result.fgSeason = j.season != null ? Number(j.season) : null;
        result.fgSource = j.source || null;
      }
    }
  } catch (_) {}

  _pitcher[key] = result;
  return result;
}

// ── CATCHER LOOKUP FROM BOXSCORE ─────────────────────────────────────────────
const _catcherCache = {};
async function getCatcherForTeam(gamePk, side) {
  const key = `${gamePk}-${side}`;
  if (_catcherCache[key] !== undefined) return _catcherCache[key];
  try {
    const d = await mlbGet(`/game/${gamePk}/boxscore`);
    const teamData = side === "home" ? d.teams?.home : d.teams?.away;
    const players = teamData?.players || {};
    // Find catcher in batting order
    const order = teamData?.battingOrder || [];
    for (const id of order) {
      const p = players[`ID${id}`];
      if (p?.position?.abbreviation === "C") {
        const name = p.person?.fullName || "";
        const framing = getCatcherFraming(name);  // returns entry object or null
        _catcherCache[key] = { name, framing };
        return _catcherCache[key];
      }
    }
    // Fallback: scan all players for catchers (no gameStatus filter — works pre-game too)
    for (const [, p] of Object.entries(players)) {
      if (p?.position?.abbreviation === "C") {
        const name = p.person?.fullName || "";
        if (!name) continue;
        const framing = getCatcherFraming(name);
        _catcherCache[key] = { name, framing };
        return _catcherCache[key];
      }
    }
  } catch(_) {}
  _catcherCache[key] = null;
  return null;
}

// ── PITCHER VS BATTER HEAD-TO-HEAD ───────────────────────────────────────────
const _h2hCache = {};

/** Merge two vsPlayer stat rows (current + prior season) for last-2-year H2H. */
function mergeVsPlayerStats(s0, s1) {
  if (!s0 && !s1) return null;
  const a = s0 || {};
  const b = s1 || {};
  const ab = (a.atBats || 0) + (b.atBats || 0);
  const k = (a.strikeOuts || 0) + (b.strikeOuts || 0);
  const hits = (a.hits || 0) + (b.hits || 0);
  const hr = (a.homeRuns || 0) + (b.homeRuns || 0);
  const bb = (a.baseOnBalls || 0) + (b.baseOnBalls || 0);
  const hbp = (a.hitByPitch || 0) + (b.hitByPitch || 0);
  const sf = (a.sacFlies || 0) + (b.sacFlies || 0);
  const sbu = (a.sacBunts || 0) + (b.sacBunts || 0);
  const dbl = (a.doubles || 0) + (b.doubles || 0);
  const tpl = (a.triples || 0) + (b.triples || 0);
  let pa = (a.plateAppearances || 0) + (b.plateAppearances || 0);
  if (pa <= 0) pa = ab + bb + hbp + sf + sbu;
  const singles = Math.max(0, hits - dbl - tpl - hr);
  const tb = singles + 2 * dbl + 3 * tpl + 4 * hr;
  const slg = ab > 0 ? tb / ab : 0;
  const obp = pa > 0 ? (hits + bb + hbp) / pa : 0;
  const ops = parseFloat((obp + slg).toFixed(3));
  return { ab, k, hits, hr, pa, bb, hbp, ops };
}

/** Same order as lineup (slot 1–9). K% vs this pitcher uses PA; stats = last 2 seasons only. */
async function getPitcherVsLineup(pitcherId, batters, season) {
  if (!pitcherId || !batters || batters.length === 0) return [];
  const y0 = season;
  const y1 = season - 1;
  const slice = batters.slice(0, 9);
  return Promise.all(slice.map(async (batter) => {
    const key = `${pitcherId}-${batter.id}-2yr-${y0}`;
    if (_h2hCache[key] !== undefined) return _h2hCache[key];
    try {
      const [d0, d1] = await Promise.all([
        mlbGet(`/people/${pitcherId}/stats?stats=vsPlayer&group=pitching&opposingPlayerId=${batter.id}&season=${y0}`),
        mlbGet(`/people/${pitcherId}/stats?stats=vsPlayer&group=pitching&opposingPlayerId=${batter.id}&season=${y1}`),
      ]);
      const s0 = d0.stats?.[0]?.splits?.[0]?.stat;
      const s1 = d1.stats?.[0]?.splits?.[0]?.stat;
      const stat = mergeVsPlayerStats(s0, s1);
      if (!stat || stat.ab < 3) {
        _h2hCache[key] = null;
        return null;
      }
      const paUse = Math.max(stat.pa, stat.ab);
      const kPctH2h = paUse > 0 ? parseFloat(((stat.k / paUse) * 100).toFixed(2)) : null;
      const r = {
        playerId: batter.id,
        name: batter.name,
        ab: stat.ab,
        pa: paUse,
        k: stat.k,
        kPctH2h,
        hits: stat.hits,
        avg: stat.ab > 0 ? parseFloat((stat.hits / stat.ab).toFixed(3)) : null,
        ops: Number.isFinite(stat.ops) ? stat.ops : null,
        hr: stat.hr,
        h2hLabel: `${y1}–${y0}`,
      };
      _h2hCache[key] = r;
      return r;
    } catch (_) {
      _h2hCache[key] = null;
      return null;
    }
  }));
}

/** Blend per-batter season K% vs hand with 2-year K% vs this SP (weighted by PA sample). */
function blendOppKPctWithH2h(lineupKData, h2hSlots) {
  if (!lineupKData || !lineupKData.batters || !h2hSlots || !h2hSlots.length) return null;
  const weights = [1.25, 1.20, 1.15, 1.05, 1.00, 0.95, 0.85, 0.80, 0.80];
  let tw = 0;
  let tkw = 0;
  for (let i = 0; i < lineupKData.batters.length; i++) {
    const b = lineupKData.batters[i];
    const w = weights[i] || 0.85;
    const seasonK = b.kPctVsPitcher;
    const h2h = h2hSlots[i];
    let kUse = seasonK;
    if (h2h && h2h.kPctH2h != null && h2h.pa >= 5) {
      const h2hW = Math.min(1, Math.max(0, (h2h.pa - 5) / 40));
      kUse = seasonK * (1 - 0.45 * h2hW) + h2h.kPctH2h * (0.45 * h2hW);
    }
    tw += w;
    tkw += kUse * w;
  }
  return parseFloat((tkw / tw).toFixed(1));
}

// Overall team hitting
async function getTeamStats(teamId, season) {
  const key = `${teamId}-${season}`;
  if (_teamAll[key]) return _teamAll[key];
  try {
    const d = await mlbGet(`/teams/${teamId}/stats?group=hitting&stats=season&season=${season}`);
    const s = d.stats?.[0]?.splits?.[0]?.stat;
    const pa = s?.plateAppearances||1;
    const r  = { obp: parseFloat(s?.obp)||.320, kPct: (s?.strikeOuts||0)/pa*100, avg: parseFloat(s?.avg)||.250 };
    _teamAll[key] = r; return r;
  } catch(_) { return { obp:.320, kPct:22, avg:.250 }; }
}

// Team hitting splits vs RHP or LHP (sitCode vr / vl)
async function getTeamVsHand(teamId, season, hand) {
  const key = `${teamId}-${season}-${hand}`;
  if (_teamSplit[key]) return _teamSplit[key];
  const sitCode = hand === "R" ? "vr" : "vl";
  try {
    const d = await mlbGet(`/teams/${teamId}/stats?group=hitting&stats=statSplits&season=${season}&sitCodes=${sitCode}`);
    const splits = d.stats?.[0]?.splits || [];
    const s = splits.find(sp => sp.split?.code === sitCode)?.stat || splits[0]?.stat;
    if (!s) throw new Error("no split");
    const pa = s.plateAppearances||1;
    const r = { obp: parseFloat(s.obp)||.320, kPct: (s.strikeOuts||0)/pa*100, avg: parseFloat(s.avg)||.250 };
    _teamSplit[key] = r; return r;
  } catch(_) {
    // fall back to overall
    return getTeamStats(teamId, season);
  }
}

// Individual batter K% vs a specific pitcher hand (R or L)
// Switch hitters face the OPPOSITE side: vs RHP → bats Left → uses vl split
async function getBatterKPct(batterId, batterHand, pitcherHand, season) {
  // Determine which side the batter actually hits from against this pitcher
  let hitSide = batterHand;
  if (batterHand === "S") hitSide = pitcherHand === "R" ? "L" : "R"; // switch hits opposite

  const sitCode = pitcherHand === "R" ? "vr" : "vl";
  const key = `${batterId}-${season}-${sitCode}`;
  if (_batterKPct[key] !== undefined) return _batterKPct[key];

  // Try platoon split first
  try {
    const d = await mlbGet(`/people/${batterId}/stats?stats=statSplits&group=hitting&season=${season}&sitCodes=${sitCode}`);
    const splits = d.stats?.[0]?.splits || [];
    const s = splits.find(sp => sp.split?.code === sitCode)?.stat || splits[0]?.stat;
    if (s && (s.plateAppearances || 0) >= 20) {
      const kPct = (s.strikeOuts || 0) / (s.plateAppearances || 1) * 100;
      _batterKPct[key] = { kPct: parseFloat(kPct.toFixed(1)), obp: parseFloat(s.obp)||0.320, hitSide };
      return _batterKPct[key];
    }
  } catch(_) {}

  // Fall back to full-season hitting stats
  try {
    const d2 = await mlbGet(`/people/${batterId}/stats?stats=season&group=hitting&season=${season}`);
    const s = d2.stats?.[0]?.splits?.[0]?.stat;
    const kPct = s ? (s.strikeOuts || 0) / (s.plateAppearances || 1) * 100 : 22;
    _batterKPct[key] = { kPct: parseFloat(kPct.toFixed(1)), obp: parseFloat(s?.obp)||0.320, hitSide };
    return _batterKPct[key];
  } catch(_) {
    const fallback = { kPct: 22.0, obp: 0.320, hitSide };
    _batterKPct[key] = fallback;
    return fallback;
  }
}

// Compute lineup K% vs a pitcher, weighted by batting order (top batters get more PA)
// Returns { kPct, batters: [{...batter, kPct, hitSide}] }
async function getLineupKPct(batters, pitcherHand, season) {
  if (!batters || batters.length === 0) return null;

  const results = await Promise.all(
    batters.map(b => getBatterKPct(b.id, b.bats, pitcherHand, season))
  );

  // Batting order weights: 1–3 see the most PA, 7–9 fewest
  const weights = [1.25, 1.20, 1.15, 1.05, 1.00, 0.95, 0.85, 0.80, 0.80];
  let totalW = 0, totalKW = 0;
  results.forEach((r, i) => {
    const w = weights[i] || 0.85;
    totalW  += w;
    totalKW += r.kPct * w;
  });

  // Attach computed stats back to batter objects for display
  const enriched = batters.map((b, i) => ({
    ...b,
    kPctVsPitcher: results[i].kPct,
    obpVsPitcher:  results[i].obp,
    hitSide:       results[i].hitSide,
  }));

  return {
    kPct:    parseFloat((totalKW / totalW).toFixed(1)),
    batters: enriched,
  };
}

// Fetch boxscore once → extract lineup + confirmed starting pitchers
async function getGameInfo(gamePk) {
  if (_lineup[gamePk] !== undefined) return _lineup[gamePk];

  const empty = { away: [], home: [], awayStarter: null, homeStarter: null };
  try {
    const d = await mlbGet(`/game/${gamePk}/boxscore`);

    const extractLineup = (teamData) => {
      const order   = teamData?.battingOrder || [];
      const players = teamData?.players || {};
      return order.slice(0,9).map(id => {
        const p = players[`ID${id}`];
        return {
          id:   id,
          name: p?.person?.fullName || "Unknown",
          pos:  p?.position?.abbreviation || "?",
          bats: p?.person?.batSide?.code || "?",
          obp:  parseFloat(p?.seasonStats?.batting?.obp) || 0.320,
          avg:  parseFloat(p?.seasonStats?.batting?.avg) || 0.250,
        };
      });
    };

    const extractStarter = (teamData) => {
      const pitchers = teamData?.pitchers || [];
      const players  = teamData?.players || {};
      for (const pid of pitchers) {
        const pl = players[`ID${pid}`];
        if (pl?.person?.id) {
          return { id: pl.person.id, fullName: pl.person.fullName || "Unknown" };
        }
      }
      return null;
    };

    const result = {
      away:         extractLineup(d.teams?.away),
      home:         extractLineup(d.teams?.home),
      awayStarter:  extractStarter(d.teams?.away),
      homeStarter:  extractStarter(d.teams?.home),
    };
    _lineup[gamePk] = result;
    return result;
  } catch(_) {
    _lineup[gamePk] = empty;
    return empty;
  }
}

// Fetch yesterday's lineup for a team as a fallback when today's lineup isn't posted yet
const _prevLineup = {};
async function getPreviousLineup(teamId, dateStr) {
  const key = `${teamId}-${dateStr}`;
  if (_prevLineup[key] !== undefined) return _prevLineup[key];

  // Try the 3 days before the given date to find the most recent game
  const base = new Date(`${dateStr}T12:00:00`);
  for (let daysBack = 1; daysBack <= 3; daysBack++) {
    const prev = new Date(base);
    prev.setDate(prev.getDate() - daysBack);
    const prevStr = `${prev.getFullYear()}-${pad(prev.getMonth()+1)}-${pad(prev.getDate())}`;
    try {
      const d = await mlbGet(`/schedule?sportId=1&date=${prevStr}&teamId=${teamId}&hydrate=lineups&gameType=R`);
      const prevGames = (d.dates && d.dates[0] && d.dates[0].games) || [];
      if (!prevGames.length) continue;

      const g = prevGames[0];
      const gamePk = g.gamePk;
      const bx = await mlbGet(`/game/${gamePk}/boxscore`);
      const isHome = (bx.teams?.home?.team?.id === teamId);
      const teamData = isHome ? bx.teams?.home : bx.teams?.away;
      const order = teamData?.battingOrder || [];
      const players = teamData?.players || {};
      if (!order.length) continue;

      const lineup = order.slice(0, 9).map(id => {
        const p = players[`ID${id}`];
        return {
          id:   id,
          name: p?.person?.fullName || "Unknown",
          pos:  p?.position?.abbreviation || "?",
          bats: p?.person?.batSide?.code || "?",
          obp:  parseFloat(p?.seasonStats?.batting?.obp) || 0.320,
          avg:  parseFloat(p?.seasonStats?.batting?.avg) || 0.250,
          fromPrevGame: true,
        };
      });
      _prevLineup[key] = lineup;
      return lineup;
    } catch(_) {}
  }
  _prevLineup[key] = [];
  return [];
}

// Resolve the starting pitcher for a game/side using a 2-tier fallback:
//   1. probablePitcher from schedule hydration
//   2. Actual starter pulled from boxscore (for started/finished games)
async function resolvePitcher(probFromSchedule, gamePk, side, gameInfo, gameStatus) {
  // Tier 1 – schedule probable pitcher (most common for pre-game)
  if (probFromSchedule && probFromSchedule.id) return probFromSchedule;

  // Tier 2 – boxscore confirmed starter (game already underway or finished)
  const absState = String(gameStatus?.abstractGameState || "").toLowerCase();
  const detState = String(gameStatus?.detailedState || "").toLowerCase();
  const allowBoxscoreStarter =
    absState === "live" ||
    absState === "final" ||
    detState.includes("in progress") ||
    detState.includes("final") ||
    detState.includes("completed");
  if (!allowBoxscoreStarter) return null;

  const starter = side === "away" ? gameInfo.awayStarter : gameInfo.homeStarter;
  if (starter && starter.id) return starter;

  return null; // genuinely TBD — will use league-average stats
}

// ─── MODELS ───────────────────────────────────────────────────────────────────
const AVG_PITCHER = {
  hand:"R", era:4.20, k9:8.8, kPct:22, ip:160, gs:28, whip:1.30, bb9:3.2,
  bfPerIp:4.35, recentKPct:null, recentKPct3:null, kMinusBbPct:14, strikePct:0.645,
  fgSwStr:null, fgCSW:null, fgKPct:null, fgBBPct:null, fgSeason:null, fgSource:null,
  recentERA:null, recentK9:null, recentStarts:0,
  springERA:null, springK9:null, springKPct:null, springIP:null, springStarts:0,
  stRecentERA:null, stRecentK9:null,
};

async function buildNRFI(games, season) {
  setStatus(`Building NRFI model for ${games.length} games…`);
  // Load CrowdsLine pitcher NRFI records (fails silently within 6s timeout)
  await loadCrowdsLineData();
  const results = [];
  await mapConcurrent(games, async g => {
    const aw = g.teams.away, hm = g.teams.home;

    // Step 1: get boxscore/lineup data (also surfaces confirmed starters for live games)
    const gameInfo = await getGameInfo(g.gamePk);

    // Step 2: resolve probable pitcher — MLB schedule, then boxscore, then PP team map
    const [awRes, hmRes] = await Promise.all([
      resolvePitcherWithPP(aw.probablePitcher, g.gamePk, "away", gameInfo, aw.team, g.status),
      resolvePitcherWithPP(hm.probablePitcher, g.gamePk, "home", gameInfo, hm.team, g.status),
    ]);
    let apProb = awRes.prob, hpProb = hmRes.prob;
    const apSrc  = awRes.src,  hpSrc  = hmRes.src;

    const [ap, hp] = await Promise.all([
      apProb ? getPitcherData(apProb.id, season) : Promise.resolve(AVG_PITCHER),
      hpProb ? getPitcherData(hpProb.id, season) : Promise.resolve(AVG_PITCHER),
    ]);
    // Team validation via currentTeamId — catches bad schedule data
    const awExpAbbr = teamAbbr(aw.team), hmExpAbbr = teamAbbr(hm.team);
    if (apProb && ap.currentTeamAbbr && awExpAbbr && ap.currentTeamAbbr !== awExpAbbr) {
      console.warn(`[MLB] NRFI: ${apProb.fullName} currentTeam=${ap.currentTeamAbbr} ≠ ${awExpAbbr} — resetting to TBD`);
      apProb = null;
    }
    if (hpProb && hp.currentTeamAbbr && hmExpAbbr && hp.currentTeamAbbr !== hmExpAbbr) {
      console.warn(`[MLB] NRFI: ${hpProb.fullName} currentTeam=${hp.currentTeamAbbr} ≠ ${hmExpAbbr} — resetting to TBD`);
      hpProb = null;
    }

    // Opponent hitting specifically vs pitcher's throwing hand
    const [awHit, hmHit] = await Promise.all([
      getTeamVsHand(aw.team.id, season, hp.hand),
      getTeamVsHand(hm.team.id, season, ap.hand),
    ]);
    // If boxscore has no batting order yet, fall back to schedule-hydrated lineup
    // (schedule lineup appears when manager posts ~2-3 hrs before; boxscore only ~90 min before)
    let lineup = gameInfo;
    if (lineup.away.length === 0 && g.lineups) {
      const parseSchedSide = async (players) => {
        if (!players || !players.length) return [];
        const sorted = [...players]
          .sort((a, b) => parseInt(a.battingOrder || 999) - parseInt(b.battingOrder || 999))
          .slice(0, 9);
        return await Promise.all(sorted.map(async p => ({
          id:   p.id,
          name: p.fullName || "?",
          pos:  p.position?.abbreviation || "?",
          bats: await getPersonBatSide(p.id),
          obp:  0.320,
          avg:  0.250,
        })));
      };
      const [awSched, hmSched] = await Promise.all([
        parseSchedSide(g.lineups.awayPlayers),
        parseSchedSide(g.lineups.homePlayers),
      ]);
      if (awSched.length >= 3 || hmSched.length >= 3) {
        lineup = { ...gameInfo, away: awSched, home: hmSched };
      }
    }

    // Last resort: use previous day's lineup as proxy (flagged in UI)
    if (lineup.away.length === 0 || lineup.home.length === 0) {
      const [prevAway, prevHome] = await Promise.all([
        lineup.away.length === 0 ? getPreviousLineup(aw.team.id, selectedDate || today()) : Promise.resolve(lineup.away),
        lineup.home.length === 0 ? getPreviousLineup(hm.team.id, selectedDate || today()) : Promise.resolve(lineup.home),
      ]);
      lineup = {
        ...lineup,
        away: prevAway.length ? prevAway : lineup.away,
        home: prevHome.length ? prevHome : lineup.home,
      };
    }

    // Get per-batter K% vs pitcher's hand (top 3 bat in 1st inning → NRFI relevance)
    const [awLineupData, hmLineupData] = await Promise.all([
      lineup.away.length >= 3
        ? getLineupKPct(lineup.away.slice(0,3), hp.hand, season)   // away top-3 vs home pitcher
        : Promise.resolve(null),
      lineup.home.length >= 3
        ? getLineupKPct(lineup.home.slice(0,3), ap.hand, season)   // home top-3 vs away pitcher
        : Promise.resolve(null),
    ]);

    // OBP: prefer confirmed top-3 lineup OBP vs pitcher hand, fall back to team split
    const awObp = awLineupData
      ? awLineupData.batters.reduce((a,b) => a + (b.obpVsPitcher||b.obp||.320), 0) / awLineupData.batters.length
      : awHit.obp;
    const hmObp = hmLineupData
      ? hmLineupData.batters.reduce((a,b) => a + (b.obpVsPitcher||b.obp||.320), 0) / hmLineupData.batters.length
      : hmHit.obp;

    // K%: prefer per-batter lineup K% vs pitcher hand, fall back to team split
    const awKPct = awLineupData ? awLineupData.kPct : awHit.kPct;
    const hmKPct = hmLineupData ? hmLineupData.kPct : hmHit.kPct;

    // Enrich lineup batters with K% data for display
    if (awLineupData) awLineupData.batters.forEach((b,i) => { if(lineup.away[i]) Object.assign(lineup.away[i], b); });
    if (hmLineupData) hmLineupData.batters.forEach((b,i) => { if(lineup.home[i]) Object.assign(lineup.home[i], b); });

    // ── Park & team abbreviations (must be declared before any use) ─────────
    const homeAbbr  = hm.team.abbreviation || hm.team.name?.split(" ").pop() || "";
    const awayAbbr  = aw.team.abbreviation || aw.team.name?.split(" ").pop() || "";

    // ── Weather & Umpire (parallel with other fetches) ──────────────────────
    const [weather, ump] = await Promise.all([
      getWeather(homeAbbr, selectedDate || today(), g.gameDate),
      getUmpireForGame(g.gamePk),
    ]);

    // ── NRFI score ────────────────────────────────────────────────────────────
    // Use spring stats when available, weighted with prior season
    const getEffectiveERA = (p) => {
      if (p.stRecentERA !== null && p.springIP >= 2) return p.era * 0.35 + p.stRecentERA * 0.65;
      if (p.springERA   !== null && p.springIP >= 1) return p.era * 0.5  + p.springERA  * 0.5;
      if (p.recentERA   !== null)                    return p.era * 0.3  + p.recentERA  * 0.7;
      return p.era;
    };
    const getEffectiveK9 = (p) => {
      if (p.stRecentK9 !== null && p.springIP >= 2) return p.k9 * 0.35 + p.stRecentK9 * 0.65;
      if (p.springK9   !== null && p.springIP >= 1) return p.k9 * 0.5  + p.springK9  * 0.5;
      if (p.recentK9   !== null) return p.k9 * 0.3 + p.recentK9 * 0.7;
      return p.k9;
    };
    // WHIP-based first-inning scoring probability
    // Lower WHIP → fewer baserunners → fewer runs → NRFI lean
    const getEffectiveWHIP = (p) => {
      if (p.recentERA !== null && p.recentK9 !== null) {
        // Approximate recent WHIP from K9 and ERA trends
        return p.whip * 0.4 + (p.whip * (p.recentERA / Math.max(p.era, 1.5))) * 0.6;
      }
      return p.whip;
    };

    const apERA  = getEffectiveERA(ap);
    const hpERA  = getEffectiveERA(hp);
    const avgERA = (apERA + hpERA) / 2;
    const avgK9  = (getEffectiveK9(ap) + getEffectiveK9(hp)) / 2;
    const avgOBP = (awObp + hmObp) / 2;
    const avgKPct= (awKPct + hmKPct) / 2;
    const avgWHIP= (getEffectiveWHIP(ap) + getEffectiveWHIP(hp)) / 2;

    // First-inning scoring probability: P(at least 1 run in 1st) for each side
    // Uses OBP chain model: top 3 batters, each with OBP chance to reach base
    // Rough: P(score) ≈ 1 - (1-OBP)^3 * (1 + kPct*0.4) ... simplified heuristic
    const scoringProbAway = 1 - Math.pow(1 - awObp, 3) * (1 + awKPct/100 * 0.35);
    const scoringProbHome = 1 - Math.pow(1 - hmObp, 3) * (1 + hmKPct/100 * 0.35);
    const nrfiProbRaw = (1 - scoringProbAway) * (1 - scoringProbHome);
    // Convert raw joint NRFI probability to a score adjustment (50% base = league avg)
    const nrfiProbScore = (nrfiProbRaw - 0.50) * 40;

    // ── Team NRFI record factors ──────────────────────────────────────────────
    const awayNRFIRec = TEAM_NRFI_RECORD[normTeam(awayAbbr)];
    const homeNRFIRec = TEAM_NRFI_RECORD[normTeam(homeAbbr)];
    const awayNRFIPct = awayNRFIRec ? awayNRFIRec.pct : 50;
    const homeNRFIPct = homeNRFIRec ? homeNRFIRec.pct : 50;
    // Combined team NRFI tendency: how often do BOTH these teams play NRFI games
    const teamNRFIFactor = ((awayNRFIPct + homeNRFIPct) / 2 - 50) * 0.34;

    // ── The Crowd's Line: pitcher first-inning records ──────────────────────
    const apName   = apProb?.fullName || "";
    const hpName   = hpProb?.fullName || "";
    const clAway   = getCLPitcher(apName);
    const clHome   = getCLPitcher(hpName);

    // If CrowdsLine has pitcher NRFI%, use it as dominant signal (weighted 60%)
    // Otherwise fall back to ERA/WHIP proxies
    let pitcherNRFIScore = 0;
    let clUsed = false;
    if (clAway || clHome) {
      clUsed = true;
      const parkNrfi = PARK_NRFI[normTeam(homeAbbr)]?.n ?? PARK_NRFI_AVG;
      const awayNRFI = clAway ? clAway.nrfiPct : parkNrfi;
      const homeNRFI = clHome ? clHome.nrfiPct : parkNrfi;
      const combinedNRFI = clAway && clHome
        ? harmonicMeanPct(awayNRFI, homeNRFI)
        : (awayNRFI + homeNRFI) / 2;
      pitcherNRFIScore = (combinedNRFI - PARK_NRFI_AVG) * 0.62;
    }

    // Streak bonus/penalty from CrowdsLine
    let streakScore = 0;
    const apStreak = clAway?.streak || "";
    const hpStreak = clHome?.streak || "";
    if (apStreak.toLowerCase().includes("nrfi")) streakScore += 2;
    if (apStreak.toLowerCase().includes("yrfi")) streakScore -= 2;
    if (hpStreak.toLowerCase().includes("nrfi")) streakScore += 2;
    if (hpStreak.toLowerCase().includes("yrfi")) streakScore -= 2;

    // Last-10 bonus if available
    let l10Score = 0;
    if (clAway?.l10Pct != null) l10Score += (clAway.l10Pct - PARK_NRFI_AVG) * 0.15;
    if (clHome?.l10Pct != null) l10Score += (clHome.l10Pct - PARK_NRFI_AVG) * 0.15;

    // ── Park & team first-inning factors ────────────────────────────────────
    const parkFact  = getParkFactor(homeAbbr);   // delta from avg, −0.1 to +0.13
    const awOffFact = getTeamOffFactor(awayAbbr); // run-scored% in 1st
    const hmOffFact = getTeamOffFactor(homeAbbr);
    // Lower offensive tendency → better for NRFI
    const offScore  = ((TEAM_1ST_AVG.rs - awOffFact) + (TEAM_1ST_AVG.rs - hmOffFact)) * 0.25;
    const parkScore = parkFact * 60; // scale to same ~point range as other factors

    let score = 0;
    if (clUsed) {
      // CrowdsLine path: pitcher NRFI% is primary signal (most predictive)
      score += pitcherNRFIScore;     // ±~12 pts from pitcher career NRFI records
      score += streakScore;          // ±2–4 pts per pitcher streak
      score += l10Score;             // ±2–4 pts from recent 10 games
      score += nrfiProbScore * 0.4;  // lineup/OBP scoring probability (secondary)
      score += parkScore * 0.5;      // park factor (CL records already include venue)
      score += offScore  * 0.5;      // team offensive tendency (reduced)
      score += (0.315 - avgOBP) * 50;
      score += (avgKPct - 22.5) * 0.22;
      score += (1.28 - avgWHIP) * 4.0;
      score += teamNRFIFactor;
    } else {
      // Fallback path: ERA/WHIP/OBP model + park/team factors
      score += nrfiProbScore;        // OBP chain scoring probability (primary when no CL)
      score += (3.85 - avgERA)  * 6.0;
      score += (0.315 - avgOBP) * 90;
      score += (avgK9 - 8.8)    * 1.50;
      score += (1.28 - avgWHIP) * 7.0;
      score += (avgKPct - 22.5) * 0.28;
      score += parkScore;
      score += offScore;
      score += teamNRFIFactor;
    }

    // ── Weather factor (applies to both paths) ───────────────────────────────
    // weatherScore: positive = NRFI lean, negative = YRFI lean
    score += weather.weatherScore;

    // ── Umpire factor ─────────────────────────────────────────────────────────
    // Umpire run-scoring adjustment: negative runsAdj (pitcher-friendly) = NRFI lean
    score += -(ump.runsAdj * 10);
    // K-friendly zone → slightly fewer balls in play in 1st inning sequences
    score += (ump.kAdj - 1.0) * 1.6;

    const nrfiScoreRaw = score;
    const nrfiScoreDamped = Math.max(-26, Math.min(26, score));
    const confidence = Math.max(5, Math.min(95, Math.round(50 + nrfiScoreDamped)));
    const pick = confidence >= 50 ? "NRFI" : "YRFI";

    // Park & team context labels
    const parkLabel = (() => {
      const t = normTeam(homeAbbr);
      const p = PARK_NRFI[t];
      return p ? `${homeAbbr} park: ${p.n.toFixed(1)}% NRFI hist.` : "";
    })();

    // CrowdsLine pitcher notes
    const clNote = (clEntry, name, label) => {
      if (!clEntry) return "";
      const strkTxt = clEntry.streak ? ` ${clEntry.streak}` : "";
      const l10Txt  = clEntry.l10Pct != null ? ` L10: ${clEntry.l10Pct.toFixed(0)}%` : "";
      return `${label} ${name} career NRFI: ${clEntry.nrfiPct.toFixed(0)}%${l10Txt}${strkTxt} (CrowdsLine).`;
    };

    const recentNote = (p, label) => {
      if (p.stRecentERA !== null && p.springIP >= 2) return ` ${label} ST (last ${p.springStarts} starts): ERA ${p.stRecentERA}, K/9 ${p.stRecentK9}.`;
      if (p.recentStarts) return ` ${label}'s last ${p.recentStarts} starts: ERA ${p.recentERA}, K/9 ${p.recentK9}.`;
      return "";
    };
    const lineupNote = (() => {
      const awPrev = lineup.away.some(b => b.fromPrevGame);
      const hmPrev = lineup.home.some(b => b.fromPrevGame);
      if (lineup.away.length && lineup.home.length) {
        if (awPrev || hmPrev) return ` Prev-day lineup used as proxy (today's not yet posted) — K% (away ${awKPct.toFixed(1)}%, home ${hmKPct.toFixed(1)}%) vs pitcher hand.`;
        return ` Top-3 lineup K% (away ${awKPct.toFixed(1)}%, home ${hmKPct.toFixed(1)}%) vs pitcher hand used.`;
      }
      return " Lineup not yet posted — team splits used.";
    })();

    const weatherNote = (() => {
      if (weather.isRoof) return `${weather.windLabel} (retractable/dome — weather neutral).`;
      const parts = [];
      if (weather.windSpeed >= 5) parts.push(`${weather.windSpeed}mph ${weather.windLabel} wind`);
      if (weather.tempF < 50) parts.push(`${weather.tempF}°F`);
      if (weather.precip > 30) parts.push(`${weather.precip}% rain`);
      return parts.length ? `Weather: ${parts.join(", ")} — ${weather.weatherScore > 0 ? "NRFI lean" : weather.weatherScore < 0 ? "YRFI lean" : "neutral"}.` : "";
    })();

    const umpNote = ump.src === "known"
      ? `HP Ump ${ump.name}: ${ump.kAdj >= 1.05 ? "pitcher-friendly zone ⬆️K" : ump.kAdj <= 0.94 ? "batter-friendly zone ⬇️K" : "avg zone"} (${ump.note}).`
      : "";

    const analysis = [
      clNote(clAway, apName||"TBD", "Away SP"),
      clNote(clHome, hpName||"TBD", "Home SP"),
      !clAway ? `Away SP ${apName||"TBD"} (${ap.hand}HP, ERA ${apERA.toFixed(2)}, K/9 ${(getEffectiveK9(ap)).toFixed(1)}) vs ${hmHit.obp.toFixed(3)} OBP ${hm.team.teamName||hm.team.name}.` : "",
      !clHome ? `Home SP ${hpName||"TBD"} (${hp.hand}HP, ERA ${hpERA.toFixed(2)}, K/9 ${(getEffectiveK9(hp)).toFixed(1)}) vs ${awHit.obp.toFixed(3)} OBP ${aw.team.teamName||aw.team.name}.` : "",
      parkLabel,
      recentNote(ap, "Away SP") + recentNote(hp, "Home SP"),
      lineupNote,
      awayNRFIRec ? `${awayAbbr} 2025 NRFI record: ${awayNRFIRec.w}-${awayNRFIRec.l} (${awayNRFIRec.pct.toFixed(1)}%).` : "",
      homeNRFIRec ? `${homeAbbr} 2025 NRFI record: ${homeNRFIRec.w}-${homeNRFIRec.l} (${homeNRFIRec.pct.toFixed(1)}%).` : "",
      weatherNote,
      umpNote,
      `Model score ${nrfiScoreRaw>0?"+":""}${nrfiScoreRaw.toFixed(1)} → ${pick} at ${confidence}%.`,
    ].filter(Boolean).join(" ").trim();

    // pitcher source labels for display
    const spSrc = (prob, src) => {
      if (!prob) return "est";
      if (src === "pp-sourced") return "announced";
      return src || "probable";
    };

    // Look up PP NRFI/YRFI line for this game (by team name match)
    const findPPNRFI = () => {
      if (!Object.keys(ppNRFI).length) return null;
      const awLow = (aw.team.teamName||aw.team.name||"").toLowerCase();
      const hmLow = (hm.team.teamName||hm.team.name||"").toLowerCase();
      const awAbbr = awayAbbr.toLowerCase();
      const hmAbbr = homeAbbr.toLowerCase();
      for (const [, v] of Object.entries(ppNRFI)) {
        const rawLow = (v.rawName||"").toLowerCase();
        const teamLow = (v.team||"").toLowerCase();
        if (rawLow.includes(awLow) || rawLow.includes(hmLow) ||
            awLow.includes(rawLow) || hmLow.includes(rawLow) ||
            teamLow === awAbbr || teamLow === hmAbbr) return v;
      }
      return null;
    };
    const ppNRFILine = findPPNRFI();

    // Catcher framing for each side (helps pitcher Ks, relevant for NRFI too)
    const [awayCatcher, homeCatcher] = await Promise.all([
      getCatcherForTeam(g.gamePk, "away"),
      getCatcherForTeam(g.gamePk, "home"),
    ]);
    const parkDims = PARK_DIMS[normTeam(homeAbbr)] || null;

    results.push({
      gamePk: g.gamePk,
      away: aw.team.teamName || aw.team.name,
      home: hm.team.teamName || hm.team.name,
      awayAbbr, homeAbbr,
      awayPitcher: apProb?.fullName || "TBD",
      homePitcher: hpProb?.fullName || "TBD",
      awayPitcherSrc: spSrc(apProb, apSrc),
      homePitcherSrc: spSrc(hpProb, hpSrc),
      awayHand: ap.hand, homeHand: hp.hand,
      awayERA: apERA, homeERA: hpERA,
      awayK9: getEffectiveK9(ap), homeK9: getEffectiveK9(hp),
      awayKPct: ap.kPct, homeKPct: hp.kPct,
      awayRecentERA: ap.stRecentERA ?? ap.recentERA,
      homeRecentERA: hp.stRecentERA ?? hp.recentERA,
      awaySpringERA: ap.stRecentERA || ap.springERA,
      homeSpringERA: hp.stRecentERA || hp.springERA,
      awaySpringK9:  ap.stRecentK9  || ap.springK9,
      homeSpringK9:  hp.stRecentK9  || hp.springK9,
      awaySpringIP:  ap.springIP, homeSpringIP: hp.springIP,
      awayOBP: awObp, homeOBP: hmObp,
      awayTeamKPct: awHit.kPct, homeTeamKPct: hmHit.kPct,
      awayLineupKPct: awLineupData ? awLineupData.kPct : null,
      homeLineupKPct: hmLineupData ? hmLineupData.kPct : null,
      lineupAway: lineup.away, lineupHome: lineup.home,
      clAway, clHome, clUsed,
      parkNRFI: PARK_NRFI[normTeam(homeAbbr)],
      awayTeam1st: TEAM_1ST[normTeam(awayAbbr)],
      homeTeam1st: TEAM_1ST[normTeam(homeAbbr)],
      awayNRFIRec, homeNRFIRec,
      weather, ump,
      ppNRFILine,
      parkDims, awayCatcher, homeCatcher,
      modelScore: nrfiScoreRaw,
      confidence, analysis,
    });
  });
  return results.sort((a,b) => Math.abs(b.confidence-50) - Math.abs(a.confidence-50));
}

// Resolve a pitcher for one side of a game, falling back to PP team data
const _pitcherTeamCache = {};
async function getPlayerIdentity(playerId) {
  if (!playerId) return null;
  const cacheKey = `person_${playerId}`;
  if (_pitcherTeamCache[cacheKey] !== undefined) return _pitcherTeamCache[cacheKey];
  try {
    const d = await mlbGet(`/people/${playerId}`);
    const person = d?.people?.[0] || null;
    const pos = String(person?.primaryPosition?.abbreviation || "").toUpperCase();
    const type = String(person?.primaryPosition?.type || "").toLowerCase();
    const identity = {
      currentTeamAbbr: person?.currentTeam?.abbreviation?.toUpperCase() || null,
      currentTeamId: person?.currentTeam?.id || null,
      primaryPos: pos || null,
      isPitcher: pos === "P" || pos === "SP" || pos === "RP" || pos === "TWP" || type === "pitcher",
    };
    _pitcherTeamCache[cacheKey] = identity;
    return identity;
  } catch {
    _pitcherTeamCache[cacheKey] = null;
    return null;
  }
}

async function getPitcherCurrentTeamAbbr(playerId) {
  const ident = await getPlayerIdentity(playerId);
  return ident?.currentTeamAbbr || null;
}

async function getPitcherCurrentTeamId(playerId) {
  const ident = await getPlayerIdentity(playerId);
  return ident?.currentTeamId || null;
}

const _fullRosterCache = {};
async function isPlayerOnTeam(playerId, teamId) {
  if (!playerId || !teamId) return true; // can't verify → trust
  const year = new Date().getFullYear();
  const key  = `full_${teamId}_${year}`;
  if (_fullRosterCache[key] === undefined) {
    try {
      const d = await mlbGet(`/teams/${teamId}/roster?rosterType=active&season=${year}`);
      _fullRosterCache[key] = (d?.roster || []).map(p => p.person?.id).filter(Boolean);
    } catch { _fullRosterCache[key] = null; }
  }
  const roster = _fullRosterCache[key];
  if (!roster) return true; // roster fetch failed → trust the schedule
  return roster.includes(playerId);
}

async function resolvePitcherWithPP(schedProb, gamePk, side, gameInfo, mlbTeam, gameStatus) {
  // Derive the expected team abbreviation from the team ID (abbreviation is absent in schedule data)
  const expAbbr    = teamAbbr(mlbTeam);   // e.g. "PHI" — always works via MLB_ID_TO_ABBR
  const expTeamId  = mlbTeam?.id;
  const ppLoaded   = Object.keys(ppLines).length > 0;

  // 1. Standard MLB schedule / boxscore pitcher
  const mlb = await resolvePitcher(schedProb, gamePk, side, gameInfo, gameStatus);
  if (mlb && mlb.id) {
    if (expAbbr && mlb.fullName) {
      const nk = normName(mlb.fullName);
      let mismatchReason = null;

      // Check A: PP K-line lists this pitcher under a DIFFERENT team
      const ppEntry = lookupPP(mlb.fullName);
      if (ppLoaded && ppEntry?.team && ppEntry.team.toUpperCase() !== expAbbr) {
        mismatchReason = `PP-K team=${ppEntry.team}`;
      }

      // Check B: PP batter-line lists this player under a DIFFERENT team
      if (!mismatchReason) {
        const hitterEntry = lookupPPHitter(mlb.fullName, expAbbr);
        if (hitterEntry?.team && hitterEntry.team.toUpperCase() !== expAbbr) {
          mismatchReason = `PP-batter team=${hitterEntry.team}`;
        }
      }

      if (mismatchReason) {
        console.warn(`[MLB] Skipping ${mlb.fullName} for ${expAbbr}: ${mismatchReason}`);
        // fall through to PP team map
      } else {
        return { prob: mlb, src: schedProb?.id ? "probable" : "confirmed" };
      }
    } else {
      return { prob: mlb, src: schedProb?.id ? "probable" : "confirmed" };
    }
  } else if (mlb) {
    return { prob: mlb, src: "confirmed" };
  }

  // 2. Odds-API K lines when MLB probables are missing (common early in the day) — attaches book strikeout props
  let ppEntries = getPPCandidatesForTeam(mlbTeam);
  if (ppEntries && ppEntries.length > 1 && expAbbr) {
    const narrowed = ppEntries.filter((ppE) => {
      if (ppE.team && ppE.team.toUpperCase() === expAbbr.toUpperCase()) return true;
      const by = lookupPPByTeam(ppE.rawName, expAbbr);
      return by === ppE;
    });
    if (narrowed.length) ppEntries = narrowed;
  }
  if (ppEntries && ppEntries.length > 0) {
    for (const ppE of ppEntries) {
      // Check 1: PP batter-line lists this player for a team that ≠ PP's K-line team → misassigned
      const hE = lookupPPHitter(ppE.rawName, expAbbr || ppE.team || "");
      if (hE?.team && ppE.team && hE.team.toUpperCase() !== ppE.team.toUpperCase()) {
        console.warn(`[MLB] PP fallback skip: ${ppE.rawName} K-line=${ppE.team} ≠ batter-line=${hE.team}`);
        continue;
      }

      // Check 2: PP batter-line team doesn't match the game's expected team
      if (hE?.team && expAbbr && hE.team.toUpperCase() !== expAbbr) {
        console.warn(`[MLB] PP fallback skip: ${ppE.rawName} batter-line=${hE.team} ≠ expected=${expAbbr}`);
        continue;
      }

      // Check 3: PP K-line team doesn't match the game's expected team
      if (ppE.team && expAbbr && ppE.team.toUpperCase() !== expAbbr) {
        console.warn(`[MLB] PP fallback skip: ${ppE.rawName} K-line=${ppE.team} ≠ expected=${expAbbr}`);
        continue;
      }

      const mlbId = await findMLBId(ppE.rawName);
      if (!mlbId) continue;
      const ident = await getPlayerIdentity(mlbId);
      if (!ident?.isPitcher) {
        console.warn(`[MLB] PP fallback skip: ${ppE.rawName} is not a pitcher`);
        continue;
      }

      // Check 4: MLB people API team ID confirmation (fail-open: only reject on confirmed mismatch)
      if (expTeamId) {
        const currentTeamId = ident.currentTeamId || null;
        if (currentTeamId && currentTeamId !== expTeamId) {
          console.warn(`[MLB] PP fallback skip: ${ppE.rawName} teamId=${currentTeamId} ≠ ${expTeamId}`);
          continue;
        }
      }

      return { prob: { id: mlbId, fullName: ppE.rawName }, src: "pp-sourced" };
    }
  }
  return { prob: null, src: "est" };
}

// Normal CDF (Abramowitz approx.) — used to calibrate SO prop confidence vs a half-line
function normalCDF(x) {
  const a1 =  0.254829592, a2 = -0.284496736, a3 = 1.421413741, a4 = -1.453152027, a5 = 1.061405429, p = 0.3275911;
  const sign = x < 0 ? -1 : 1;
  const ax = Math.abs(x) / Math.SQRT2;
  const t = 1 / (1 + p * ax);
  const y = 1 - (((((a5 * t + a4) * t + a3) * t + a2) * t + a1) * t * Math.exp(-ax * ax));
  return 0.5 * (1 + sign * y);
}
/** P(total K > half-line) using normal approx.; line 7.5 → need 8+ K */
function probOverStrikeouts(meanK, lineHalf) {
  const needK = lineHalf + 0.5;
  const mk = Number(meanK);
  const sd = Math.max(1.12, Math.sqrt(Math.max(2.2, mk)) * 1.05);
  const z = (needK - mk) / sd;
  return Math.max(0.03, Math.min(0.97, 1 - normalCDF(z)));
}

/** FanGraphs: rates may be 0–1 or 0–100 depending on scrape */
function fgRateToPct100(v) {
  if (v == null || Number.isNaN(Number(v))) return null;
  const n = Number(v);
  return n > 1 ? n : n * 100;
}
function fgRateTo01(v) {
  if (v == null || Number.isNaN(Number(v))) return null;
  const n = Number(v);
  return n > 1 ? n / 100 : n;
}

async function buildSO(games, season) {
  setStatus(`Building strikeout model for ${games.length} games…`);
  const results = [];
  await mapConcurrent(games, async g => {
    const aw = g.teams.away, hm = g.teams.home;

    // Resolve pitchers — MLB schedule first, then PP team map fallback
    const gameInfo = await getGameInfo(g.gamePk);
    const [awRes, hmRes] = await Promise.all([
      resolvePitcherWithPP(aw.probablePitcher, g.gamePk, "away", gameInfo, aw.team, g.status),
      resolvePitcherWithPP(hm.probablePitcher, g.gamePk, "home", gameInfo, hm.team, g.status),
    ]);

    const entries = [
      { prob: awRes.prob, probSrc: awRes.src, pitchTeam: aw.team, oppTeam: hm.team, oppId: hm.team.id, isHome: false },
      { prob: hmRes.prob, probSrc: hmRes.src, pitchTeam: hm.team, oppTeam: aw.team, oppId: aw.team.id, isHome: true  },
    ];

    // Fetch weather + ump once per game (same for both pitchers)
    const homeAbbrSO = hm.team.abbreviation || hm.team.name?.split(" ").pop() || "";
    const [weatherSO, umpSO] = await Promise.all([
      getWeather(homeAbbrSO, selectedDate || today(), g.gameDate),
      getUmpireForGame(g.gamePk),
    ]);
    const venuePF = getParkRunEnvPF(teamAbbr(hm.team));
    const parkKPPAdj = parkRunEnvKPP(venuePF);

    for (const e of entries) {
      let p = e.prob ? await getPitcherData(e.prob.id, season) : AVG_PITCHER;
      // Team validation using MLB_ID_TO_ABBR (abbreviation is absent in schedule data)
      const soExpAbbr = teamAbbr(e.pitchTeam);
      const soExpId   = e.pitchTeam?.id;
      const soAbbrBad = p.currentTeamAbbr && soExpAbbr && p.currentTeamAbbr !== soExpAbbr;
      const soIdBad   = p.currentTeamId   && soExpId   && p.currentTeamId   !== soExpId;
      if (e.prob && (soAbbrBad || soIdBad)) {
        console.warn(`[MLB] SO: ${e.prob.fullName} currentTeam=${p.currentTeamAbbr||p.currentTeamId} ≠ ${soExpAbbr||soExpId} — resetting to TBD`);
        e.prob = null;
        p = AVG_PITCHER;
      }

      // Get team fallback AND lineup-level K% (per-batter vs pitcher's hand)
      const oppLineupBatters = e.isHome ? gameInfo.away : gameInfo.home;

      // If no lineup available yet, try previous day's lineup as a proxy
      let effectiveBatters = oppLineupBatters;
      let lineupFromPrevDay = false;
      if (oppLineupBatters.length < 5) {
        const oppTeamId = e.isHome ? aw.team.id : hm.team.id;
        const prevBatters = await getPreviousLineup(oppTeamId, selectedDate || today());
        if (prevBatters.length >= 5) {
          effectiveBatters = prevBatters;
          lineupFromPrevDay = true;
        }
      }

      const statcastMatchupPromise = (async () => {
        if (!e.prob || effectiveBatters.length < 5) return null;
        try {
          const batIds = effectiveBatters.slice(0, 9).map((b) => b.id).filter(Boolean);
          if (batIds.length < 5) return null;
          const mx = await fetchTimeout(
            `/api/so_matchup?pitcher_mlbam=${e.prob.id}&batters=${batIds.join(",")}&season=${season}`,
            14000
          );
          if (!mx || !mx.ok) return null;
          const mj = await mx.json();
          return mj && mj.ok ? mj : null;
        } catch (_) {
          return null;
        }
      })();

      const [teamSplit, lineupKData, statcastMatchup, h2hSlots] = await Promise.all([
        getTeamVsHand(e.oppId, season, p.hand),
        effectiveBatters.length >= 5
          ? getLineupKPct(effectiveBatters, p.hand, season)
          : Promise.resolve(null),
        statcastMatchupPromise,
        e.prob && effectiveBatters.length >= 5
          ? getPitcherVsLineup(e.prob.id, effectiveBatters.slice(0, 9), season)
          : Promise.resolve([]),
      ]);

      // Prefer per-batter lineup K%; blend career K% vs this pitcher where PA sample allows
      let oppKPct = lineupKData ? lineupKData.kPct : teamSplit.kPct;
      if (lineupKData && h2hSlots && h2hSlots.length) {
        const blended = blendOppKPctWithH2h(lineupKData, h2hSlots);
        if (blended != null) oppKPct = blended;
      }
      const oppOBP  = teamSplit.obp;

      // Enrich the lineup batters with their K% for display
      const enrichedBatters = lineupKData ? lineupKData.batters : effectiveBatters;
      if (e.isHome) { lineupKData && lineupKData.batters.forEach((b,i) => { if(gameInfo.away[i]) Object.assign(gameInfo.away[i], b); }); }
      else          { lineupKData && lineupKData.batters.forEach((b,i) => { if(gameInfo.home[i]) Object.assign(gameInfo.home[i], b); }); }

      const useK9 = (() => {
        if (p.stRecentK9 !== null && p.springIP && p.springIP >= 2) {
          return parseFloat((p.stRecentK9 * 0.55 + p.k9 * 0.45).toFixed(1));
        }
        if (p.springK9 !== null && p.springIP && p.springIP >= 1) {
          return parseFloat((p.springK9 * 0.5 + p.k9 * 0.5).toFixed(1));
        }
        // Weight recent form heavily (last 5 starts — most predictive for tonight)
        return p.recentK9 !== null
          ? parseFloat((p.k9 * 0.22 + p.recentK9 * 0.78).toFixed(1))
          : p.k9;
      })();

      let pitcherName = e.prob?.fullName || "TBD";
      const soTeamAbbr = teamAbbr(e.pitchTeam);
      let ppEntry = lookupPP(pitcherName) || lookupPPByTeam(pitcherName, soTeamAbbr);

      // Team check: reject if PP lists this pitcher under a different team
      const ppDataLoaded = Object.keys(ppLines).length > 0;
      if (e.prob && ppDataLoaded && soTeamAbbr && ppEntry?.team && ppEntry.team.toUpperCase() !== soTeamAbbr) {
        console.warn(`[MLB] SO: ${pitcherName} is a ${ppEntry.team} pitcher, not ${soTeamAbbr} — resetting to TBD`);
        e.prob = null; p = AVG_PITCHER; pitcherName = "TBD"; ppEntry = null;
      }

      if (!ppEntry && pitcherName !== "TBD" && ppDataLoaded) {
        const body = document.getElementById("pp-debug-body");
        if (body) body.innerHTML += `<div style="color:#ffd60a">⚠ No PP match: "${pitcherName}" (${soTeamAbbr})</div>`;
      }

      // Expected IP: blend PP outs line with season avg IP/start
      const seasonIP = (p.gs && p.ip) ? Math.min(7.0, Math.max(4.0, p.ip / Math.max(p.gs, 1))) : 5.0;
      const ppIpFromOuts = ppEntry?.outsLine != null ? ppEntry.outsLine / 3 : null;
      const expectedIP = ppIpFromOuts != null
        ? parseFloat(Math.min(8, Math.max(3, ppIpFromOuts * 0.70 + seasonIP * 0.30)).toFixed(1))
        : seasonIP;

      // ── Strikeout model: E[K] ≈ E[BF] × K% — prioritize FanGraphs advanced rates when loaded ──
      const LG_K = 22.5;
      const fgK100 = fgRateToPct100(p.fgKPct);
      const fgBB100 = fgRateToPct100(p.fgBBPct);
      const hasFG = fgK100 != null;
      const csw01 = fgRateTo01(p.fgCSW);
      const sw01 = fgRateTo01(p.fgSwStr);

      let blendKPct;
      if (hasFG) {
        const mlbRec = (() => {
          if (p.recentKPct != null && p.recentKPct3 != null) {
            return parseFloat((p.recentKPct * 0.52 + p.recentKPct3 * 0.48).toFixed(3));
          }
          if (p.recentKPct != null) {
            return parseFloat((p.kPct * 0.18 + p.recentKPct * 0.82).toFixed(3));
          }
          return p.kPct;
        })();
        blendKPct = parseFloat((fgK100 * 0.56 + mlbRec * 0.32 + p.kPct * 0.12).toFixed(3));
      } else {
        blendKPct = p.kPct;
        if (p.recentKPct != null && p.recentKPct3 != null) {
          const rec = parseFloat((p.recentKPct * 0.55 + p.recentKPct3 * 0.45).toFixed(3));
          blendKPct = parseFloat((p.kPct * 0.32 + rec * 0.68).toFixed(3));
        } else if (p.recentKPct != null) {
          blendKPct = parseFloat((p.kPct * 0.34 + p.recentKPct * 0.66).toFixed(3));
        }
      }

      // K−BB% (command): FG K% & BB% when available — else MLB-derived
      const LG_KMB_PTS = 16;
      let kmbSkill;
      if (hasFG && fgBB100 != null) {
        const kmbPts = fgK100 - fgBB100;
        kmbSkill = Math.min(3, Math.max(-3, (kmbPts - LG_KMB_PTS) * 0.065));
      } else {
        const kmb = p.kMinusBbPct != null ? p.kMinusBbPct : p.kPct - 8;
        kmbSkill = Math.min(2.8, Math.max(-2.8, (kmb - 14) * 0.11));
      }
      blendKPct += kmbSkill;

      // CSW% + SwStr%: strongest process predictors; scale down when FG K% already anchors (avoid double-count)
      let procAdj = 0;
      if (csw01 != null) {
        procAdj += (csw01 - 0.285) * 20;
        if (sw01 != null) procAdj += (sw01 - 0.105) * 8;
      } else if (sw01 != null) {
        procAdj += (sw01 - 0.105) * 14;
      } else {
        procAdj = Math.min(1.2, Math.max(-1.2, ((p.strikePct || 0.645) - 0.645) * 9));
      }
      const procW = hasFG ? 0.54 : 1;
      blendKPct += Math.min(3, Math.max(-3, procAdj * procW));

      const envKMult = (0.88 + 0.12 * umpSO.kAdj) * (0.94 + 0.06 * (weatherSO.soKAdj || 1.0));
      let effKPct = blendKPct * envKMult;
      const lineupKMult = 1 + ((oppKPct - LG_K) / LG_K) * 0.24;
      effKPct *= lineupKMult;
      if (statcastMatchup != null && statcastMatchup.kPctAdj != null) {
        effKPct += statcastMatchup.kPctAdj;
      }
      effKPct += parkKPPAdj;
      effKPct = Math.max(14, Math.min(42, effKPct));

      const bfPerIp = Math.min(5.15, Math.max(3.85, p.bfPerIp || 4.35));
      const expectedBF = expectedIP * bfPerIp;
      const analyticalKRaw = Math.max(0.5, expectedBF * (effKPct / 100));
      const analyticalK = parseFloat(analyticalKRaw.toFixed(2));

      // PrizePicks line as prior — shrink more when data is thin; less when lineup + Statcast matchup align
      let MARKET_SHRINK = ppEntry ? (hasFG ? 0.46 : 0.53) : 0;
      if (ppEntry) {
        if (!lineupKData) MARKET_SHRINK += 0.08;
        if (lineupFromPrevDay) MARKET_SHRINK += 0.04;
        if (lineupKData && statcastMatchup != null && statcastMatchup.kPctAdj != null) MARKET_SHRINK -= 0.06;
        if (lineupKData && !lineupFromPrevDay) MARKET_SHRINK -= 0.03;
        MARKET_SHRINK = Math.max(0.34, Math.min(0.60, MARKET_SHRINK));
      }
      const line    = ppEntry
        ? ppEntry.line
        : Math.max(0.5, Math.round(analyticalK * 2) / 2);
      const lineSrc = ppEntry ? "sportsbook" : "calculated";
      const projection = ppEntry
        ? parseFloat((line + (1 - MARKET_SHRINK) * (analyticalKRaw - line)).toFixed(2))
        : analyticalK;
      const edge    = parseFloat((projection - line).toFixed(2));

      const adjK9 = parseFloat(((effKPct / 100) * bfPerIp * 9).toFixed(2));

      const pOver = probOverStrikeouts(projection, line);
      const takeOver = projection > line || (projection === line && analyticalKRaw >= line);
      const winProb = takeOver ? pOver : (1 - pOver);
      let confidence = Math.round(50 + (winProb - 0.5) * 78);
      if (!lineupKData) confidence -= 5;
      if (lineupFromPrevDay) confidence -= 3;
      if (!ppEntry) confidence -= 4;
      if (hasFG) confidence += 2;
      confidence = Math.max(48, Math.min(88, confidence));
      const pick = `${takeOver ? "Over" : "Under"} ${line.toFixed(1)}`;

      // Source label for this pitcher
      const starter = e.isHome ? gameInfo.homeStarter : gameInfo.awayStarter;
      const schedProb = e.isHome ? hm.probablePitcher : aw.probablePitcher;
      let pitcherSrc = e.probSrc || "est";
      if (e.prob) {
        if (starter && starter.id === e.prob.id)           pitcherSrc = "confirmed";
        else if (schedProb && schedProb.id === e.prob.id)  pitcherSrc = "probable";
        else if (pitcherSrc === "pp-sourced")               pitcherSrc = "announced";
      }

      const recentNote = p.stRecentK9 ? ` ST K/9 ${p.stRecentK9.toFixed(1)} (${p.springIP?.toFixed(1)} IP).` :
        p.recentStarts ? ` Recent ${p.recentStarts} starts: ERA ${p.recentERA}, K/9 ${p.recentK9}.` : "";
      const ipNote = ppEntry?.outsLine != null
        ? ` Sportsbook ${ppEntry.outsLine} outs (~${(ppEntry.outsLine/3).toFixed(1)} IP implied) → proj workload ~${expectedIP} IP (70% book outs / 30% season avg).`
        : "";
      const h2hBlended = lineupKData && h2hSlots && h2hSlots.some((x) => x && x.pa >= 5 && x.kPctH2h != null);
      const lineupSrc = lineupKData
        ? (lineupFromPrevDay ? "Prev-day lineup used (today's not yet posted)" : "Per-batter lineup K% used")
        : "Team split K% used";
      const h2hKNote = h2hBlended ? " Last 2 seasons vs-this-pitcher K% blended into weighted lineup (PA≥5)." : "";
      const lineNote  = ppEntry
        ? `Sportsbook line ${line} (${ppEntry.statType || "Pitcher Strikeouts"}) — middle line from ${ppEntry.allLines?.length || 1} available`
        : `Calculated line ${line}`;
      const umpSONote = umpSO.src === "known"
        ? ` HP Ump ${umpSO.name} K-adj ×${umpSO.kAdj.toFixed(2)} (${umpSO.note}).`
        : "";
      const weatherSONote = (() => {
        if (weatherSO.isRoof) return ` Dome — weather neutral.`;
        const parts = [];
        if (weatherSO.windSpeed >= 5) parts.push(`${weatherSO.windSpeed}mph ${weatherSO.windLabel}`);
        if (weatherSO.tempF < 50) parts.push(`${weatherSO.tempF}°F`);
        return parts.length ? ` Weather: ${parts.join(", ")} (K adj ×${(weatherSO.soKAdj||1).toFixed(3)}).` : "";
      })();
      const parkSONote = ` Venue run-env PF ${venuePF} (${parkKPPAdj >= 0 ? "+" : ""}${parkKPPAdj.toFixed(2)} pp on pitcher K%).`;
      const marketNote = ppEntry
        ? ` Raw model ${analyticalK} K → blended ${projection} K (${((1 - MARKET_SHRINK) * 100).toFixed(0)}% model / ${(MARKET_SHRINK * 100).toFixed(0)}% book line${hasFG ? "; FG/Savant advanced anchor" : ""}).`
        : "";
      const fgAnchorTxt = !hasFG
        ? ""
        : p.fgSource === "statcast"
          ? "Statcast K%/whiff process · "
          : "FanGraphs K% anchor + CSW/SwStr process · ";
      const analysis = [
        `${e.prob?.fullName||"TBD"} (${p.hand}HP): BF×K% — ${fgAnchorTxt}${statcastMatchup?.kPctAdj != null ? `Statcast mix (whiff${statcastMatchup.kPctAdjWhiff != null ? ` ${statcastMatchup.kPctAdjWhiff >= 0 ? "+" : ""}${statcastMatchup.kPctAdjWhiff}` : ""}${statcastMatchup.kPctAdjMixK != null ? ` · pitch-K% ${statcastMatchup.kPctAdjMixK >= 0 ? "+" : ""}${statcastMatchup.kPctAdjMixK}` : ""} → ${statcastMatchup.kPctAdj >= 0 ? "+" : ""}${statcastMatchup.kPctAdj} pp) · ` : ""}~${expectedBF.toFixed(0)} BF × ${effKPct.toFixed(1)}% eff K% ⇒ ${analyticalK} K.`,
        `K/9 display ${useK9.toFixed(1)} · implied ${adjK9.toFixed(1)} K/9 from BF path.`,
        `${e.oppTeam.teamName||e.oppTeam.name} K% vs ${p.hand}HP: ${oppKPct.toFixed(1)}%. ${lineupSrc}.${h2hKNote}`,
        recentNote + ipNote,
        umpSONote + weatherSONote + parkSONote,
        marketNote,
        `${lineNote} · Final proj ${projection} K · Edge ${edge>0?"+":""}${edge} → ${pick} (~${((takeOver ? pOver : 1 - pOver) * 100).toFixed(0)}% win prob vs line).`,
      ].join(" ").trim();

      const oppTeamName = e.oppTeam.teamName || e.oppTeam.name;
      const oppDisplayLineup = enrichedBatters.length ? enrichedBatters : effectiveBatters;

      const catcherSide = e.isHome ? "away" : "home";
      const catcherInfo = await getCatcherForTeam(g.gamePk, catcherSide);
      const h2hData = (h2hSlots || []).filter(Boolean).sort((a, b) => b.ab - a.ab);

      // Line movement check
      const lineMov = getLineMovement(pitcherName);
      const oddsMov = getOddsMovement(pitcherName);
      const bk = ppEntry?.books;
      const fdB = bk?.FanDuel;
      const dkB = bk?.DraftKings;

      results.push({
        gamePk: g.gamePk,
        pitcher: e.prob?.fullName || "TBD",
        pitcherSrc,
        hand: p.hand,
        team: teamAbbr(e.pitchTeam)||e.pitchTeam.teamName,
        oppTeam: oppTeamName,
        away: aw.team.teamName||aw.team.name,
        home: hm.team.teamName||hm.team.name,
        fgCSW: p.fgCSW, fgSwStr: p.fgSwStr, fgSeason: p.fgSeason, fgSource: p.fgSource ?? null,
        k9: p.k9, recentK9: p.recentK9, recentKPct3: p.recentKPct3, usedK9: useK9,
        adjK9: parseFloat(adjK9.toFixed(1)),
        kPct: p.kPct, era: p.era, recentERA: p.recentERA,
        whip: p.whip,
        projInnings: expectedIP,
        expectedIP,
        seasonIP,
        ppOutsLine: ppEntry?.outsLine ?? null,
        ppIpFromOuts,
        stRecentERA: p.stRecentERA, stRecentK9: p.stRecentK9,
        springERA: p.springERA, springK9: p.springK9,
        pitcherSpringIP: p.springIP,
        oppKPct, oppOBP,
        parkRunEnvPF: venuePF,
        parkRunEnvKPP: parkKPPAdj,
        h2hKBlended: !!h2hBlended,
        lineupKUsed: !!lineupKData && !lineupFromPrevDay,
        lineupFromPrevDay,
        oppLineup: oppDisplayLineup,
        line, lineSrc, ppLine: ppEntry ? ppEntry.line : null,
        ppAllLines: ppEntry?.allLines || null,
        ppOutsAllLines: ppEntry?.outsAllLines || null,
        projection, edge, analyticalK, expectedBF,
        fanGraphsInModel: hasFG,
        statcastMatchup: statcastMatchup || null,
        pickOver: takeOver, pWinVsLine: takeOver ? pOver : 1 - pOver,
        weather: weatherSO, ump: umpSO,
        strikeoutPick: pick, confidence, analysis,
        gameLog: p.gameLog || [],
        catcherInfo, h2hData,
        lineMov,
        oddsMov,
        fdOverAm: fdB?.overAm ?? null,
        fdUnderAm: fdB?.underAm ?? null,
        dkOverAm: dkB?.overAm ?? null,
        dkUnderAm: dkB?.underAm ?? null,
      });
    }
  });
  // PP line pitchers always sort to top
  return results.sort((a,b) => {
    const aPP = a.lineSrc === "sportsbook" ? 1 : 0;
    const bPP = b.lineSrc === "sportsbook" ? 1 : 0;
    if (bPP !== aPP) return bPP - aPP;
    return Math.abs(b.confidence-50) - Math.abs(a.confidence-50);
  });
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderWeatherUmpPanel(weather, ump) {
  const hasWeather = weather && !weather.isRoof && (weather.windSpeed > 0 || weather.tempF !== 70);
  const isDome = weather?.isRoof;
  const hasUmp = ump && ump.src === "known";
  if (!hasWeather && !isDome && !hasUmp) return "";

  const windColor = weather?.weatherScore > 2 ? "#00ff88" : weather?.weatherScore < -2 ? "#ff4d6d" : "#94a3b8";
  const umpColor  = ump?.kAdj >= 1.06 ? "#00ff88" : ump?.kAdj <= 0.93 ? "#ff4d6d" : "#94a3b8";

  return `
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;background:rgba(100,116,139,.07);border:1px solid rgba(100,116,139,.2);border-radius:8px;padding:12px 14px;margin-top:12px">
    ${(hasWeather || isDome) ? `<div>
      <div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:.06em;margin-bottom:6px">🌤 WEATHER</div>
      ${isDome ? `<div style="font-size:12px;color:#64748b">🏟 ${weather.windLabel}</div>` : `
      <div style="font-size:13px;font-weight:700;color:${windColor}">${weather.windSpeed}mph ${weather.windLabel}</div>
      <div style="font-size:11px;color:#94a3b8;margin-top:2px">${weather.tempF}°F · ${weather.precip}% rain</div>
      <div style="font-size:10px;color:${windColor};margin-top:3px">${weather.weatherScore > 1.5 ? "✅ NRFI lean" : weather.weatherScore < -1.5 ? "⚠️ YRFI lean" : "Neutral"} (${weather.weatherScore > 0 ? "+" : ""}${weather.weatherScore.toFixed(1)} pts)</div>
      ${weather.parkName ? `<div style="font-size:10px;color:#475569;margin-top:2px">${weather.parkName}</div>` : ""}
      `}
    </div>` : ""}
    ${hasUmp ? `<div>
      <div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:.06em;margin-bottom:6px">⚖️ HOME PLATE UMP</div>
      <div style="font-size:12px;font-weight:700;color:${umpColor}">${ump.name}</div>
      <div style="font-size:11px;color:#94a3b8;margin-top:2px">K-adj: ×${ump.kAdj.toFixed(2)} · Runs/g: ${ump.runsAdj >= 0 ? "+" : ""}${ump.runsAdj.toFixed(2)}</div>
      <div style="font-size:10px;color:${umpColor};margin-top:3px">${ump.kAdj >= 1.06 ? "✅ Pitcher-friendly" : ump.kAdj <= 0.93 ? "⚠️ Batter-friendly" : "Average zone"}</div>
      <div style="font-size:10px;color:#475569;margin-top:2px">${ump.note}</div>
    </div>` : `<div>
      <div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:.06em;margin-bottom:6px">⚖️ HOME PLATE UMP</div>
      <div style="font-size:12px;color:#475569">${ump?.name && ump.name !== "Unknown" ? ump.name : "Lineup not posted"}</div>
      <div style="font-size:10px;color:#475569;margin-top:2px">No historical data — avg zone assumed</div>
    </div>`}
  </div>`;
}
const bar = (...args) => renderBar(...args);
function renderBar(label, value, max, color, note) {
  if (value === null || value === undefined) return "";
  const fill = pct(value, max);
  const disp = typeof value === "number" ? value.toFixed(typeof max === "number" && max < 1 ? 3 : 1) : value;
  return `
    <div class="bar-row">
      <div class="bar-lbl-row">
        <span class="bar-lbl">${label}${note?` <em style="opacity:.6">${note}</em>`:""}</span>
        <span class="bar-val" style="color:${color}">${disp}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${fill}%;background:${color};box-shadow:0 0 6px ${color}66"></div></div>
    </div>`;
}

function platoonIcon(hitSide, pitcherHand) {
  // Platoon advantage: LHB vs RHP or RHB vs LHP
  if (!hitSide || !pitcherHand) return "";
  const adv = (hitSide === "L" && pitcherHand === "R") || (hitSide === "R" && pitcherHand === "L");
  return adv
    ? `<span style="color:#00ff88;font-size:10px" title="Platoon advantage">▲</span>`
    : `<span style="color:#ff4d6d;font-size:10px" title="Platoon disadvantage">▼</span>`;
}

function renderLineup(batters, title, pitcherHand) {
  if (!batters || batters.length === 0) return `
    <div class="lineup-box">
      <div class="lineup-title">${title} LINEUP</div>
      <div style="color:#64748b;font-size:11px;padding:4px 0">Not yet posted</div>
    </div>`;

  const hasKData = batters.some(b => b.kPctVsPitcher !== undefined);
  return `
    <div class="lineup-box">
      <div class="lineup-title">${title} LINEUP${pitcherHand ? ` vs ${pitcherHand}HP` : ""}${hasKData ? " · K% shown vs pitcher's hand" : ""}</div>
      <div class="lineup-list">
        ${batters.map((b,i) => {
          const kPctDisp = b.kPctVsPitcher !== undefined
            ? `<span style="color:${b.kPctVsPitcher>28?"#ff4d6d":b.kPctVsPitcher>22?"#ffd60a":"#00ff88"};font-weight:700"> K%${b.kPctVsPitcher.toFixed(0)}</span>`
            : "";
          const handDisp = b.hitSide || b.bats;
          const platoon  = platoonIcon(b.hitSide || b.bats, pitcherHand);
          const obpDisp  = (b.obpVsPitcher || b.obp || 0.320).toFixed(3);
          return `<div class="lineup-batter">${i+1}. <strong>${b.name}</strong> <span>${b.pos} · ${handDisp}HB ${platoon} · OBP ${obpDisp}${kPctDisp}</span></div>`;
        }).join("")}
      </div>
    </div>`;
}

function handTag(hand) {
  return `<span class="hand-tag">${hand}HP</span>`;
}
function recentTag(era) {
  if (era === null) return "";
  const color = era < 3.5 ? "#00ff88" : era < 4.5 ? "#ffd60a" : "#ff4d6d";
  return `<span class="recent-tag" style="background:${color}22;border:1px solid ${color}44;color:${color}">Last 5 ERA ${era}</span>`;
}

function srcTag(src) {
  const labels = { confirmed: "✓ CONFIRMED", probable: "PROBABLE", announced: "ANNOUNCED", est: "TBD / EST" };
  return `<span class="src-${src}">${labels[src] || src.toUpperCase()}</span>`;
}

function eraChip(era) {
  const cls = era < 3.50 ? "good" : era < 4.50 ? "warn" : "bad";
  return `<span class="stat-chip ${cls}">ERA ${era.toFixed(2)}</span>`;
}
function kpChip(kp) {
  const cls = kp > 26 ? "good" : kp > 20 ? "warn" : "bad";
  return `<span class="stat-chip ${cls}">K% ${kp.toFixed(1)}</span>`;
}
function k9Chip(k9) {
  const cls = k9 > 10 ? "good" : k9 > 8 ? "warn" : "bad";
  return `<span class="stat-chip ${cls}">K/9 ${k9.toFixed(1)}</span>`;
}
// CrowdsLine NRFI record badge shown in card header
function clNrfiChip(cl) {
  if (!cl) return "";
  const pct = cl.nrfiPct;
  const cls = pct >= 65 ? "good" : pct >= 50 ? "warn" : "bad";
  const stk = cl.streak ? (cl.streak.includes("NRFI") ? " 🔥" : " ❄️") : "";
  return `<span class="stat-chip ${cls}" title="CrowdsLine career NRFI%">1st ${pct.toFixed(0)}%${stk}</span>`;
}

// ── GAME LOG RENDER ───────────────────────────────────────────────────────────
function renderGameLog(gameLog, pitcherHand) {
  if (!gameLog || gameLog.length === 0) return "";
  const avgK = gameLog.length ? (gameLog.reduce((a,s)=>a+s.k,0)/gameLog.length).toFixed(1) : "—";
  return `
  <div style="background:#0a0e1a;border-radius:8px;padding:11px 14px;margin-top:10px">
    <div style="font-size:10px;font-weight:700;color:#64748b;letter-spacing:.06em;margin-bottom:8px">
      📋 LAST ${gameLog.length} STARTS — Avg K: <span style="color:#00ff88">${avgK}</span>
    </div>
    <table class="game-log-table">
      <thead><tr>
        <th>DATE</th><th>OPP</th><th>IP</th>
        <th>K</th><th>H</th><th>BB</th><th>ER</th><th>DEC</th>
      </tr></thead>
      <tbody>
        ${gameLog.map(s => {
          const kClass = s.k >= 8 ? "k-high" : s.k >= 5 ? "k-mid" : s.k <= 2 ? "k-low" : "";
          const resultColor = s.result==="W"?"#00ff88":s.result==="L"?"#ff4d6d":"#64748b";
          return `<tr>
            <td>${s.date}</td>
            <td style="color:#e2e8f0;font-weight:700">${s.opp}</td>
            <td>${s.ip}</td>
            <td class="${kClass}">${s.k}</td>
            <td>${s.h}</td>
            <td>${s.bb}</td>
            <td style="color:${s.er===0?"#00ff88":s.er>=4?"#ff4d6d":"#94a3b8"}">${s.er}</td>
            <td style="color:${resultColor};font-weight:700">${s.result}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  </div>`;
}

// ── UMP ZONE CHART RENDER ─────────────────────────────────────────────────────

    if (v === 0) return { bg:"rgba(100,116,139,.12)", border:"rgba(100,116,139,.25)", txt:"#94a3b8" };
    if (v ===-1) return { bg:"rgba(255,77,109,.10)", border:"rgba(255,77,109,.25)", txt:"#ff4d6d" };
    return        { bg:"rgba(255,77,109,.25)", border:"rgba(255,77,109,.5)", txt:"#ff4d6d" };

  const labels = ["TL","TM","TR","ML","MM","MR","BL","BM","BR"];
  return `
  <div style="margin-top:12px">

        <div style="font-size:9px;color:#475569;margin-bottom:5px;text-align:center">Strike zone (catcher view)</div>
        <div style="position:relative;display:inline-block">
          <div class="zone-grid">
            ${zones.map((v,i) => {
              const c = zoneColor(v);
              const sign = v > 0 ? "+" : "";
              return `<div class="zone-cell" style="background:${c.bg};border-color:${c.border};color:${c.txt}">${sign}${v}</div>`;
            }).join("")}
          </div>
          <div style="position:absolute;top:-14px;left:0;right:0;display:flex;justify-content:space-between;font-size:8px;color:#475569;padding:0 4px">

            <div style="font-size:8px;color:#475569;text-align:right;margin-top:4px">MID</div>
            <div style="font-size:8px;color:#475569;text-align:right;margin-top:4px">BOT</div>
          </div>
        </div>

      <div style="flex:1;min-width:120px">

          <span style="font-size:9px;background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.2);color:#00ff88;border-radius:3px;padding:1px 5px">+1 More strikes</span>
          <span style="font-size:9px;background:rgba(100,116,139,.12);border:1px solid rgba(100,116,139,.25);color:#94a3b8;border-radius:3px;padding:1px 5px">0 Average</span>
          <span style="font-size:9px;background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.2);color:#ff4d6d;border-radius:3px;padding:1px 5px">-1 Fewer strikes</span>
