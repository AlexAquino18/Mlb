<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MLB Edge Model</title>

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MLB Edge" />
  <meta name="theme-color" content="#0a0e1a" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>

    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body { background: #0a0e1a; font-family: 'IBM Plex Mono', 'Courier New', monospace; color: #e2e8f0; min-height: 100vh; -webkit-overflow-scrolling: touch; overflow-scrolling: touch; }
    /* Tap targets: remove iOS 300ms delay */
    button, .tab-btn, .filter-btn, .card-hd, .batter-row, a { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0e1a; }
    ::-webkit-scrollbar-thumb { background: #1e2d45; border-radius: 3px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    #header { background: #0d1525; border-bottom: 1px solid #1e2d45; padding: 20px 24px; padding-top: max(20px, env(safe-area-inset-top)); position: sticky; top: 0; z-index: 100; }
    #header-inner { max-width: 960px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: .1em; color: #00d4ff; line-height: 1; text-shadow: 0 0 20px #00d4ff55; }
    #subtitle { color: #64748b; font-size: 11px; margin-top: 3px; }
    #header-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    input[type=date] { background: #111827; border: 1px solid #1e2d45; border-radius: 6px; padding: 6px 10px; color: #e2e8f0; font-size: 11px; font-family: inherit; cursor: pointer; }
    input[type=date]::-webkit-calendar-picker-indicator { filter: invert(.7); cursor: pointer; }
    #updated { color: #64748b; font-size: 11px; }
    .btn { border-radius: 8px; cursor: pointer; font-size: 12px; font-family: inherit; font-weight: 700; padding: 8px 16px; }
    .btn-accent { background: rgba(0,212,255,.12); border: 1px solid rgba(0,212,255,.4); color: #00d4ff; }
    .btn-accent:disabled { opacity: .4; cursor: default; }

    #main { max-width: 960px; margin: 0 auto; padding: 24px 16px; padding-bottom: max(24px, env(safe-area-inset-bottom)); }
    #tabs { display: flex; gap: 4px; background: #111827; padding: 4px; border-radius: 10px; border: 1px solid #1e2d45; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; background: transparent; color: #64748b; font-family: inherit; font-weight: 700; font-size: 13px; transition: all .2s; }
    .tab-btn.active { background: #00d4ff; color: #0a0e1a; }

    #filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .filter-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid #1e2d45; background: transparent; color: #64748b; cursor: pointer; font-size: 11px; font-family: inherit; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
    .filter-btn.active { border-color: #00d4ff; background: rgba(0,212,255,.12); color: #00d4ff; }

    #loader { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 50px 0; }
    .spinner { width: 44px; height: 44px; border: 3px solid #1e2d45; border-top-color: #00d4ff; border-radius: 50%; animation: spin .8s linear infinite; }
    #load-status { color: #64748b; font-size: 12px; font-family: monospace; }

    #error-box { background: rgba(255,77,109,.07); border: 1px solid rgba(255,77,109,.3); border-radius: 10px; padding: 16px; color: #ff4d6d; font-size: 13px; display: flex; align-items: center; gap: 12px; }

    #summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .sum-card { background: #111827; border: 1px solid #1e2d45; border-radius: 10px; padding: 16px; text-align: center; }

    .stat-chip.good { background: rgba(0,255,136,.1); border-color: rgba(0,255,136,.25); color: #00ff88; }
    .stat-chip.warn { background: rgba(255,214,10,.1); border-color: rgba(255,214,10,.25); color: #ffd60a; }
    .stat-chip.bad  { background: rgba(255,77,109,.1); border-color: rgba(255,77,109,.25); color: #ff4d6d; }
    .card-right { text-align: right; flex-shrink: 0; }

    .src-probable  { background: rgba(0,212,255,.12); border: 1px solid rgba(0,212,255,.35); color: #00d4ff; border-radius: 4px; padding: 1px 6px; font-size: 10px; font-weight: 700; }
    .src-announced { background: rgba(255,214,10,.1); border: 1px solid rgba(255,214,10,.35); color: #ffd60a; border-radius: 4px; padding: 1px 6px; font-size: 10px; font-weight: 700; }

    .take-sub { font-size: 11px; margin-top: 4px; opacity: .75; }

    .pitcher-col-title { font-size: 12px; font-weight: 700; margin-bottom: 10px; }
    .recent-tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; margin-left: 6px; vertical-align: middle; }
    .bar-row { margin-bottom: 8px; }
    .bar-lbl-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
    .bar-lbl { color: #64748b; font-size: 11px; }
    .bar-val { font-size: 11px; font-weight: 700; }

    .bar-fill { height: 5px; border-radius: 4px; transition: width .5s ease; }
    .info-row { background: #0a0e1a; border-radius: 8px; padding: 11px 14px; margin-top: 8px; }
    .info-lbl { color: #64748b; font-size: 11px; margin-bottom: 4px; }
    .analysis-box { background: #0a0e1a; border-radius: 8px; padding: 12px 14px; margin-top: 10px; }
    .analysis-lbl { color: #64748b; font-size: 10px; letter-spacing: .06em; margin-bottom: 5px; }
    .analysis-txt { font-size: 13px; line-height: 1.65; color: #e2e8f0; }

    .divider { border: none; border-top: 1px solid #1e2d45; margin: 14px 0; }
    .batter-row { cursor: pointer; }
    .batter-row:hover { background: rgba(0,212,255,.03); border-radius: 6px; }

    /* ── GAME LOG TABLE ──────────────────────────────────────────────────── */
    .game-log-table { width:100%; border-collapse:collapse; font-size:11px; margin-top:8px; }

    .game-log-table tr:hover td { background:rgba(0,212,255,.04); }
    .k-high { color:#00ff88 !important; font-weight:700; }
    .k-mid  { color:#ffd60a !important; font-weight:700; }

    .zone-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; width:108px; }
    .zone-cell { width:34px; height:28px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; border:1px solid rgba(255,255,255,.08); }
    /* ── LINE MOVEMENT ──────────────────────────────────────────────────── */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .line-moved { animation:pulse 1.8s ease-in-out 4; }
    /* ── SAFARI / OLDER iOS: flex gap fallback (gap in flex requires Safari 14.1+) ── */
    @supports not (gap: 1px) {
      #header-inner > * + * { margin-left: 12px; }
      #header-right > * + * { margin-left: 8px; }
      #tabs > * + * { margin-left: 4px; }
      #filters > * + * { margin-left: 8px; }
      #loader > * + * { margin-top: 12px; }
      .pitcher-line > * + * { margin-left: 6px; }
      .lineup-list > * + * { margin-top: 3px; }
      .pitcher-row > * + * { margin-top: 3px; }
    }
    /* ── MOBILE ──────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      #header { padding: 12px 14px; }
      h1 { font-size: 24px; }
      #subtitle { font-size: 10px; }
      #header-right { gap: 6px; }
      #header-right input[type=date] { font-size: 10px; padding: 5px 7px; }
      .btn { font-size: 11px; padding: 6px 10px; }
      #pp-debug-btn { display: none !important; }
      #main { padding: 14px 10px; }
      .tab-btn { font-size: 11px; padding: 8px 6px; }
      #summary-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .sum-val { font-size: 24px; }
      .sum-lbl { font-size: 10px; }
      .game-card { margin-bottom: 8px; }
      .card-hd { padding: 12px 14px; gap: 8px; }
      .card-teams { font-size: 13px; }
      .conf-num { font-size: 20px; }
      .pitcher-name { font-size: 11px; }
      .stat-chip { font-size: 9px; padding: 1px 4px; }
      .hand-tag { font-size: 9px; }
      .card-bd { padding: 0 14px 14px; }
      /* Stack pitcher stats grid to single column on phone */
      .pitcher-grid { grid-template-columns: 1fr; gap: 10px; }
      .take-value { font-size: 20px; }
      .analysis-txt { font-size: 12px; }
      .bar-lbl, .bar-val { font-size: 10px; }
      .lineup-batter { font-size: 11px; }
      #filters { gap: 5px; }
      .filter-btn { font-size: 10px; padding: 3px 9px; }
    }
  </style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <div>
      <h1>MLB EDGE MODEL</h1>
      <div id="subtitle">Initializing…</div>
    </div>
    <div id="header-right">
      <input type="date" id="date-picker" />
      <span id="updated"></span>
      <button class="btn btn-accent" id="pp-debug-btn" style="display:none" onclick="document.getElementById('pp-debug').style.display='block'">📊 Book lines</button>
      <button class="btn btn-accent" id="refresh-btn">↻ REFRESH</button>
    </div>
  </div>
</div>

<div id="main">
  <div id="tabs">
    <button class="tab-btn active" data-tab="nrfi">⚾ NRFI / YRFI</button>
    <button class="tab-btn" data-tab="strikeouts">🔥 STRIKEOUT PROPS</button>
    <button class="tab-btn" data-tab="hitters">🏏 HITTER PROPS</button>
  </div>
  <div id="filters" style="display:none"></div>
  <div id="loader" style="display:none">
    <div class="spinner"></div>
    <div id="load-status">Fetching schedule…</div>
  </div>
  <div id="error-box" style="display:none">
    <span id="error-msg"></span>
    <button class="btn-retry" id="retry-btn">Retry</button>
  </div>
  <div id="summary-grid" style="display:none"></div>
  <div id="cards"></div>
  <!-- PP Debug Panel -->
  <div id="pp-debug" style="display:none;background:#0d1525;border:1px solid #1e2d45;border-radius:10px;padding:16px;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="color:#00d4ff;font-size:12px;font-weight:700">📊 ODDS-API DEBUG</span>
      <button onclick="document.getElementById('pp-debug').style.display='none'" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:14px">✕</button>
    </div>
    <div id="pp-debug-body" style="font-size:11px;line-height:1.8;color:#94a3b8;font-family:monospace"></div>
  </div>

  <div id="disclaimer" style="display:none">
    ⚠ <strong style="color:#ffd60a">DISCLAIMER:</strong> For informational purposes only.
    Stats from MLB Stats API. Weather from Open-Meteo. Umpire data from Umpire Scorecards (2023–2025 averages).
    Verify lineups/props with official sources before wagering. Bet responsibly.
  </div>
</div>

<script>
"use strict";
const MLB    = "https://statsapi.mlb.com/api/v1";
const PP     = "https://api.prizepicks.com";
const PROXY  = "https://corsproxy.io/?url=";
const PROXY2 = "https://api.allorigins.win/raw?url=";
const PROXY3 = "https://api.codetabs.com/v1/proxy?quest=";
// ↓ Add all your Deno proxy URLs here — the app rotates through them automatically.
//   When one gets blocked, the next one is tried. Create new ones at dash.deno.com.
const DENO_PROXIES = [
  "https://mlb-pp-proxy.alexaquinojr2015.workers.dev",
  "https://epic-condor-69.alexaquino18.deno.net",
  "https://thick-newt-44.alexaquino18.deno.net",
  "https://kind-gecko-64.alexaquino18.deno.net",
];
const CF_WORKER = DENO_PROXIES[0]; // kept for compatibility

let activeTab    = "nrfi";
let activeFilter = "all";
let selectedDate = "";
let cache        = { nrfi: null, strikeouts: null, hitters: null };
let ppLines      = {};
let ppLoaded     = false;
let ppTeamMap    = {};
let ppNRFI       = {};
const _mlbSearch = {};

// ── LINE MOVEMENT TRACKING ─────────────────────────────────────────────────
let ppLinesSnapshot = {};
let lineMovements   = {};

function captureLineSnapshot() {
  if (!Object.keys(ppLines).length) return;
  if (Object.keys(ppLinesSnapshot).length > 0) return; // already loaded
  const snapKey = `ppSnap_${today()}`;
  try {
    const saved = localStorage.getItem(snapKey);
    if (saved) {
      // Returning visitor today: compare current lines against the first-load snapshot
      ppLinesSnapshot = JSON.parse(saved);
      return;
    }
  } catch {}
  // First load of the day: save current lines as the baseline snapshot
  ppLinesSnapshot = JSON.parse(JSON.stringify(ppLines));
  try { localStorage.setItem(snapKey, JSON.stringify(ppLinesSnapshot)); } catch {}
  // Clean up snapshots older than 2 days
  try {
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    const twoDaysAgo = new Date(Date.now() - 172800000).toISOString().slice(0, 10);
    [`ppSnap_${yesterday}`, `ppSnap_${twoDaysAgo}`].forEach(k => {
      if (localStorage.getItem(k)) localStorage.removeItem(k);
    });
  } catch {}
}
function detectLineMovements() {
  lineMovements = {};
  if (!Object.keys(ppLinesSnapshot).length) return;
  for (const [key, cur] of Object.entries(ppLines)) {
    const snap = ppLinesSnapshot[key];
    if (!snap || cur.line === snap.line) continue;
    lineMovements[key] = { from: snap.line, to: cur.line,
      dir: cur.line > snap.line ? "up" : "down", name: cur.rawName,
      ts: Date.now() };
  }
}

// ── FD / DK odds (compare first snapshot of day vs current) ────────────────
let oddsMovements = {};
function parseOddsNumber(v) {
  if (v == null || v === "" || String(v).toUpperCase() === "N/A") return null;
  const n = parseFloat(String(v).replace(/[^0-9.\-+eE]/g, ""));
  return Number.isNaN(n) ? null : n;
}
/** Decimal (e.g. 1.91) or American (-135) string from Odds-API */
function toAmericanOdds(raw) {
  if (raw == null || raw === "") return null;
  const s = String(raw).trim();
  if (/^[+\-]?\d{3,5}$/.test(s)) {
    return parseInt(s, 10);
  }
  const d = parseOddsNumber(raw);
  if (d == null || d <= 1) return null;
  if (d >= 2) return Math.round((d - 1) * 100);
  return Math.round(-100 / (d - 1));
}
function formatAmerican(am) {
  if (am == null || Number.isNaN(am)) return "—";
  return am > 0 ? `+${am}` : `${am}`;
}
function detectOddsMovements() {
  oddsMovements = {};
  if (!Object.keys(ppLinesSnapshot).length) return;
  for (const [key, cur] of Object.entries(ppLines)) {
    if (key.includes(":")) continue;
    const snap = ppLinesSnapshot[key];
    if (!snap?.books || !cur.books) continue;
    const out = { fd: null, dk: null };
    for (const [lbl, bk] of [["fd", "FanDuel"], ["dk", "DraftKings"]]) {
      const c = cur.books[bk];
      const s = snap.books[bk];
      if (!c || !s) continue;
      const cO = toAmericanOdds(c.over);
      const sO = toAmericanOdds(s.over);
      if (cO != null && sO != null && cO !== sO) {
        out[lbl] = { from: sO, to: cO, dir: cO < sO ? "down" : "up" };
      }
    }
    if (out.fd || out.dk) oddsMovements[key] = out;
  }
}
function getOddsMovement(pitcherName) {
  const key = normName(pitcherName);
  return oddsMovements[key] || null;
}

function normBookmakerLabel(name) {
  const n = (name || "").toLowerCase();
  if (n.includes("fanduel")) return "FanDuel";
  if (n.includes("draftking")) return "DraftKings";
  return name || "";
}
/** Per-book Over/Under only for rows whose line matches the card line (same hdp). No “closest alt line” — avoids FD @5.5 vs DK @6.5 on one card. */
function buildBooksFromRows(bookRows, targetLine) {
  const out = {};
  const want = ["FanDuel", "DraftKings"];
  const tol = 0.01;
  for (const bn of want) {
    const rows = (bookRows || []).filter((r) => normBookmakerLabel(r.book) === bn);
    if (!rows.length) continue;
    const pick = rows.find((r) => Math.abs(Number(r.hdp) - Number(targetLine)) < tol);
    if (!pick) continue;
    out[bn] = {
      hdp: pick.hdp,
      over: pick.over,
      under: pick.under,
      overAm: toAmericanOdds(pick.over),
      underAm: toAmericanOdds(pick.under),
    };
  }
  return out;
}

const SO_ODDS_HIST_VER = "v2";
function soOddsHistKey(dateStr, pitcherNorm) {
  return `soOddsHist_${SO_ODDS_HIST_VER}:${dateStr}:${pitcherNorm}`;
}
function getSoOddsHistory(dateStr, pitcherNorm) {
  try {
    const raw = localStorage.getItem(soOddsHistKey(dateStr, pitcherNorm));
    if (!raw) return [];
    const h = JSON.parse(raw);
    return Array.isArray(h) ? h : [];
  } catch {
    return [];
  }
}
function appendSoOddsHistory(dateStr, pitcherNorm, pt) {
  if (!pitcherNorm || (pt.fdOver == null && pt.dkOver == null)) return;
  const key = soOddsHistKey(dateStr, pitcherNorm);
  let hist = getSoOddsHistory(dateStr, pitcherNorm);
  const now = Date.now();
  const last = hist[hist.length - 1];
  const mergeWindow = 3 * 60 * 1000;
  const row = { t: now, line: pt.line, fdOver: pt.fdOver, dkOver: pt.dkOver };
  if (last && now - last.t < mergeWindow) {
    hist[hist.length - 1] = row;
  } else {
    hist.push(row);
  }
  if (hist.length > 96) hist = hist.slice(-96);
  try {
    localStorage.setItem(key, JSON.stringify(hist));
  } catch (_) {}
}

/** Merge saved snapshots with current card odds so the chart always draws (flat until more history). */
function buildOddsDisplayHistory(hist, g) {
  if (!g || g.lineSrc !== "sportsbook") return Array.isArray(hist) ? hist : [];
  const cur = { t: Date.now(), line: g.line, fdOver: g.fdOverAm, dkOver: g.dkOverAm };
  if (cur.fdOver == null && cur.dkOver == null) return Array.isArray(hist) ? hist : [];
  const h = Array.isArray(hist) ? hist.slice() : [];
  if (h.length === 0) {
    const t0 = Date.now() - 60 * 60 * 1000;
    return [
      { t: t0, line: cur.line, fdOver: cur.fdOver, dkOver: cur.dkOver },
      { ...cur },
    ];
  }
  if (h.length === 1) {
    const a = h[0];
    const right = { ...cur };
    if (right.t <= a.t) right.t = a.t + 60 * 1000;
    return [a, right];
  }
  return h;
}

function renderOddsSparkChart(hist, opts = {}) {
  const W = opts.width || 380;
  const H = opts.height || 148;
  const pad = { l: 40, r: 14, t: 10, b: 32 };
  const rawHist = hist;
  const rows = buildOddsDisplayHistory(hist, opts.game);
  const paddedFromCurrent = !rawHist || rawHist.length < 2;
  if (!rows || rows.length < 2) {
    return `<div style="color:#64748b;font-size:12px;padding:12px">No FanDuel / DraftKings Over prices for this prop yet.</div>`;
  }
  const fdC = "#2B8AEB";
  const dkC = "#43A047";
  const vals = [];
  rows.forEach((p) => {
    if (p.fdOver != null) vals.push(p.fdOver);
    if (p.dkOver != null) vals.push(p.dkOver);
  });
  if (!vals.length) {
    return `<div style="color:#64748b;font-size:12px;padding:12px">No FanDuel / DraftKings Over prices for this prop yet.</div>`;
  }
  let minV = Math.min(...vals);
  let maxV = Math.max(...vals);
  if (minV === maxV) {
    minV -= 5;
    maxV += 5;
  }
  const xw = W - pad.l - pad.r;
  const yh = H - pad.t - pad.b;
  const n = rows.length;
  const xAt = (i) => pad.l + (n <= 1 ? 0 : (i / (n - 1)) * xw);
  const yAt = (v) => pad.t + yh - ((v - minV) / (maxV - minV || 1)) * yh;

  function stepPath(getter) {
    let d = "";
    let prev = null;
    for (let i = 0; i < n; i++) {
      const v = getter(rows[i]);
      if (v == null) continue;
      const x = xAt(i);
      const y = yAt(v);
      if (!prev) {
        d = `M ${x} ${y}`;
        prev = { x, y };
        continue;
      }
      d += ` L ${x} ${prev.y} L ${x} ${y}`;
      prev = { x, y };
    }
    return d;
  }
  const pathFd = stepPath((p) => p.fdOver);
  const pathDk = stepPath((p) => p.dkOver);
  const tMin = rows[0].t;
  const tMax = rows[rows.length - 1].t;
  const spanMs = Math.max(1, tMax - tMin);
  const d0 = new Date(tMin);
  const d1 = new Date(tMax);
  const sameCalendarDay =
    d0.getFullYear() === d1.getFullYear() &&
    d0.getMonth() === d1.getMonth() &&
    d0.getDate() === d1.getDate();
  const fmtTick = (d) =>
    sameCalendarDay && spanMs <= 48 * 60 * 60 * 1000
      ? d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })
      : d.toLocaleString([], { month: "numeric", day: "numeric", hour: "numeric", minute: "2-digit" });
  const nTimeTicks = 7;
  const timeVLines = [];
  const timeLabels = [];
  for (let i = 0; i < nTimeTicks; i++) {
    const frac = i / (nTimeTicks - 1);
    const ts = tMin + frac * spanMs;
    const x = pad.l + frac * xw;
    const anchor = i === 0 ? "start" : i === nTimeTicks - 1 ? "end" : "middle";
    timeVLines.push(
      `<line x1="${x}" y1="${pad.t}" x2="${x}" y2="${pad.t + yh}" stroke="rgba(148,163,184,.09)" stroke-dasharray="2 4"/>`
    );
    timeLabels.push(
      `<text x="${x}" y="${H - 6}" fill="#94a3b8" font-size="9" text-anchor="${anchor}">${fmtTick(new Date(ts))}</text>`
    );
  }
  const gridId = "soGrid_" + Math.random().toString(36).slice(2, 11);

  return `
  <div style="margin-top:6px">
    ${
      paddedFromCurrent
        ? `<div style="font-size:11px;color:#94a3b8;margin-bottom:8px;line-height:1.4">Showing <strong style="color:#cbd5e1">current</strong> Over odds on the chart. After another <strong style="color:#cbd5e1">refresh</strong> or an <strong style="color:#cbd5e1">hourly</strong> update, movement will appear when prices change.</div>`
        : ""
    }
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:8px;font-size:12px;color:#cbd5e1">
      <span><span style="color:${fdC};font-weight:800">●</span> FanDuel Over</span>
      <span><span style="color:${dkC};font-weight:800">●</span> DraftKings Over</span>
    </div>
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;max-width:100%;height:auto">
      <defs>
        <pattern id="${gridId}" width="8" height="8" patternUnits="userSpaceOnUse">
          <path d="M 8 0 L 0 0 0 8" fill="none" stroke="rgba(148,163,184,.12)" stroke-width="0.5"/>
        </pattern>
      </defs>
      <rect x="${pad.l}" y="${pad.t}" width="${xw}" height="${yh}" fill="url(#${gridId})" opacity="0.5"/>
      ${timeVLines.join("")}
      ${[0, 0.25, 0.5, 0.75, 1]
        .map((t) => {
          const v = minV + t * (maxV - minV);
          const y = yAt(v);
          return `<line x1="${pad.l}" y1="${y}" x2="${W - pad.r}" y2="${y}" stroke="rgba(148,163,184,.15)" stroke-dasharray="3 3"/>`;
        })
        .join("")}
      ${[0, 0.5, 1]
        .map((t) => {
          const v = minV + t * (maxV - minV);
          const y = yAt(v);
          return `<text x="${pad.l - 4}" y="${y + 4}" fill="#94a3b8" font-size="10" text-anchor="end">${Math.round(v)}</text>`;
        })
        .join("")}
      ${pathFd ? `<path d="${pathFd}" fill="none" stroke="${fdC}" stroke-width="2.5" stroke-linejoin="round"/>` : ""}
      ${pathDk ? `<path d="${pathDk}" fill="none" stroke="${dkC}" stroke-width="2.5" stroke-linejoin="round"/>` : ""}
      ${timeLabels.join("")}
    </svg>
    <div style="font-size:11px;color:#64748b;margin-top:6px;line-height:1.45">American odds on <strong style="color:#e2e8f0">Over ${rows[rows.length - 1].line != null ? rows[rows.length - 1].line : ""}</strong> — step chart; snapshots merge within ~3 min, then hourly when the tab is hidden.</div>
  </div>`;
}

function recordStrikeoutOddsHistory(data, dateStr) {
  if (!data || !dateStr) return;

      line: row.line,
      fdOver: row.fdOverAm,
      dkOver: row.dkOverAm,

  }
}

function getParkRunEnvPF(homeAbbr) {
  const k = normTeam(homeAbbr || "");
  const row = PARK_RANK_VENUE.find((r) => r.key === k);
  return row ? row.factor : 100;
}
/** PF>100 favors batters → nudge pitcher K% down (negative pp); PF<100 favors pitchers → positive pp */
function parkRunEnvKPP(pf) {
  return Math.max(-1.45, Math.min(1.45, (100 - pf) * 0.062));
}
/** Offense multiplier vs 100 PF — layered on top of PARK_HIT_FACTOR (avoid double-counting). */
function parkRunEnvOffenseMult(pf) {
  return 0.80 + 0.20 * (pf / 100);
}

// ─── MOBILE DETECTION ─────────────────────────────────────────────────────────
const IS_MOBILE = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

// Run async tasks with a concurrency limit — prevents iOS from killing the tab
// with too many simultaneous requests (use Promise.all on desktop, batched on mobile)
async function mapConcurrent(items, fn, limit = IS_MOBILE ? 4 : 30) {
  const results = new Array(items.length);
  let idx = 0;
  async function worker() {
    while (idx < items.length) {
      const i = idx++;
      results[i] = await fn(items[i], i);
    }
  }
  const workers = Array.from({ length: Math.min(limit, items.length) }, worker);
  await Promise.all(workers);
  return results;
}

// ─── HTTP ─────────────────────────────────────────────────────────────────────
// Fetch with a hard timeout (ms). Throws on timeout or network error.
async function fetchTimeout(url, ms = 10000, opts = {}) {
  const ctrl  = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, { ...opts, signal: ctrl.signal });
    clearTimeout(timer);
    return r;
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}

async function mlbGet(path) {
  const url   = MLB + path;
  const bases = [
    url,                                      // direct (works when CORS headers present)
    PROXY  + encodeURIComponent(url),         // corsproxy.io
    PROXY2 + encodeURIComponent(url),         // allorigins fallback
  ];
  for (const base of bases) {
    try {
      const r = await fetchTimeout(base, 10000);
      if (r.ok) return r.json();
    } catch (_) {}
  }
  throw new Error("Network error: " + url);
}

// ── PrizePicks response cache (localStorage, TTL = 60 min) ───────────────────
const PP_CACHE_TTL = 60 * 60 * 1000;
function ppCacheKey(path) { return "mlb_pp_v1:" + path; }
function ppCacheGet(path) {
  try {
    const raw = localStorage.getItem(ppCacheKey(path));
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > PP_CACHE_TTL) return null;
    return data;
  } catch (_) { return null; }
}
function ppCacheSet(path, data) {
  try { localStorage.setItem(ppCacheKey(path), JSON.stringify({ ts: Date.now(), data })); } catch (_) {}
}
function ppCacheGetStale(path) {
  try {
    const raw = localStorage.getItem(ppCacheKey(path));
    if (!raw) return null;
    const { data } = JSON.parse(raw);
    return data || null;
  } catch (_) { return null; }
}

async function ppGet(path) {
  // ── 1. Fresh cache hit ────────────────────────────────────────────────────
  const cached = ppCacheGet(path);
  if (cached) return cached;

  const fullUrl = PP + path;

  const safeParseResponse = async (r) => {
    if (!r) return null;
    // Accept 200 or 304; anything else (403, 429, 502) skip to next proxy
    if (!r.ok && r.status !== 304) return null;
    let text;
    try { text = await r.text(); } catch (_) { return null; }
    if (!text || !String(text).trim()) return null;
    let j;
    try { j = JSON.parse(text); } catch (_) { return null; }
    if (j && j.error && j.data === undefined && j.included === undefined) return null;
    if (j && j.errors) return null;
    return j;
  };

  const netlifyQs = "/.netlify/functions/pp?path=" + encodeURIComponent(path);

  // Build ordered proxy list — own edge function is far most reliable
  const urls = [];

  // 1a. All Deno proxies — tried in order, rotates automatically when one is blocked
  for (const p of DENO_PROXIES) {
    if (p) urls.push(p.replace(/\/$/, "") + "?path=" + encodeURIComponent(path));
  }

  // 1b. Runtime override — window variable OR localStorage (survives refresh)
  const _proxyOverride = (typeof window !== "undefined" && window.MLB_EDGE_PP_PROXY)
    ? String(window.MLB_EDGE_PP_PROXY)
    : (() => { try { return localStorage.getItem("mlb_pp_proxy_override") || ""; } catch (_) { return ""; } })();
  if (_proxyOverride && _proxyOverride !== CF_WORKER) {
    urls.push(_proxyOverride.replace(/\/$/, "") + "?path=" + encodeURIComponent(path));
  }

  // 2. Own edge function — only try the one that matches the current host
  if (typeof location !== "undefined" && location.protocol !== "file:") {
    const host = location.hostname;
    const isNetlify = host.includes("netlify.app") || host.includes("netlify.com");
    const isVercel  = host.includes("vercel.app");
    const isLocal   = host === "localhost" || host === "127.0.0.1";
    if (isNetlify || isLocal) urls.push(location.origin + netlifyQs);
    if (isVercel  || isLocal) urls.push(location.origin + "/api/pp?path=" + encodeURIComponent(path));
  }

  // 3. Local dev server (npm start → port 8080) or netlify dev (port 8888)
  if (typeof location !== "undefined" &&
      (location.hostname === "localhost" || location.hostname === "127.0.0.1")) {
    if (location.port !== "8080") urls.push("http://127.0.0.1:8080" + netlifyQs);
    if (location.port !== "8888") urls.push("http://127.0.0.1:8888" + netlifyQs);
  }

  // 4. corsproxy.io
  urls.push(PROXY + encodeURIComponent(fullUrl));
  // 5. codetabs — different IP pool
  urls.push(PROXY3 + encodeURIComponent(fullUrl));
  for (const u of urls) {
    try {
      const r = await fetchTimeout(u, 18000, { headers: { Accept: "application/json" } });
      const j = await safeParseResponse(r);
      if (j && (j.data !== undefined || j.included !== undefined || j.meta !== undefined)) {
        ppCacheSet(path, j);
        return j;
      }
    } catch (_) {}
  }

  // ── All proxies failed — return stale cache if available ──────────────────
  const stale = ppCacheGetStale(path);
  if (stale) {
    console.warn("[PP] All proxies failed; using stale cache for", path);
    return stale;
  }
  return null;
}

// ─── SPORTSBOOK LINES (Odds-API.io) ─────────────────────────────────────────
// Normalize name for storage key: "Gerrit Cole" → "cole gerrit"
function normName(s) {
  return (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .toLowerCase().trim().replace(/[^a-z\s]/g,"").split(/\s+/).sort().join(" ");
}

// MLB Stats API team IDs → abbreviation (schedule often omits abbreviation)
const MLB_ID_TO_ABBR = {
  133:"ATH", 134:"PIT", 135:"SD",  136:"SEA", 137:"SF",  138:"STL",
  139:"TB",  140:"TEX", 141:"TOR", 142:"MIN", 143:"PHI", 144:"ATL",
  145:"CWS", 146:"MIA", 147:"NYY", 158:"MIL", 108:"LAA", 109:"AZ",
  110:"BAL", 111:"BOS", 112:"CHC", 113:"CIN", 114:"CLE", 115:"COL",
  116:"DET", 117:"HOU", 118:"KC",  119:"LAD", 120:"WSH", 121:"NYM",
};
function teamAbbr(teamObj) {
  return MLB_ID_TO_ABBR[teamObj?.id] || teamObj?.abbreviation?.toUpperCase() || "";
}

/** Map people-search / API abbrs onto the same bucket as MLB_ID_TO_ABBR (OAK≠ATH, WSN≠WSH, etc.). */
function canonAbbrForCompare(ab) {
  const u = String(ab || "")
    .toUpperCase()
    .replace(/[^A-Z]/g, "");
  const map = {
    OAK: "ATH",
    OAKLAND: "ATH",
    WAS: "WSH",
    WSN: "WSH",
    MON: "WSH",
    ARI: "AZ",
    ARZ: "AZ",
    SFG: "SF",
    TBR: "TB",
    TAM: "TB",
    SDP: "SD",
    SDN: "SD",
    CHW: "CWS",
    KCR: "KC",
    ANA: "LAA",
  };
  return map[u] || u;
}

/** Map common book abbreviations to our schedule abbr bucket (ARI→AZ, WAS→WSH, …). */
const MLB_ODDS_ABBR_CANON = {
  ari: "az", arz: "az", az: "az",
  ath: "ath", oak: "ath",
  was: "wsh", wsn: "wsh", wsh: "wsh",
  sfg: "sf", sf: "sf",
  kcr: "kc", kc: "kc",
  tbr: "tb", tb: "tb", tam: "tb",
  sdp: "sd", sd: "sd",
  chw: "cws", cws: "cws",
  chc: "chc",
  nym: "nym", nyy: "nyy",
  lad: "lad", laa: "laa", ana: "laa",
  bal: "bal", tor: "tor", tex: "tex", sea: "sea", mia: "mia", det: "det",
  cin: "cin", cle: "cle", col: "col", pit: "pit", stl: "stl", mil: "mil",
  min: "min", phi: "phi", atl: "atl", hou: "hou",
};

function fuzzyNameEq(a, b) {
  if (!a || !b) return false;
  if (cleanName(a) === cleanName(b)) return true;
  const pa = cleanName(a).split(/\s+/).filter(Boolean);
  const pb = cleanName(b).split(/\s+/).filter(Boolean);
  if (!pa.length || !pb.length) return false;
  if (pa[pa.length - 1] !== pb[pb.length - 1]) return false;
  return pa[0][0] === pb[0][0];
}

function normTeamStr(s) {
  return (s || "").toLowerCase().replace(/[^a-z0-9\s]/g, "").trim();
}

function looseTeamMatch(a, b) {
  const na = normTeamStr(a), nb = normTeamStr(b);
  if (!na || !nb) return false;
  if (na === nb) return true;
  if (na.length >= 4 && nb.includes(na)) return true;
  if (nb.length >= 4 && na.includes(nb)) return true;
  return false;
}

/** Odds-API uses short/city names or 2–3 letter codes; MLB uses full name + teamName + our abbr. */
function oddsStringMatchesMlbTeam(oddsStr, mlbTeamObj) {
  if (!oddsStr || !mlbTeamObj) return false;
  const abbr = teamAbbr(mlbTeamObj);
  if (abbr) {
    const aLetters = normTeamStr(abbr).replace(/[^a-z]/g, "");
    const aCanon = MLB_ODDS_ABBR_CANON[aLetters] || aLetters;
    const oNorm = normTeamStr(oddsStr);
    const oLetters = oNorm.replace(/[^a-z]/g, "");
    if (oLetters === aLetters || oLetters === aCanon) return true;
    if (oLetters.length <= 4) {
      const oCanon = MLB_ODDS_ABBR_CANON[oLetters] || oLetters;
      if (oCanon === aCanon) return true;
    }
    for (const w of oNorm.split(/\s+/)) {
      const wl = w.replace(/[^a-z]/g, "");
      if (wl.length >= 2 && wl.length <= 4) {
        const oC = MLB_ODDS_ABBR_CANON[wl] || wl;
        if (oC === aCanon) return true;
      }
    }
  }
  const full = mlbTeamObj.name || "";
  const nick = mlbTeamObj.teamName || "";
  const lastWord = (full.split(/\s+/).pop() || "").toLowerCase();
  const candidates = [full, nick, lastWord].filter(Boolean);
  for (const c of candidates) {
    if (looseTeamMatch(oddsStr, c)) return true;
  }
  const o = normTeamStr(oddsStr);
  const nf = normTeamStr(full);
  const nn = normTeamStr(nick);
  const ot = o.split(/\s+/).filter(t => t.length > 2);
  for (const t of ot) {
    if (nf.includes(t) || nn.includes(t) || (lastWord.length > 2 && t === lastWord)) return true;
  }
  if (nick && o.includes(normTeamStr(nick))) return true;
  return false;
}

function eventMatchesGame(home, away, g) {
  const ht = g.teams?.home?.team;
  const at = g.teams?.away?.team;
  if (!ht || !at) return false;
  const forward = oddsStringMatchesMlbTeam(home, ht) && oddsStringMatchesMlbTeam(away, at);
  const swapped = oddsStringMatchesMlbTeam(home, at) && oddsStringMatchesMlbTeam(away, ht);
  return forward || swapped;
}

function findGameForOddsRow(row, games) {
  for (const g of games) {
    if (eventMatchesGame(row.home, row.away, g)) return g;
  }
  return null;
}

function nameMatchesProbable(playerName, g) {
  const ph = g.teams?.home?.probablePitcher?.fullName;
  const pa = g.teams?.away?.probablePitcher?.fullName;
  return fuzzyNameEq(playerName, ph) || fuzzyNameEq(playerName, pa);
}

/** Books often label markets "Player Props - Strikeouts" (ambiguous). MLB may not list probables for next-day games yet. */
function ambiguousStrikeoutCountsAsPitcher(row, g, player) {
  if (nameMatchesProbable(player, g)) return true;
  const hasProb =
    g.teams?.home?.probablePitcher?.fullName ||
    g.teams?.away?.probablePitcher?.fullName;
  if (!hasProb) {
    const h = numericLineFromRow(row);
    if (Number.isNaN(h)) return true;
    return h >= 2.5;
  }
  return false;
}

function teamAbbrForPitcher(playerName, g) {
  const ph = g.teams?.home?.probablePitcher?.fullName;
  const pa = g.teams?.away?.probablePitcher?.fullName;
  if (fuzzyNameEq(playerName, ph)) return teamAbbr(g.teams.home.team);
  if (fuzzyNameEq(playerName, pa)) return teamAbbr(g.teams.away.team);
  return "";
}

function teamAbbrForHitter(playerName, g) {
  for (const side of ["away", "home"]) {
    const pl = g.lineups?.[`${side}Players`];
    const abbr = teamAbbr(g.teams?.[side]?.team);
    if (!pl || !abbr) continue;
    for (const p of pl) {
      const fn = p.fullName || p.name;
      if (fn && fuzzyNameEq(playerName, fn)) return abbr;
    }
  }
  return "";
}

function numericLineFromRow(row) {
  if (!row) return NaN;
  for (const k of ["hdp", "handicap", "line", "spread"]) {
    const v = row[k];
    if (v != null && v !== "") {
      const n = Number(v);
      if (!Number.isNaN(n)) return n;
    }
  }
  return NaN;
}

/** Typical pitcher-K alt lines are 2.5–15 in half-point steps; float-safe. */
function lineLooksLikePitcherKAlt(h) {
  return h >= 2.5 && h <= 15 && Math.abs(h * 2 - Math.round(h * 2)) < 1e-6;
}

function isBarePlayerPropsMarket(marketName) {
  const raw = (marketName || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  return raw.toLowerCase().trim() === "player props";
}

/**
 * Odds-API often uses market.name === "Player Props" only. Use statHint from server when present;
 * else use schedule (probable vs lineup) and line bands so hitter props are not treated as pitcher K.
 */
function disambiguateBarePlayerProp(row, g, cl) {
  if (!isBarePlayerPropsMarket(row.market)) return cl;
  if (cl.kind === "pitcher_k" || cl.kind === "hitter") return cl;
  const h = numericLineFromRow(row);
  const mp = nameMatchesProbable(row.player, g);
  const mh = !!teamAbbrForHitter(row.player, g);
  const hasProb =
    g.teams?.home?.probablePitcher?.fullName ||
    g.teams?.away?.probablePitcher?.fullName;
  if (mp) return { kind: "pitcher_k" };
  if (mh) {
    if (!Number.isNaN(h) && h <= 4.5) return { kind: "hitter", statKey: "hits" };
    if (!Number.isNaN(h) && h <= 12) return { kind: "hitter", statKey: "tb" };
    return { kind: "hitter", statKey: "hits" };
  }
  // No statHint + no lineup yet: DK/FD batter O/U almost always 0.5–3.5; pitcher K ladders usually 4+. (Avoid h<=2.5-only which tagged ~all rows.)
  if (
    !mp &&
    (cl.kind === "skip" || cl.kind === "so_ambiguous") &&
    !Number.isNaN(h) &&
    Math.abs(h * 2 - Math.round(h * 2)) < 1e-6 &&
    h >= 0.5 &&
    h <= 3.5
  ) {
    return { kind: "hitter", statKey: "hits" };
  }
  if (cl.kind === "so_ambiguous" || cl.kind === "skip") {
    if (!Number.isNaN(h) && lineLooksLikePitcherKAlt(h)) {
      if (h >= 5) return { kind: "so_ambiguous" };
      if (h >= 2.5 && h < 5) {
        if (!hasProb) return { kind: "so_ambiguous" };
        if (h > 3.5) return { kind: "so_ambiguous" };
        return { kind: "skip" };
      }
    }
  }
  return cl;
}

function classifyOddsMarket(marketName, row) {
  const sh = row && row.statHint ? String(row.statHint).toLowerCase().trim() : "";
  if (sh === "nrfi_yrfi") return { kind: "nrfi_game" };
  const raw = (marketName || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  const st = raw.toLowerCase().trim();
  const pitcherScoped =
    st.includes("pitching") ||
    st.includes("pitcher") ||
    st.includes("starter");

  if (sh === "strikeouts") return { kind: "pitcher_k" };
  if (pitcherScoped && ["hits", "tb", "hr", "runs", "rbi", "bb", "sb", "hrr"].includes(sh)) {
    return { kind: "skip" };
  }
  if (sh === "hrr") return { kind: "hitter", statKey: "hrr" };
  if (["hits", "tb", "hr", "runs", "rbi", "bb", "sb"].includes(sh)) return { kind: "hitter", statKey: sh };

  // Game NRFI/YRFI (1st-inning) — ingested into ppNRFI for 📊 Book lines (Odds-API)
  if (st.includes("nrfi") || st.includes("yrfi")) return { kind: "nrfi_game" };

  const lineFromRow = numericLineFromRow(row);

  const looksLikePitcherK =
    st.includes("strikeout") ||
    st.includes("strike out") ||
    st.includes("strikeouts") ||
    /\bpitcher\b[^a-z]*\bk(s|'s|’s)?\b/.test(st) ||
    /\bstarter\b[^a-z]*\bk(s|'s|’s)?\b/.test(st) ||
    (/\bover\b|\bunder\b/.test(st) && /\bk(s|'s|’s)\b/.test(st) && !st.includes("walk"));
  if (looksLikePitcherK) {
    if (st.includes("batter") || st.includes("hitter")) return { kind: "batter_k" };
    if (st.includes("pitcher") || st.includes("pitching") || st.includes("starter")) return { kind: "pitcher_k" };
    return { kind: "so_ambiguous" };
  }
  if ((st.includes("out") && (st.includes("pitch") || st.includes("inn"))) || st.includes("pitching outs") || st.includes("outs recorded")) {
    return { kind: "pitcher_outs" };
  }

  const STAT_MAP = {
    hits: ["hits"],
    tb: ["total bases"],
    hr: ["home runs", "home run"],
    bb: ["walks", "base on balls"],
    runs: ["runs scored", "runs"],
    rbi: ["rbis", "rbi", "runs batted in"],
    hrr: ["hits+runs+rbis", "h+r+rbi", "hits + runs + rbis"],
    sb: ["stolen bases", "stolen base"],
  };
  for (const [statKey, patterns] of Object.entries(STAT_MAP)) {
    if (!patterns.some(p => st === p || st.startsWith(p))) continue;
    if (statKey === "hits" && (st.includes("pitch") || st.includes("allowed") || st.includes("against"))) continue;
    if (statKey === "runs" && (st.includes("pitch") || st.includes("allowed") || st.includes("against"))) continue;
    if (pitcherScoped) continue;
    return { kind: "hitter", statKey };
  }
  // DraftKings/FanDuel-style: little stat text in the label — use line shape. Avoid bare "hit" (matches "White", etc.).
  if (!Number.isNaN(lineFromRow)) {
    const h = lineFromRow;
    const hasStatWord = /\b(strike|strikeouts?|pitchers?|pitching|hits?\b|home runs?|rbis?|runs scored|runs batted|\bruns\b|walks?|stolen bases?|total bases|singles|doubles|triples|saves?\b|innings?|allowed|combo|outs recorded|pitching outs)\b/i.test(st);
    if (!hasStatWord && st.length < 400 && lineLooksLikePitcherKAlt(h)) return { kind: "so_ambiguous" };
  }
  return { kind: "skip" };
}

/** When probables are TBD, Odds rows lack team — resolve via MLB people search so team:lastname keys are unique per side. */
async function resolveKAccumTeams(kAccum, games) {
  const kEntries = Object.entries(kAccum);
  await mapConcurrent(kEntries, async ([, rec]) => {
    if (rec.team || !rec.gamesHint || !games?.length) return;
    try {
      const id = await findMLBId(rec.rawName);
      if (!id) return;
      const ident = await getPlayerIdentity(id);
      if (!ident) return;
      const gg = games.find((g) => eventMatchesGame(rec.gamesHint.home, rec.gamesHint.away, g));
      if (!gg) return;
      const ht = gg.teams.home.team;
      const at = gg.teams.away.team;
      const ha = teamAbbr(ht);
      const aa = teamAbbr(at);
      const hid = ht?.id;
      const aid = at?.id;
      if (ident.currentTeamId && hid && ident.currentTeamId === hid) rec.team = ha;
      else if (ident.currentTeamId && aid && ident.currentTeamId === aid) rec.team = aa;
      else if (ident.currentTeamAbbr) {
        const ca = canonAbbrForCompare(ident.currentTeamAbbr);
        if (ha && ca === canonAbbrForCompare(ha)) rec.team = ha;
        else if (aa && ca === canonAbbrForCompare(aa)) rec.team = aa;
      }
      if (!rec.team) {
        let onH = false;
        let onA = false;
        try {
          if (hid) onH = await isPlayerOnTeam(id, hid);
          if (aid) onA = await isPlayerOnTeam(id, aid);
        } catch (_) {}
        if (onH && !onA) rec.team = ha;
        else if (onA && !onH) rec.team = aa;
      }
    } catch (_) {}
  });
}

async function applyOddsRowsToState(rows, games, debugLines) {
  const kAccum = {};
  const outsAccum = {};
  const hitterAll = {};

  for (const row of rows || []) {
    const g = findGameForOddsRow(row, games);
    if (!g) continue;
    let cl = classifyOddsMarket(row.market, row);
    cl = disambiguateBarePlayerProp(row, g, cl);
    const player = row.player;
    if (cl.kind === "skip") continue;

    if (cl.kind === "nrfi_game") {
      const blob = `${(row.market || "")} ${(player || "")}`.toLowerCase();
      let pick = "NRFI/YRFI";
      if (blob.includes("yrfi") && !blob.includes("nrfi")) pick = "YRFI";
      else if (blob.includes("nrfi") && !blob.includes("yrfi")) pick = "NRFI";
      const key = `pk_${g.gamePk}`;
      const entry = {
        rawName: `${row.away} @ ${row.home}`,
        team: "",
        line: row.hdp,
        pick,
        statType: (row.market || "1st inning").slice(0, 120),
      };
      const prev = ppNRFI[key];
      if (!prev || (pick !== "NRFI/YRFI" && prev.pick === "NRFI/YRFI")) ppNRFI[key] = entry;
      continue;
    }

    if (cl.kind === "hitter") {
      const nk = normName(player);
      const team = teamAbbrForHitter(player, g);
      if (!hitterAll[nk]) hitterAll[nk] = { rawName: player, team, stats: {} };
      if (team) hitterAll[nk].team = team;
      const sk = cl.statKey;
      if (!hitterAll[nk].stats[sk]) hitterAll[nk].stats[sk] = [];
      hitterAll[nk].stats[sk].push({ line: row.hdp, statType: row.market });
      continue;
    }

    if (cl.kind === "batter_k") continue;

    if (cl.kind === "pitcher_outs") {
      const hasProbPo =
        g.teams?.home?.probablePitcher?.fullName ||
        g.teams?.away?.probablePitcher?.fullName;
      if (hasProbPo && !nameMatchesProbable(player, g)) continue;
      const nk = normName(player);
      if (!outsAccum[nk]) outsAccum[nk] = { lines: [], statTypes: [] };
      outsAccum[nk].lines.push(row.hdp);
      outsAccum[nk].statTypes.push(row.market);
      continue;
    }

    const isPitcherSO =
      cl.kind === "pitcher_k" ||
      (cl.kind === "so_ambiguous" && ambiguousStrikeoutCountsAsPitcher(row, g, player));
    if (!isPitcherSO) continue;

    const hasProbableStarter =
      g.teams?.home?.probablePitcher?.fullName ||
      g.teams?.away?.probablePitcher?.fullName;
    if (hasProbableStarter && !nameMatchesProbable(player, g)) continue;

    const nk = normName(player);
    const team = teamAbbrForPitcher(player, g);
    if (!kAccum[nk]) kAccum[nk] = { rawName: player, team, lines: [], bookRows: [], statTypes: [], gamesHint: null };
    kAccum[nk].lines.push(row.hdp);
    kAccum[nk].statTypes.push(row.market);
    kAccum[nk].bookRows.push({
      book: normBookmakerLabel(row.bookmaker || row.book || ""),
      hdp: row.hdp,
      over: row.over,
      under: row.under,
    });
    if (team) kAccum[nk].team = team;
    if (row.home && row.away && !kAccum[nk].gamesHint) {
      kAccum[nk].gamesHint = { home: row.home, away: row.away };
    }
  }

  await resolveKAccumTeams(kAccum, games);

  for (const [nk, rec] of Object.entries(kAccum)) {
    const src = [...new Set(rec.lines)].sort((a, b) => a - b);
    if (!src.length) continue;
    const midIdx = Math.floor(src.length / 2);
    const line = src[midIdx];
    const books = buildBooksFromRows(rec.bookRows, line);
    const oE = outsAccum[nk];
    let outsLine = null, outsStatType = null, outsAllLines = null;
    if (oE && oE.lines.length) {
      const oSrc = [...new Set(oE.lines)].sort((a, b) => a - b);
      outsLine = oSrc[0];
      outsStatType = oE.statTypes[0];
      outsAllLines = oSrc;
    }
    ppLines[nk] = {
      line,
      statType: rec.statTypes[0] || "Strikeouts",
      rawName: rec.rawName,
      team: rec.team || "",
      gamesHint: rec.gamesHint || null,
      allLines: src,
      books: Object.keys(books).length ? books : null,
      outsLine,
      outsStatType,
      outsAllLines,
    };
    const lastName = (cleanName(rec.rawName).split(/\s+/).filter(Boolean).pop() || "").toLowerCase();
    // Never alias both home and away to the same pitcher — that made lookupPPByTeam return the same SP for both teams.
    if (rec.team && lastName) {
      ppLines[`${rec.team.toLowerCase()}:${lastName}`] = ppLines[nk];
    }
  }

  ppHitterLines = {};
  for (const [nk, data] of Object.entries(hitterAll)) {
    ppHitterLines[nk] = { rawName: data.rawName, team: data.team };
    for (const [statKey, entries] of Object.entries(data.stats)) {
      if (statKey === "rawName" || statKey === "team") continue;
      const sorted = entries.filter(e => e.line > 0.25).sort((a, b) => a.line - b.line);
      if (sorted.length) ppHitterLines[nk][statKey] = sorted[0];
    }
  }

  if ((rows || []).length && (games || []).length &&
      !Object.keys(kAccum).length && !Object.keys(hitterAll).length) {
    let noGame = 0, skipMkt = 0, recognized = 0;
    let mktNonSkip = 0;
    for (const row of rows) {
      if (classifyOddsMarket(row.market, row).kind !== "skip") mktNonSkip++;
    }
    for (const row of rows) {
      const g = findGameForOddsRow(row, games);
      if (!g) { noGame++; continue; }
      const k = classifyOddsMarket(row.market, row).kind;
      if (k === "skip") skipMkt++;
      else recognized++;
    }
    debugLines.push(`Markets non-skip (any team): ${mktNonSkip} · Row pipeline: noScheduleMatch=${noGame} skippedMarket=${skipMkt} recognized=${recognized} (of ${rows.length})`);
    const r0 = rows.find(x => {
      const k = classifyOddsMarket(x.market, x).kind;
      return k === "pitcher_k" || k === "so_ambiguous" || k === "hitter";
    });
    if (r0) {
      const gTry = findGameForOddsRow(r0, games);
      debugLines.push(`Match: row→schedule=${gTry ? "ok" : "FAIL"} · odds "${r0.home}" @ "${r0.away}"`);
      if (!gTry && games[0]) {
        const gg = games[0];
        debugLines.push(`MLB schedule sample: "${gg.teams?.home?.team?.name}" (${gg.teams?.home?.team?.teamName || "?"}) vs "${gg.teams?.away?.team?.name}" (${gg.teams?.away?.team?.teamName || "?"})`);
      }
    } else if (rows[0]) {
      debugLines.push(`First row market (classification sample): "${(rows[0].market || "").slice(0, 100)}"`);
    }
  }
  debugLines.push(`Odds-API: pitcher keys=${Object.keys(kAccum).length}, hitter keys=${Object.keys(hitterAll).length}`);
}

const ODDS_CACHE_TTL = 20 * 60 * 1000;
function oddsCacheKey(dateStr) { return "mlb_odds_v22:" + dateStr; }
function oddsCacheGet(dateStr) {
  try {
    const raw = localStorage.getItem(oddsCacheKey(dateStr));
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > ODDS_CACHE_TTL) return null;
    return data;
  } catch (_) { return null; }
}
function oddsCacheSet(dateStr, data) {
  try { localStorage.setItem(oddsCacheKey(dateStr), JSON.stringify({ ts: Date.now(), data })); } catch (_) {}
}

function oddsIoFetchUrl(dateStr) {
  const qs = new URLSearchParams({ date: dateStr, structure: "1", rev: "20260410teamid" });
  if (typeof location === "undefined" || location.protocol === "file:") return "";
  const host = location.hostname;
  const isNetlify = host.includes("netlify.app") || host.includes("netlify.com");
  const isVercel  = host.includes("vercel.app");
  const isLocal   = host === "localhost" || host === "127.0.0.1";
  if (isNetlify) return `${location.origin}/.netlify/functions/odds_io?${qs}`;
  if (isVercel) return `${location.origin}/api/odds_io?${qs}`;
  if (isLocal) {
    if (location.port === "8888") return `${location.origin}/.netlify/functions/odds_io?${qs}`;
    return `http://127.0.0.1:8080/api/odds_io?${qs}`;
  }
  return `${location.origin}/api/odds_io?${qs}`;
}

async function loadPPLines(games, dateStr) {
  if (ppLoaded) return;
  ppLoaded = true;
  ppLines = {};
  ppHitterLines = {};
  ppNRFI = {};

  setStatus("Fetching sportsbook lines (Odds-API)…");
  const debugLines = [];
  let payload = null;

  try {
    if (!games || !games.length || !dateStr) {
      debugLines.push("No schedule — using calculated lines only");
      setStatus("No games — calculated lines");
      showPPDebug(debugLines);
      return;
    }

    payload = oddsCacheGet(dateStr);
    if (!payload) {
      const url = oddsIoFetchUrl(dateStr);
      if (!url) {
        debugLines.push("Use http://localhost:8080 or a deployed host — file:// cannot call /api/odds_io");
        setStatus("Sportsbook lines need a server — using calculated lines");
        showPPDebug(debugLines);
        return;
      }
      const r = await fetchTimeout(url, 28000, { headers: { Accept: "application/json" } });
      let j = null;
      try { j = await r.json(); } catch (_) {}
      if (j && j.ok) {
        oddsCacheSet(dateStr, j);
        payload = j;
      } else {
        debugLines.push(`Odds-API: ${(j && j.error) || ("HTTP " + r.status)}`);
      }
    }

    if (!payload || !payload.ok) {
      setStatus("Sportsbook lines unavailable — using calculated lines");
      showPPDebug(debugLines);
      return;
    }

    debugLines.push(`Server meta: apiCalls=${payload.meta?.apiCalls ?? "?"} events=${payload.meta?.eventCount ?? "?"} props=${payload.rows?.length ?? 0}`);
    const rFirst = payload.rows && payload.rows[0];
    if (rFirst) {
      debugLines.push(`First prop row: home="${rFirst.home || ""}" away="${rFirst.away || ""}" market="${(rFirst.market || "").slice(0, 80)}" hdp=${rFirst.hdp != null ? rFirst.hdp : "?"} statHint=${rFirst.statHint || "—"}`);
    }
    if (payload.meta?.sampleEventTeams?.length) {
      debugLines.push(`Odds teams sample: ${payload.meta.sampleEventTeams.map(t => `"${t.home}" @ "${t.away}"`).join(" · ")}`);
    }
    if (payload.meta?.sampleMarkets?.length) {
      debugLines.push(`Market name sample: ${payload.meta.sampleMarkets.slice(0, 5).join(" | ")}`);
    }
    if (payload.meta?.oddsStructureSample) {
      debugLines.push("✓ API structure sample (first /odds/multi event) — see preformatted block below");
    }

    await applyOddsRowsToState(payload.rows, games, debugLines);

    const totalFound = Object.keys(ppLines).filter(k => !k.includes(":")).length;
    if (totalFound > 0) {
      setStatus(`Sportsbook: ${totalFound} pitcher K lines (Odds-API)`);
    } else {
      debugLines.push("No pitcher strikeout props matched to probable starters for this slate.");
      setStatus("No book K lines matched — calculated lines");
    }

    captureLineSnapshot();
    detectLineMovements();
    detectOddsMovements();
    buildPPTeamMap();
    const ppPrimary = Object.keys(ppLines).filter(k => !k.includes(":")).length;
    let ppHinted = 0;
    for (const [k, e] of Object.entries(ppLines)) {
      if (k.includes(":")) continue;
      if (e?.gamesHint) ppHinted++;
    }
    debugLines.push(`Team map keys: ${Object.keys(ppTeamMap).join(", ") || "(none — using odds event + MLB id for pitcher match)"}`);
    debugLines.push(`PP rows with event hint: ${ppHinted}/${ppPrimary}`);
    debugLines.push(`Hitter props (book): ${Object.keys(ppHitterLines).length} players`);
  } catch (e) {
    debugLines.push(`Error: ${e.message}`);
    setStatus("Sportsbook load failed — using calculated lines");
  }

  showPPDebug(debugLines, payload?.meta?.oddsStructureSample || "");
}

function showPPDebug(lines, structurePre) {
  const el = document.getElementById("pp-debug");
  const body = document.getElementById("pp-debug-body");
  if (!el || !body) return;
  const esc = (s) =>
    String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  let html = lines
    .map(
      (l) =>
        `<div style="color:${l.startsWith("✓") ? "#00ff88" : l.startsWith("❌") || l.startsWith("⚠") ? "#ff4d6d" : "#94a3b8"}">${esc(l)}</div>`
    )
    .join("");
  if (structurePre) {
    html += `<pre style="margin-top:12px;padding:12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;white-space:pre-wrap;font-size:11px;line-height:1.4;max-height:min(52vh,440px);overflow:auto;text-align:left;font-family:ui-monospace,Consolas,monospace">${esc(structurePre)}</pre>`;
  }
  body.innerHTML = html;
  el.style.display = "block";
}

// Strip accents, suffixes, punctuation for matching
function cleanName(s) {
  return (s||"")
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // remove accents
    .toLowerCase()
    .replace(/\s+(jr|sr|ii|iii|iv)\.?$/i, "")         // remove suffixes
    .replace(/[^a-z\s]/g, "")                          // letters + spaces only
    .trim();
}

// Fuzzy lookup: multiple strategies in decreasing confidence
function lookupPP(fullName) {
  if (!fullName || fullName === "TBD" || Object.keys(ppLines).length === 0) return null;

  const clean = cleanName(fullName);
  const parts  = clean.split(/\s+/);
  const first  = parts[0] || "";
  const last   = parts[parts.length - 1] || "";
  const init   = first[0] || "";

  // 1. Exact normalized match  (e.g. "cole gerrit" === "cole gerrit")
  const normKey = clean.split(/\s+/).sort().join(" ");
  if (ppLines[normKey]) return ppLines[normKey];

  // 2. Try with original normName (same logic as storage)
  const origKey = normName(fullName);
  if (ppLines[origKey]) return ppLines[origKey];

  // 2b. MLB "First Middle Last" vs book "First Last" — try first+last only
  if (parts.length > 2) {
    const nkShort = normName(`${parts[0]} ${parts[parts.length - 1]}`);
    if (ppLines[nkShort]) return ppLines[nkShort];
  }

  // 3. "Last, First" stored as "first last" on PP side → sorted key matches
  for (const [k, v] of Object.entries(ppLines)) {
    const kClean = cleanName(v.rawName);
    const kSort  = kClean.split(/\s+/).sort().join(" ");
    if (kSort === normKey) return v;
  }

  // 4. First-initial + last name match  (e.g. "G. Cole" vs "Gerrit Cole")
  for (const [k, v] of Object.entries(ppLines)) {
    const kClean  = cleanName(v.rawName);
    const kParts  = kClean.split(/\s+/);
    const kLast   = kParts[kParts.length - 1];
    const kInit   = kParts[0]?.[0] || "";
    if (kLast === last && kInit === init) return v;
  }

  // 5. Last name only (only if unique in PP lines) — dedupe by rawName (norm + team:alias keys point at same entry)
  const sameLastName = [];
  const seenLast = new Set();
  for (const [k, v] of Object.entries(ppLines)) {
    if (k.includes(":")) continue;
    if (!v.rawName) continue;
    const kParts = cleanName(v.rawName).split(/\s+/);
    if (kParts[kParts.length - 1] !== last) continue;
    if (seenLast.has(v.rawName)) continue;
    seenLast.add(v.rawName);
    sameLastName.push(v);
  }
  if (sameLastName.length === 1) return sameLastName[0];

  return null;
}

// Fuzzy lookup for hitter props; book labels and MLB lineup names do not always format identically.
function lookupPPHitter(fullName, teamAbbr) {
  if (!fullName || Object.keys(ppHitterLines).length === 0) return null;

  const clean = cleanName(fullName);
  const parts = clean.split(/\s+/).filter(Boolean);
  const first = parts[0] || "";
  const last  = parts[parts.length - 1] || "";
  const init  = first[0] || "";
  const normKey = clean.split(/\s+/).sort().join(" ");

  const matchesTeam = (entry) => {
    if (!teamAbbr || !entry?.team) return true;
    return String(entry.team).toUpperCase() === String(teamAbbr).toUpperCase();
  };
  const pick = (entry) => (entry && matchesTeam(entry) ? entry : null);

  if (ppHitterLines[normKey]) {
    const hit = pick(ppHitterLines[normKey]);
    if (hit) return hit;
  }

  const origKey = normName(fullName);
  if (ppHitterLines[origKey]) {
    const hit = pick(ppHitterLines[origKey]);
    if (hit) return hit;
  }

  if (parts.length > 2) {
    const shortKey = normName(`${parts[0]} ${parts[parts.length - 1]}`);
    if (ppHitterLines[shortKey]) {
      const hit = pick(ppHitterLines[shortKey]);
      if (hit) return hit;
    }
  }

  const candidates = [];
  for (const entry of Object.values(ppHitterLines)) {
    if (!entry?.rawName) continue;
    const kClean = cleanName(entry.rawName);
    const kParts = kClean.split(/\s+/).filter(Boolean);
    if (!kParts.length) continue;
    const kLast = kParts[kParts.length - 1];
    const kInit = kParts[0]?.[0] || "";
    if (kClean === clean || (kLast === last && kInit === init)) {
      if (matchesTeam(entry)) return entry;
      candidates.push(entry);
    }
  }

  if (!teamAbbr && candidates.length === 1) return candidates[0];
  return null;
}

// Look up PP line using team abbreviation + last name (e.g. "PIT:skenes")
function lookupPPByTeam(fullName, teamAbbr) {
  if (!fullName || !teamAbbr) return null;
  const lastName = cleanName(fullName).split(/\s+/).pop();
  const teamKey  = `${teamAbbr.toLowerCase()}:${lastName}`;
  return ppLines[teamKey] || null;
}

// ─── PP TEAM MAP ──────────────────────────────────────────────────────────────
const PP_TEAM_KW = {
  AZ:  ["Diamondbacks","Arizona"],  SF:  ["Giants","San Francisco"],
  TB:  ["Rays","Tampa"],            KC:  ["Royals","Kansas City"],
  CWS: ["White Sox"],               WSH: ["Nationals","Washington"],
  LAA: ["Angels","Anaheim"],        MIA: ["Marlins","Miami"],
  OAK: ["Athletics","Oakland"],     STL: ["Cardinals","Louis"],
  PHI: ["Phillies","Philadelphia"],  SEA: ["Mariners","Seattle"],
  MIL: ["Brewers","Milwaukee"],     MIN: ["Twins","Minnesota"],
};

// Build ppTeamMap: team keyword (lowercase) → array of ppEntry
function buildPPTeamMap() {
  ppTeamMap = {};
  for (const [, entry] of Object.entries(ppLines)) {
    if (!entry.team || !entry.rawName) continue;
    const abbr = entry.team.toUpperCase();
    // keywords for this PP abbreviation (use abbr as keyword too)
    const kws  = PP_TEAM_KW[abbr] || [abbr];
    for (const kw of kws) {
      const k = kw.toLowerCase();
      if (!ppTeamMap[k]) ppTeamMap[k] = [];
      ppTeamMap[k].push(entry);
    }
  }
}

// Given an MLB team object, return the PP entry for that team (if any)
function getPPForTeam(mlbTeam) {
  const name  = (mlbTeam?.teamName || mlbTeam?.name || "").toLowerCase();
  // Use MLB_ID_TO_ABBR to get the real abbreviation (mlbTeam.abbreviation is absent in schedule data)
  const abbr  = teamAbbr(mlbTeam).toLowerCase();
  for (const [kw, entries] of Object.entries(ppTeamMap)) {
    if (name.includes(kw) || abbr === kw) return entries;
  }
  return null;
}

/**
 * PP lines keyed by probable→team fill ppTeamMap. When probables are TBD, entries have no team —
 * fall back to scanning ppLines and filter by odds event teams so resolvePitcherWithPP can still match.
 */
function getPPCandidatesForTeam(mlbTeam) {
  const mapped = getPPForTeam(mlbTeam);
  if (mapped && mapped.length) return mapped;

  const abbr = teamAbbr(mlbTeam);
  const out = [];
  const seen = new Set();
  for (const [k, entry] of Object.entries(ppLines)) {
    if (k.includes(":")) continue;
    if (!entry?.rawName) continue;
    const nk = normName(entry.rawName);
    if (seen.has(nk)) continue;

    if (entry.team) {
      if (entry.team.toUpperCase() === abbr) {
        seen.add(nk);
        out.push(entry);
      }
      continue;
    }
    // Without resolved team, do not add every pitcher in the event to both sides (duplicate cards).
  }
  return out;
}

// Look up a pitcher's MLB person ID by name using the sports people-search API
async function findMLBId(fullName) {
  const key = normName(fullName);
  if (_mlbSearch[key] !== undefined) return _mlbSearch[key];
  try {
    const d = await mlbGet(`/people/search?names=${encodeURIComponent(fullName)}&sportId=1`);
    const id = d.people?.[0]?.id || null;
    _mlbSearch[key] = id;
    return id;
  } catch(_) {
    _mlbSearch[key] = null;
    return null;
  }
}

let _weather   = {};   // teamAbbr → { windSpeed, windDir, windLabel, tempF, isOutdoor, precip, weatherScore }

// Normalize ump name for lookup
function normUmpName(s) {
  return (s||"").toLowerCase().trim().replace(/[^a-z\s]/g,"").replace(/\s+/g," ");
}

// ─── WEATHER FETCH (Open-Meteo, free, no API key) ────────────────────────────
// gameDateIso: optional MLB schedule `gameDate` — picks the forecast hour nearest first pitch
async function getWeather(homeTeamAbbr, dateStr, gameDateIso) {
  const t = normTeam(homeTeamAbbr);
  const coords = PARK_COORDS[t];
  const isRoof = coords?.roof === true;
  const cacheKey = isRoof || !coords ? t : (gameDateIso ? `${t}|${String(gameDateIso).slice(0, 13)}` : t);
  if (_weather[cacheKey]) return _weather[cacheKey];

  // Retractable/domed parks → weather irrelevant
  if (isRoof) {
    _weather[cacheKey] = { windSpeed:0, windDir:0, windLabel:"Dome/Roof", tempF:72, precip:0, weatherScore:0, isRoof:true };
    return _weather[cacheKey];
  }
  if (!coords) {
    _weather[cacheKey] = { windSpeed:0, windDir:0, windLabel:"N/A", tempF:70, precip:0, weatherScore:0, isRoof:false };
    return _weather[cacheKey];
  }

  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&hourly=temperature_2m,wind_speed_10m,wind_direction_10m,precipitation_probability&wind_speed_unit=mph&temperature_unit=fahrenheit&timezone=auto&forecast_days=2`;
    const r = await fetchTimeout(url, 8000);
    if (!r.ok) throw new Error("weather API error");
    const d = await r.json();

    const hours = d.hourly?.time || [];
    const datePrefix = dateStr;
    let idx = 0;
    if (gameDateIso && hours.length) {
      const target = new Date(gameDateIso).getTime();
      let best = Infinity;
      hours.forEach((h, i) => {
        const dt = Math.abs(new Date(h).getTime() - target);
        if (dt < best) { best = dt; idx = i; }
      });
    } else {
      idx = hours.findIndex(h => h.startsWith(datePrefix + "T17:") || h.startsWith(datePrefix + "T18:"));
      if (idx < 0) idx = hours.findIndex(h => h.startsWith(datePrefix));
      if (idx < 0) idx = 0;
    }

    const windMph  = d.hourly.wind_speed_10m?.[idx] || 0;
    const windDeg  = d.hourly.wind_direction_10m?.[idx] || 0;
    const tempF    = d.hourly.temperature_2m?.[idx] || 70;
    const precip   = d.hourly.precipitation_probability?.[idx] || 0;

    // Wind direction label
    const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
    const windLabel = dirs[Math.round(windDeg/22.5) % 16] || "—";

    // ── Weather score (affects NRFI and SO) ──────────────────────────────────
    // Blowing OUT = more offense = YRFI lean (negative for NRFI, slight negative for SO)
    // Blowing IN  = less offense = NRFI lean (positive for NRFI)
    // Based on wind relative to home plate direction per ballpark orientation
    const PARK_HP_DIR = {
      // Home plate direction (wind blowing FROM this direction blows OUT to CF)
      CHC:230, COL:195, BOS:215, NYY:240, NYM:220,
      SF:290,  OAK:270, DET:210, CLE:200, MIN:220,
      ATL:205, PHI:220, WSH:200, BAL:210, CIN:180,
      PIT:195, STL:215, KC:195,  LAA:225, LAD:205,
      SD:200,  CWS:215, MIA:200, BOS:230,
    };
    const hpDir = PARK_HP_DIR[t] || 200;
    // Angle between wind direction and "blowing out" direction
    let diff = Math.abs((windDeg - hpDir + 360) % 360);
    if (diff > 180) diff = 360 - diff;
    // diff=0 → wind blowing straight out (most offense), diff=180 → blowing in (least offense)
    const windOutFactor = Math.cos(diff * Math.PI / 180); // +1=out, -1=in

    let weatherScore = 0;
    if (windMph >= 5) {
      // Wind: strong out = YRFI lean (up to -8 pts on NRFI), strong in = NRFI lean (up to +6)
      weatherScore -= windOutFactor * Math.min(windMph / 3, 8);
    }
    // Cold weather (<45°F) → less offense → slight NRFI lean
    if (tempF < 45) weatherScore += (45 - tempF) * 0.15;
    // Rain >50% precip probability → less scoring, slight NRFI lean
    if (precip > 50) weatherScore += (precip - 50) * 0.04;

    // SO adjustment: strong out wind hurts batted-ball outs → fewer Ks slightly; cold = slightly fewer Ks
    const soKAdj = 1.0 - (windOutFactor * Math.min(windMph,20) * 0.002) - (tempF < 50 ? (50-tempF)*0.003 : 0);

    _weather[cacheKey] = { windSpeed:Math.round(windMph), windDir:windDeg, windLabel, tempF:Math.round(tempF), precip:Math.round(precip), weatherScore:parseFloat(weatherScore.toFixed(2)), soKAdj:parseFloat(soKAdj.toFixed(3)), windOutFactor:parseFloat(windOutFactor.toFixed(2)), isRoof:false, parkName:coords.name };
    return _weather[cacheKey];
  } catch(_) {
    _weather[cacheKey] = { windSpeed:0, windDir:0, windLabel:"N/A", tempF:70, precip:0, weatherScore:0, soKAdj:1.0, isRoof:false };
    return _weather[cacheKey];
  }
}

// ─── UMPIRE FETCH ─────────────────────────────────────────────────────────────
// Tries MLB Stats API for umpire assignment; falls back to schedule officials data.
async function getUmpireForGame(gamePk) {
  if (_umpData[gamePk]) return _umpData[gamePk];

  const fallback = { name: "Unknown", kAdj: 1.0, runsAdj: 0, note: "", src: "avg" };

  try {
    // MLB boxscore officials endpoint
    const d = await mlbGet(`/game/${gamePk}/boxscore`);
    const officials = d.officials || [];
    const hp = officials.find(o =>
      (o.officialType || "").toLowerCase().includes("home plate") ||
      (o.officialType || "").toLowerCase() === "hp"
    );
    if (!hp || !hp.official) { _umpData[gamePk] = fallback; return fallback; }

    const fullName = hp.official.fullName || hp.official.name || "";
    const normFull = normUmpName(fullName); // "bill miller" (first last)

    // UMP_DATA keys are stored as "last first" — try reversed order first
    let entry = UMP_DATA[normFull];
    if (!entry) {
      const parts = normFull.split(" ");
      if (parts.length >= 2) {
        // "bill miller" → "miller bill"
        const reversed = parts.slice(1).join(" ") + " " + parts[0];
        entry = UMP_DATA[reversed];
      }
    }

    // Last-name only fallback: first word of UMP_DATA key = last name (e.g. "miller bill" → "miller")
    if (!entry) {
      const lastName = normFull.split(" ").slice(-1)[0]; // last word of "first last" = last name
      for (const [k, v] of Object.entries(UMP_DATA)) {
        if (k.split(" ")[0] === lastName) { entry = v; break; } // first word of "last first" = last name
      }
    }

    const result = entry
      ? { name: fullName, kAdj: entry.kAdj, runsAdj: entry.runsAdj, note: entry.note, src: "known" }
      : { name: fullName, kAdj: 1.0, runsAdj: 0, note: "No data — using average", src: "unknown" };

    _umpData[gamePk] = result;
    return result;
  } catch(_) {
    _umpData[gamePk] = fallback;
    return fallback;
  }
}

// Normalize team abbreviation for lookups
function normTeam(abbr) {
  const MAP = { AZ:'ARI', 'SF':'SF', KC:'KC', CWS:'CWS', WSH:'WSH', TB:'TB' };
  return MAP[(abbr||"").toUpperCase()] || (abbr||"").toUpperCase();
}

// Harmonic mean of two % values (0–100): emphasizes the weaker number — fits “both halves” NRFI logic
function harmonicMeanPct(a, b) {
  if (a <= 0 || b <= 0) return (a + b) / 2;
  return 2 * a * b / (a + b);
}

// Park factor: delta from league average NRFI%
function getParkFactor(homeTeamAbbr) {
  const t = normTeam(homeTeamAbbr);
  const p = PARK_NRFI[t];
  if (!p) return 0;
  return (p.n - PARK_NRFI_AVG) / 100; // e.g. MIL = +0.131
}

// Team offensive first-inning tendency: how often they score in the 1st
function getTeamOffFactor(teamAbbr) {
  const t = normTeam(teamAbbr);
  const d = TEAM_1ST[t];
  return d ? d.rs : TEAM_1ST_AVG.rs;
}

function today() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2,"0"); }
function parseIP(s) {
  const p = String(s||"0").split(".");
  return (parseInt(p[0])||0) + (parseInt(p[1]||0)/3);
}
function pct(v, max) { return Math.min(100, Math.max(0, (v/max)*100)).toFixed(1); }
function confColor(c) { return c>=70?"#00ff88":c>=50?"#ffd60a":"#ff4d6d"; }

/** Career H2H vs today's SP: 0–100 for Top 10 ranking (penalize cold splits when sample is real). */
function computeH2hVsSpScore(h2h, seasonAvg) {
  const sa = (seasonAvg != null && !Number.isNaN(seasonAvg)) ? seasonAvg : 0.255;
  const out = { score: 16, tier: "none", short: "" };
  if (!h2h || !h2h.ab) return out;
  const ab = h2h.ab;
  const avg3 = Math.round(h2h.avg * 1000).toString().padStart(3, "0");
  out.short = `${h2h.hits}-${ab} (.${avg3})`;
  if (ab < 5) { out.tier = "tiny"; out.score = 22; return out; }
  const d = h2h.avg - sa;
  const sampleTrust = Math.min(1, (ab - 4) / 22);
  let tier, raw;
  if (d >= 0.038) { tier = "hot"; raw = 88; }
  else if (d >= 0.012) { tier = "good"; raw = 68; }
  else if (d >= -0.018) { tier = "mid"; raw = 44; }
  else if (d >= -0.042) { tier = "weak"; raw = 22; }
  else { tier = "cold"; raw = 6; }
  out.tier = tier;
  let s = raw * (0.42 + 0.58 * sampleTrust) + (tier === "cold" || tier === "weak" ? d * 45 : d * 58);
  out.score = Math.max(0, Math.min(100, s));
  return out;
}
